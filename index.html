<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معمل وقار الحديث - النظام المالي المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCndh68IOzYk1bzf8VXvQ5b6aS4b5TXI-o",
            authDomain: "omalilhealth.firebaseapp.com",
            projectId: "omalilhealth",
            storageBucket: "omalilhealth.firebasestorage.app",
            messagingSenderId: "1023228434530",
            appId: "1:1023228434530:web:1ddf72660d0a68b588193b"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        window.dbSave = async (data) => {
            const ref = doc(db, "records", data.code.toUpperCase());
            try {
                await setDoc(ref, { 
                    name: data.name, 
                    nameLower: data.name.toLowerCase(), 
                    code: data.code, 
                    lastUpdate: serverTimestamp(),
                    visits: arrayUnion(data.visit) 
                }, { merge: true });
                return true;
            } catch (e) { return false; }
        };

        window.dbGet = async (code) => { 
            try {
                const snap = await getDoc(doc(db, "records", code.toUpperCase())); 
                return snap.exists() ? snap.data() : null;
            } catch (e) { return null; }
        };

        window.dbSearchByName = async (namePart) => {
            try {
                const q = query(collection(db, "records"), where("name", ">=", namePart), where("name", "<=", namePart + '\uf8ff'));
                const snap = await getDocs(q);
                let results = [];
                snap.forEach(doc => results.push(doc.data()));
                return results;
            } catch (e) { return []; }
        };
    </script>

    <style>
        :root { --blue: #003366; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --input-border: #e2e8f0; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --input-border: #334155; --blue: #38bdf8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; color: var(--text); transition: 0.3s; }
        .app-container { width: 95%; max-width: 1000px; margin: 20px auto; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 6px solid var(--blue); }
        .theme-toggle { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--blue); cursor: pointer; background: transparent; color: var(--blue); font-weight: bold; margin-bottom: 15px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #e2e8f0; color: #475569; }
        .tabs button.active { background: var(--blue); color: white; }
        .panel { display: none; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid var(--input-border); border-radius: 10px; margin-bottom: 12px; background: var(--card); color: var(--text); outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: #10b981; }
        .test-card { background: var(--bg); padding: 15px; border-radius: 12px; border-right: 5px solid var(--blue); margin-bottom: 10px; }
        .finance-box { background: rgba(56, 189, 248, 0.1); padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid var(--blue); }
        #printArea { width: 800px; padding: 40px; background: white; position: absolute; left: -9999px; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <button class="theme-toggle" onclick="toggleTheme()">🌙/☀️ النمط</button>
        <div id="device-label" style="font-size: 10px; opacity: 0.6;"></div>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--blue); margin: 0;">معمل وقار الحديث 🔬</h1>
        <p>د. السني خالد محمدأحمد السني</p>
    </div>

    <div class="tabs">
        <button id="pTab" class="active" onclick="switchTab('p')">بوابة النتائج</button>
        <button id="aTab" onclick="adminCheck()">لوحة الإدارة</button>
    </div>

    <div id="pPanel" class="panel active">
        <input type="text" id="pSearch" placeholder="أدخل كود المريض للبحث" style="text-align:center;">
        <button class="btn btn-blue" onclick="loadHistory('p')">استلام النتائج ☁️</button>
        <div id="historyOutput_p"></div>
    </div>

    <div id="aPanel" class="panel">
        <input type="text" id="admName" placeholder="اسم المريض" oninput="autoCode()">
        <input type="text" id="admCode" placeholder="الكود" readonly style="opacity:0.7;">
        
        <div class="test-card">
            <input list="labList" id="tName" placeholder="نوع الفحص" onchange="applyTpl()">
            <textarea id="tRes" placeholder="النتيجة" style="height: 100px; direction: ltr;"></textarea>
            <input type="number" id="tPrice" placeholder="سعر الفحص">
            <button class="btn btn-blue" onclick="addTest()">+ إضافة فحص</button>
        </div>

        <div id="visitQueue" style="display:none;">
            <div id="queueList"></div>
            <div class="finance-box">
                <p>الإجمالي المطلوب: <b id="totalDisp">0</b> SDG</p>
                <input type="number" id="paidAmt" placeholder="المبلغ المدفوع الآن" oninput="calcFinance()">
                <p style="color: #ef4444;">المتبقي على المريض: <b id="remDisp">0</b> SDG</p>
            </div>
            <button class="btn btn-green" id="finalBtn" onclick="saveVisit()" style="margin-top:10px;">حفظ ورفع للسحابة ✅</button>
        </div>
        <div id="historyOutput_a"></div>
    </div>
</div>

<datalist id="labList">
    <option value="Urine Analysis">
    <option value="CBC">
    <option value="Stool Analysis">
    <option value="Malaria P/S">
    <option value="Widal Test">
    <option value="RBS">
</datalist>

<div id="printArea">
    <div style="display: flex; justify-content: space-between; border-bottom: 4px solid #003366; padding-bottom: 10px;">
        <div>
            <h1 style="color: #003366; margin:0;">Waqar Medical Lab</h1>
            <p><b>Dr. Alsunni Khalid</b> | Lab Specialist</p>
        </div>
        <div style="text-align: right;">
            <p>ID: <b id="prCode"></b><br>Date: <b id="prDate"></b></p>
        </div>
    </div>
    <div style="margin: 20px 0;">Patient: <b id="prName"></b></div>
    <div id="prTableArea"></div>
    <div id="prFinance" style="margin-top:10px; border-top:1px solid #eee; padding-top:10px;"></div>
    <div style="margin-top: 40px; font-family: 'Dancing Script', cursive; font-size: 30px;">Dr. Alsunni Khalid</div>
</div>

<script>
    let tests = [];
    function toggleTheme() {
        const d = document.documentElement;
        d.setAttribute('data-theme', d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
    function switchTab(t) {
        document.querySelectorAll('.panel, .tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(t+'Panel').classList.add('active');
        document.getElementById(t+'Tab').classList.add('active');
    }
    function adminCheck() { if(prompt("كلمة السر:") === "1001") switchTab('a'); }
    function autoCode() { if(!document.getElementById('admCode').value) document.getElementById('admCode').value = "WQR-" + Math.floor(1000 + Math.random() * 8999); }
    
    function applyTpl() {
        const t = document.getElementById('tName').value;
        if(t.includes("Urine")) document.getElementById('tRes').value = "Color: Yellow\nReaction: Acidic\nPus Cells: 2-4\nRBCs: 0-1";
        else document.getElementById('tRes').value = "Result: ";
    }

    function addTest() {
        const n = document.getElementById('tName').value, r = document.getElementById('tRes').value, p = parseFloat(document.getElementById('tPrice').value) || 0;
        if(!n || !r) return alert("أكمل البيانات");
        tests.push({ n, r, p });
        document.getElementById('visitQueue').style.display = 'block';
        document.getElementById('queueList').innerHTML += `<div class="test-card">${n} - ${p} SDG</div>`;
        calcFinance();
    }

    function calcFinance() {
        const total = tests.reduce((s, t) => s + t.p, 0);
        const paid = parseFloat(document.getElementById('paidAmt').value) || 0;
        document.getElementById('totalDisp').innerText = total;
        document.getElementById('remDisp').innerText = total - paid;
    }

    async function saveVisit() {
        const btn = document.getElementById('finalBtn'), name = document.getElementById('admName').value, code = document.getElementById('admCode').value;
        const total = tests.reduce((s, t) => s + t.p, 0);
        const paid = parseFloat(document.getElementById('paidAmt').value) || 0;
        
        btn.disabled = true; btn.innerText = "جاري الرفع...";
        const ok = await window.dbSave({ 
            name, code, 
            visit: { 
                date: new Date().toLocaleDateString('en-GB'), 
                tests, total, paid, remaining: (total - paid) 
            } 
        });
        if(ok) { alert("✅ تم الحفظ بنجاح"); location.reload(); }
        else { alert("❌ خطأ في الشبكة"); btn.disabled = false; }
    }

    async function loadHistory(mode) {
        const c = document.getElementById('pSearch').value;
        const d = await window.dbGet(c);
        if(!d) { document.getElementById('historyOutput_'+mode).innerHTML = "لا يوجد بيانات."; return; }
        document.getElementById('historyOutput_'+mode).innerHTML = d.visits.reverse().map(v => `
            <div class="test-card" style="display:flex; justify-content:space-between; align-items:center;">
                <div>تاريخ: ${v.date} <br> <small>باقي: ${v.remaining} SDG</small></div>
                <button class="btn btn-blue" style="width:80px; padding:5px;" onclick='printPDF("${d.name}","${d.code}",${JSON.stringify(v)})'>PDF</button>
            </div>`).join('');
    }

    function printPDF(name, code, v) {
        document.getElementById('prName').innerText = name;
        document.getElementById('prCode').innerText = code;
        document.getElementById('prDate').innerText = v.date;
        let table = `<table><tr><th>Test</th><th>Result</th></tr>`;
        v.tests.forEach(t => table += `<tr><td>${t.n}</td><td style="white-space:pre-wrap;">${t.r}</td></tr>`);
        document.getElementById('prTableArea').innerHTML = table + `</table>`;
        document.getElementById('prFinance').innerHTML = `
            <p>Total: ${v.total} SDG | Paid: ${v.paid} SDG | <b>Remaining: ${v.remaining} SDG</b></p>`;
        
        const area = document.getElementById('printArea'); area.style.left = "0";
        html2canvas(area, {scale: 2}).then(can => {
            const pdf = new jspdf.jsPDF();
            pdf.addImage(can.toDataURL('image/png'), 'PNG', 0, 0, 210, (can.height * 210) / can.width);
            pdf.save(`${name}_Result.pdf`); area.style.left = "-9999px";
        });
    }
</script>
</body>
</html>

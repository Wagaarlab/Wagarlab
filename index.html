<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث - الإصدار الشامل</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #050a15; --accent: #2563eb; --gold: #d4af37; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--primary); color: var(--text); margin: 0; }
        .promo-banner { background: linear-gradient(135deg, #d4af37, #f59e0b); color: #000; padding: 12px; text-align: center; font-weight: 900; box-shadow: 0 5px 15px rgba(212,175,55,0.4); margin: 10px; border-radius: 10px; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .logo-box { width: 100px; height: 100px; margin: 0 auto 20px; border-radius: 50%; border: 3px solid var(--gold); background: #fff url('https://i.ibb.co/vzPZpYm/waqar-logo.jpg') center/cover; box-shadow: 0 0 20px var(--gold); }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .btn-3d { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; color: #white; font-size: 16px; transform: translateY(-3px); box-shadow: 0 3px 0 #000; }
        .btn-3d:active { transform: translateY(0); box-shadow: 0 0 0 #000; }
        .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; max-height: 350px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .cat-h { grid-column: 1/-1; color: var(--gold); border-bottom: 1px solid #334; margin: 10px 0 5px; font-size: 13px; font-weight: 900; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; background: #1e293b; color: #fff; border: 1px solid #334; text-align: center; }
        #printArea { display: none; width: 210mm; padding: 15mm; background: white; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="promo-banner">💉 عرض خاص: خصم 20% على فحوصات الفيروسات والشامل 💉</div>

<div class="container">
    <div class="logo-box"></div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn-3d" style="background:var(--accent);" onclick="tab('p')">بوابة المرضى 🏥</button>
        <button class="btn-3d" style="background:#334155;" onclick="tab('a')">لوحة الإدارة 🔐</button>
    </div>

    <div id="pSec" class="glass">
        <h3 style="text-align:center; color:var(--gold);">استلام النتيجة</h3>
        <input type="text" id="pCode" placeholder="أدخل كودك (WQR-...)">
        <button class="btn-3d" style="background:var(--accent);" onclick="fetchR()">عرض وتحميل النتيجة PDF 📥</button>
    </div>

    <div id="aSec" style="display:none;" class="glass">
        <h3 style="text-align:center;">تسجيل حالة جديدة</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <input type="text" id="aCode" placeholder="كود الحالة">
            <input type="text" id="aName" placeholder="اسم المريض">
            <input type="number" id="aAge" placeholder="العمر">
            <input type="text" id="aPhone" placeholder="واتساب (249...)">
        </div>
        <p style="color:var(--gold); font-size:12px; margin:10px 0;">اختر من الـ 70 فحصاً المبرمجة:</p>
        <div id="lib" class="test-grid"></div>
        <div id="inputs" style="margin-top:15px;"></div>
        <button class="btn-3d" style="background:var(--success); margin-top:15px;" onclick="save()">حفظ النتيجة + واتساب ☁️</button>
    </div>
</div>

<div id="printArea">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid #000;">
        <img src="https://i.ibb.co/vzPZpYm/waqar-logo.jpg" width="80">
        <div style="text-align:center;"><h2>معمل وقار الحديث</h2><p>Waqar Modern Lab</p></div>
        <div id="qr"></div>
    </div>
    <div id="pInf" style="margin:20px 0; display:grid; grid-template-columns:1fr 1fr; background:#eee; padding:10px;"></div>
    <div id="pRes"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const config = { apiKey: "AIzaSyAMtySu0ZulKoWlfByBBDS05...", authDomain: "wagaarlab-a1e6c.firebaseapp.com", projectId: "wagaarlab-a1e6c", storageBucket: "wagaarlab-a1e6c.appspot.com", messagingSenderId: "922691536177", appId: "1:922691536177:web:d683fa16488853d3915c10" };
    const db = getFirestore(initializeApp(config));

    const DATA = [
        { c: 'الكيمياء', t: [
            { id: 'fbs', n: 'FBS', f: [{n:'Sugar',u:'mg/dl',r:'70-110'}]}, { id: 'rbs', n: 'RBS', f: [{n:'Sugar',u:'mg/dl',r:'80-140'}]},
            { id: 'ure', n: 'Urea', f: [{n:'Urea',u:'mg/dl',r:'15-45'}]}, { id: 'cre', n: 'Creatinine', f: [{n:'Result',u:'mg/dl',r:'0.6-1.4'}]},
            { id: 'uri', n: 'Uric Acid', f: [{n:'Result',u:'mg/dl',r:'3.5-7.2'}]}, { id: 'cho', n: 'Cholesterol', f: [{n:'Total',u:'mg/dl',r:'<200'}]}
        ]},
        { c: 'الكبد والكلى', t: [
            { id: 'alt', n: 'ALT', f: [{n:'ALT',u:'U/L',r:'Up to 41'}]}, { id: 'ast', n: 'AST', f: [{n:'AST',u:'U/L',r:'Up to 40'}]},
            { id: 'tbi', n: 'T.Bilirubin', f: [{n:'Total',u:'mg/dl',r:'0.1-1.2'}]}, { id: 'alb', n: 'Albumin', f: [{n:'Result',u:'g/dl',r:'3.5-5.0'}]}
        ]},
        { c: 'الدم والمناعة', t: [
            { id: 'cbc', n: 'C.B.C', f: [{n:'Hb',u:'g/dl',r:'12-18'},{n:'WBC',u:'10^3',r:'4-11'}]}, { id: 'esr', n: 'E.S.R', f: [{n:'1st Hr',u:'mm/hr',r:'0-15'}]},
            { id: 'mal', n: 'Malaria', f: [{n:'Result',u:'-',r:'Negative'}]}, { id: 'crp', n: 'CRP', f: [{n:'Result',u:'mg/L',r:'Up to 6'}]}
        ]}
    ];

    const lib = document.getElementById('lib');
    DATA.forEach(g => {
        lib.innerHTML += `<div class="cat-h">${g.c}</div>`;
        g.t.forEach(t => lib.innerHTML += `<div><input type="checkbox" id="k_${t.id}" onchange="tg('${t.id}')"> ${t.n}</div>`);
    });

    window.tg = (id) => {
        let t = null; DATA.forEach(g => { let f = g.t.find(x => x.id === id); if(f) t = f; });
        if(document.getElementById('k_'+id).checked) {
            let h = `<div id="r_${id}" class="glass" style="margin-bottom:10px;"><b>${t.n}</b><div style="display:flex; gap:5px;">`;
            t.f.forEach(f => h += `<input type="text" class="v_${id}" placeholder="${f.n}">`);
            document.getElementById('inputs').innerHTML += h + `</div></div>`;
        } else document.getElementById('r_'+id)?.remove();
    };

    window.tab = (t) => {
        if(t==='a' && prompt("الرمز:")!=="Wagaar7@") return;
        document.getElementById('pSec').style.display = t==='p'?'block':'none';
        document.getElementById('aSec').style.display = t==='a'?'block':'none';
    };

    window.save = async () => {
        const c = document.getElementById('aCode').value.toUpperCase();
        let tbl = `<table><tr><th>Test</th><th>Result</th><th>Unit</th><th>Range</th></tr>`;
        document.querySelectorAll('input[id^="k_"]:checked').forEach(x => {
            let id = x.id.split('_')[1]; let t = null; DATA.forEach(g => { let f = g.t.find(z => z.id === id); if(f) t = f; });
            const vals = document.querySelectorAll('.v_'+id);
            t.f.forEach((f, i) => tbl += `<tr><td>${f.n}</td><td><b>${vals[i].value}</b></td><td>${f.u}</td><td>${f.r}</td></tr>`);
        });
        const d = { name: document.getElementById('aName').value, age: document.getElementById('aAge').value, html: tbl + `</table>`, date: new Date().toLocaleDateString() };
        await setDoc(doc(db, "records", c), d);
        
        // تفريغ فوري
        document.getElementById('aCode').value = ""; document.getElementById('aName').value = ""; document.getElementById('inputs').innerHTML = "";
        document.querySelectorAll('input[id^="k_"]').forEach(x => x.checked = false);

        window.open(`https://wa.me/${document.getElementById('aPhone').value}?text=نتيجتك من معمل وقار جاهزة. الكود: ${c}%0Aالرابط: https://wagaarlab.github.io/Wagarlab/?code=${c}`, '_blank');
        alert("تم الحفظ وتفريغ البيانات!");
    };

    window.fetchR = async () => {
        const c = document.getElementById('pCode').value.toUpperCase();
        const s = await getDoc(doc(db, "records", c));
        if(s.exists()) {
            const d = s.data();
            document.getElementById('pInf').innerHTML = `<div>الاسم: ${d.name}</div><div>العمر: ${d.age}</div><div>الكود: ${c}</div><div>التاريخ: ${d.date}</div>`;
            document.getElementById('pRes').innerHTML = d.html;
            document.getElementById('printArea').style.display = 'block';
            document.getElementById('qr').innerHTML = "";
            new QRCode(document.getElementById("qr"), { text: c, width: 80, height: 80 });
            html2pdf().from(document.getElementById('printArea')).save(`Waqar_${c}.pdf`);
            document.getElementById('pCode').value = "";
        } else alert("الكود غير موجود!");
    };
</script>
</body>
</html>

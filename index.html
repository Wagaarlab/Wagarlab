<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waqar Lab - Secure Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #1e3a8a; --gold: #b8860b; --bg: #f8fafc; --text: #1e293b; --card: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; }
        .admin-section { display: none; border-top: 3px solid var(--gold); padding-top: 20px; margin-top: 20px; }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #fffbeb; padding: 15px; border-radius: 12px; border: 1px solid #fde68a; }
        .billing-summary { background: #f0f9ff; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #bae6fd; font-weight: bold; }
        .test-item { background: #f1f5f9; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .lock-overlay { text-align: center; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="mainCard">
        <h2 style="color:var(--accent); text-align:center;">نظام معمل وقار الذكي</h2>
        
        <div id="receptionArea">
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
                <input type="text" id="pName" placeholder="اسم المريض الرباعي">
                <input type="text" id="pPhone" placeholder="رقم واتساب المريض">
            </div>
            
            <div style="border: 2px solid #eee; padding:15px; border-radius:12px; margin-top:15px;">
                <input type="text" id="tSearch" placeholder="ابحث عن فحص لإضافته..." oninput="searchInMaster(this.value)">
                <div id="hints" style="position:absolute; background:white; width:80%; z-index:100; border:1px solid #ddd; display:none;"></div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-top:10px;">
                    <input type="text" id="tRes" placeholder="النتيجة">
                    <input type="text" id="tUnit" placeholder="الوحدة" readonly style="background:#f9fafb;">
                    <input type="text" id="tRef" placeholder="المعدل" readonly style="background:#f9fafb;">
                </div>
                <button onclick="addToBill()" style="background:var(--gold); color:white; border:none; padding:12px; width:100%; border-radius:10px; margin-top:10px; cursor:pointer;">إضافة الفحص للفاتورة والتقرير +</button>
            </div>

            <div id="billItems" style="margin-top:20px;"></div>

            <div class="billing-summary">
                <div style="display:flex; justify-content:space-between;"><span>إجمالي الفحوصات:</span><span id="totalTxt">0</span></div>
                <div style="display:flex; justify-content:space-between; margin:10px 0;">
                    <span>المبلغ المدفوع:</span>
                    <input type="number" id="paidAmt" style="width:100px; padding:5px; margin:0;" oninput="updateFinance()">
                </div>
                <div style="display:flex; justify-content:space-between; color:#b91c1c;"><span>المتبقي:</span><span id="dueTxt">0</span></div>
            </div>

            <button class="action-btn" style="margin-top:20px;" onclick="saveAndSend()">اعتماد النتيجة وإرسال واتساب 🚀</button>
        </div>

        <hr style="margin:40px 0; opacity:0.2;">
        
        <div id="adminAuth" class="lock-overlay">
            <p>🔒 منطقة إدارة الأسعار وتعديل القائمة</p>
            <input type="password" id="masterKey" placeholder="أدخل رمز الإدارة" style="width:200px; text-align:center;">
            <button onclick="unlockAdmin()" style="padding:10px 20px; border-radius:10px; cursor:pointer;">دخول الإدارة</button>
        </div>

        <div id="adminDashboard" class="admin-section">
            <h3 style="color:var(--gold);">⚙️ لوحة تحكم الإدارة (د. السني خالد)</h3>
            <div class="pricing-grid">
                <input type="text" id="newN" placeholder="اسم الفحص الجديد">
                <input type="text" id="newU" placeholder="الوحدة">
                <input type="text" id="newR" placeholder="المعدل الطبيعي">
                <input type="number" id="newP" placeholder="السعر">
                <button onclick="saveToMaster()" style="background:green; color:white; border:none; border-radius:8px; cursor:pointer;">إضافة/تحديث</button>
            </div>
            
            <h4 style="margin-top:20px;">القائمة الحالية للفحوصات والأسعار:</h4>
            <div id="masterListDisplay"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMtySu0ZulKoWLfByB8DS058IG5qDNWE8",
        authDomain: "wagaarlab-a1e6c.firebaseapp.com",
        projectId: "wagaarlab-a1e6c",
        storageBucket: "wagaarlab-a1e6c.firebasestorage.app",
        messagingSenderId: "922691536177",
        appId: "1:922691536177:web:d683fa18488853d3915c10"
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    let MASTER_DATA = [];
    let currentCart = [];
    let totalValue = 0;

    // جلب البيانات السحابية
    async function fetchMaster() {
        const snap = await getDocs(collection(db, "tests_config"));
        MASTER_DATA = [];
        snap.forEach(d => MASTER_DATA.push(d.data()));
        renderMasterList();
    }
    fetchMaster();

    // حماية الإدارة
    window.unlockAdmin = () => {
        if(document.getElementById('masterKey').value === 'Wagaar7@') {
            document.getElementById('adminAuth').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
        } else alert('رمز الإدارة غير صحيح');
    };

    // نظام البحث والفوترة
    window.searchInMaster = (v) => {
        const h = document.getElementById('hints');
        if(!v) { h.style.display='none'; return; }
        const matches = MASTER_DATA.filter(t => t.name.toLowerCase().includes(v.toLowerCase()));
        h.innerHTML = matches.map(t => `<div style="padding:10px; cursor:pointer; border-bottom:1px solid #eee;" onclick="selectTest('${t.name}','${t.unit}','${t.ref}',${t.price})">${t.name} - ${t.price} ج.س</div>`).join('');
        h.style.display = 'block';
    };

    window.selectTest = (n, u, r, p) => {
        document.getElementById('tSearch').value = n;
        document.getElementById('tUnit').value = u;
        document.getElementById('tRef').value = r;
        document.getElementById('tSearch').dataset.price = p;
        document.getElementById('hints').style.display = 'none';
    };

    window.addToBill = () => {
        const n = document.getElementById('tSearch').value;
        const res = document.getElementById('tRes').value;
        const p = parseInt(document.getElementById('tSearch').dataset.price) || 0;
        if(!n || !res) return alert('أكمل بيانات الفحص');

        currentCart.push({ n, res, u:document.getElementById('tUnit').value, r:document.getElementById('tRef').value, p });
        totalValue += p;
        updateFinance();
        renderCart();
        ['tSearch','tRes','tUnit','tRef'].forEach(i => document.getElementById(i).value='');
    };

    function renderCart() {
        document.getElementById('billItems').innerHTML = currentCart.map(x => `<div class="test-item"><span>${x.n}</span><b>${x.res}</b></div>`).join('');
    }

    window.updateFinance = () => {
        const paid = parseInt(document.getElementById('paidAmt').value) || 0;
        document.getElementById('totalTxt').innerText = totalValue.toLocaleString() + " ج.س";
        document.getElementById('dueTxt').innerText = (totalValue - paid).toLocaleString() + " ج.س";
    };

    // إدارة الأسعار (حفظ وحذف)
    window.saveToMaster = async () => {
        const name = document.getElementById('newN').value;
        const price = parseInt(document.getElementById('newP').value);
        if(!name || !price) return alert('بيانات ناقصة');
        await setDoc(doc(db, "tests_config", name), { name, unit:document.getElementById('newU').value, ref:document.getElementById('newR').value, price });
        alert('تم تحديث القائمة بنجاح');
        fetchMaster();
    };

    function renderMasterList() {
        document.getElementById('masterListDisplay').innerHTML = MASTER_DATA.map(t => `
            <div class="test-item">
                <span>${t.name} (<b>${t.price} ج.س</b>)</span>
                <button onclick="deleteFromMaster('${t.name}')" style="background:none; border:none; color:red; cursor:pointer;">حذف 🗑️</button>
            </div>
        `).join('');
    }

    window.deleteFromMaster = async (name) => {
        if(confirm('هل تريد حذف هذا الفحص من القائمة النهائية؟')) {
            await deleteDoc(doc(db, "tests_config", name));
            fetchMaster();
        }
    };

    window.saveAndSend = async () => {
        const name = document.getElementById('pName').value;
        const phone = document.getElementById('pPhone').value;
        const paid = parseInt(document.getElementById('paidAmt').value) || 0;
        const code = 'WQR-' + Math.floor(1000 + Math.random() * 9000);

        if(!name || !phone || !currentCart.length) return alert('أكمل بيانات المريض');

        await setDoc(doc(db, "records", code), { name, results: currentCart, total: totalValue, paid, due: (totalValue-paid), date: new Date().toISOString() });
        
        const msg = `*مختبرات وقار الحديثة*%0Aالمريض: ${name}%0Aالكود السري: ${code}%0A---%0Aالإجمالي: ${totalValue}%0Aالمدفوع: ${paid}%0Aالمتبقي: ${totalValue-paid}%0A---%0Aاستلم النتيجة من هنا: https://wagaarlab-a1e6c.web.app`;
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        location.reload();
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث - النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, collection, query, where, getDocs, persistentLocalCache, persistentMultipleTabManager } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCndh68IOzYk1bzf8VXvQ5b6aS4b5TXI-o",
            authDomain: "omalilhealth.firebaseapp.com",
            projectId: "omalilhealth",
            storageBucket: "omalilhealth.firebasestorage.app",
            messagingSenderId: "1023228434530",
            appId: "1:1023228434530:web:1ddf72660d0a68b588193b"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, {
            experimentalForceLongPolling: true,
            localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()})
        });

        window.dbSave = async (data) => {
            const ref = doc(db, "records", data.code.toUpperCase());
            const savePromise = setDoc(ref, { 
                name: data.name, 
                nameLower: data.name.toLowerCase(), 
                code: data.code, 
                visits: arrayUnion(data.visit) 
            }, { merge: true });

            const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 10000));
            try {
                await Promise.race([savePromise, timeout]);
                return true;
            } catch (e) {
                return false;
            }
        };

        window.dbGet = async (code) => { 
            try {
                const snap = await getDoc(doc(db, "records", code.toUpperCase())); 
                return snap.exists() ? snap.data() : null;
            } catch (e) { return null; }
        };

        window.dbSearchByName = async (namePart) => {
            try {
                const q = query(collection(db, "records"), where("name", ">=", namePart), where("name", "<=", namePart + '\uf8ff'));
                const snap = await getDocs(q);
                let results = [];
                snap.forEach(doc => results.push(doc.data()));
                return results;
            } catch (e) { return []; }
        };
    </script>

    <style>
        :root { --blue: #003366; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-container { max-width: 850px; background: white; margin: 10px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 10px solid var(--blue); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: #e2e8f0; font-size: 16px; }
        .tabs button.active { background: var(--blue); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: #10b981; margin-top: 10px; }
        .test-card { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 6px solid var(--blue); }
        .search-item { padding: 12px; border-bottom: 1px solid #ddd; cursor: pointer; background: #fff; }
        #printArea { width: 800px; padding: 40px; background: white; position: absolute; left: -9999px; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; font-size: 17px; }
        .digital-signature { font-family: 'Dancing Script', cursive; font-size: 38px; color: #001f3f; margin-bottom: -10px; transform: rotate(-3deg); display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--blue); margin: 0;">معمل وقار الحديث 🔬</h1>
        <p style="color: #64748b; font-weight: bold;">د. السني خالد محمدأحمد السني</p>
    </div>

    <div class="tabs">
        <button id="pTab" class="active" onclick="switchTab('p')">بوابة النتائج</button>
        <button id="aTab" onclick="adminCheck()">لوحة المالك والبحث</button>
    </div>

    <div id="pPanel" class="panel active">
        <input type="text" id="pSearch" placeholder="أدخل كود المريض للبحث (WQR-XXXX)" style="text-align: center;">
        <button class="btn btn-blue" onclick="loadHistory('p')">عرض السجل الطبي</button>
        <div id="historyOutput_p" style="margin-top: 20px;"></div>
    </div>

    <div id="aPanel" class="panel">
        <div style="background: #e0f2fe; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <h4 style="margin: 0 0 10px 0;">🔍 ابحث عن مريض سابق</h4>
            <input type="text" id="adminSearchName" placeholder="اكتب اسم المريض..." oninput="searchPatients()">
            <div id="searchResults" style="max-height: 150px; overflow-y: auto;"></div>
        </div>

        <input type="text" id="admName" placeholder="اسم المريض الجديد" oninput="autoCode()">
        <input type="text" id="admCode" placeholder="كود الملف" readonly style="background: #f1f5f9;">
        
        <div class="test-card">
            <input list="labList" id="tName" placeholder="نوع الفحص..." onchange="applyTpl()">
            <textarea id="tRes" placeholder="النتائج..." style="height: 150px; direction: ltr; font-weight: bold;"></textarea>
            <input type="number" id="tPrice" placeholder="السعر">
            <button class="btn btn-blue" onclick="addTest()">+ إضافة الفحص للقائمة</button>
        </div>

        <div id="visitQueue" style="display:none;">
            <div id="queueList"></div>
            <div id="totalDisp" style="font-weight: bold; margin: 15px 0;"></div>
            <button class="btn btn-green" id="finalSaveBtn" onclick="saveVisit()">تأكيد الحفظ النهائي ✅</button>
        </div>
        <div id="historyOutput_a" style="margin-top: 20px;"></div>
    </div>
</div>

<datalist id="labList">
    <option value="Urine Analysis">
    <option value="CBC (Complete Blood Count)">
    <option value="Stool Analysis">
    <option value="Malaria P/S">
    <option value="Widal Test">
    <option value="RBS (Blood Sugar)">
</datalist>

<div id="printArea">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--blue); padding-bottom: 15px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="https://raw.githubusercontent.com/Wagaarlab/Wagarlab/main/209963.png" style="height: 130px; width: 130px; border-radius: 50%; border: 3px solid var(--blue);" crossOrigin="anonymous">
            <div>
                <h1 style="color: var(--blue); margin:0;">Waqar Medical Lab</h1>
                <p style="margin: 5px 0; font-size: 20px;"><b>Dr. Alsunni Khalid Mohammed Ahmed Alsunni</b></p>
                <p style="margin: 0; font-size: 16px;">Laboratory Specialist Doctor</p>
            </div>
        </div>
        <div style="text-align: right;">
            <p>Date: <b id="prDate"></b></p>
            <p>ID: <b id="prCode"></b></p>
        </div>
    </div>
    <div style="margin: 20px 0; font-size: 22px; background: #f1f5f9; padding: 15px;">Patient: <b id="prName"></b></div>
    <div id="prTableArea"></div>
    <div style="margin-top: 50px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div style="text-align: center;">
            <div class="digital-signature">Dr. Alsunni Khalid</div>
            <p style="border-top: 2px solid #000; width: 200px; padding-top: 5px;">Signature</p>
        </div>
        <div style="opacity: 0.1;">OFFICIAL STAMP</div>
    </div>
</div>

<script>
    let tests = [];
    const urineTpl = `Macro Examination :
Color:....
Reaction:....
Albumin:.....
Sugar:......
Aston: ....
Bile:.....
PH:.......

Micro Examination:
Pus Cells.......
RBCs:........
Epithil :........
Crystals:.......
Casts:.......
Ova:........
Othar:.......`;

    function switchTab(t) {
        document.querySelectorAll('.panel, .tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(t+'Panel').classList.add('active');
        document.getElementById(t+'Tab').classList.add('active');
    }

    function adminCheck() { if(prompt("كلمة السر:") === "1001") switchTab('a'); }
    
    function autoCode() {
        if(!document.getElementById('admCode').value) 
            document.getElementById('admCode').value = "WQR-" + Math.floor(1000 + Math.random() * 8999);
    }

    function applyTpl() {
        const t = document.getElementById('tName').value;
        if(t.includes("Urine")) { document.getElementById('tRes').value = urineTpl; }
        else if(t.includes("CBC")) { document.getElementById('tRes').value = "Hb: ... g/dl\nWBCs: ... /cmm\nPLT: ... /cmm"; }
        else { document.getElementById('tRes').value = "Result: ...."; }
    }

    async function searchPatients() {
        const n = document.getElementById('adminSearchName').value;
        if(n.length < 2) return;
        const matches = await window.dbSearchByName(n);
        document.getElementById('searchResults').innerHTML = matches.map(m => `
            <div class="search-item" onclick="selectPatient('${m.code}')">👤 ${m.name} (${m.code})</div>`).join('');
    }

    function selectPatient(code) {
        document.getElementById('pSearch').value = code;
        loadHistory('a');
        document.getElementById('searchResults').innerHTML = "";
    }

    function addTest() {
        const n = document.getElementById('tName').value, r = document.getElementById('tRes').value, p = parseFloat(document.getElementById('tPrice').value) || 0;
        if(!n || !r) return alert("أكمل البيانات");
        tests.push({ n, r, p });
        render();
    }

    function render() {
        document.getElementById('visitQueue').style.display = tests.length ? 'block' : 'none';
        document.getElementById('queueList').innerHTML = tests.map(t => `<div style="padding:5px;">• ${t.n} (${t.p} SDG)</div>`).join('');
        document.getElementById('totalDisp').innerText = "الإجمالي: " + tests.reduce((s,t)=>s+t.p,0) + " SDG";
    }

    async function saveVisit() {
        const btn = document.getElementById('finalSaveBtn'), name = document.getElementById('admName').value, code = document.getElementById('admCode').value;
        if(!name || !tests.length) return alert("بيانات ناقصة");
        btn.disabled = true; btn.innerText = "جاري الحفظ الفوري...";
        const ok = await window.dbSave({ name, code, visit: { date: new Date().toLocaleDateString('en-GB'), tests, total: tests.reduce((s,t)=>s+t.p,0) } });
        if(ok) { alert("✅ تم الحفظ بنجاح!"); location.reload(); } 
        else { alert("⚠️ تعذر الاتصال بالسحابة. يرجى التحقق من الإنترنت والمحاولة ثانية."); btn.disabled = false; btn.innerText = "تأكيد الحفظ النهائي ✅"; }
    }

    async function loadHistory(mode) {
        const c = document.getElementById('pSearch').value;
        const out = document.getElementById('historyOutput_' + mode);
        out.innerHTML = "جاري التحميل...";
        const d = await window.dbGet(c);
        if(!d) { out.innerHTML = "لم يتم العثور على نتائج."; return; }
        out.innerHTML = `<h3>سجل: ${d.name}</h3>` + d.visits.reverse().map(v => `
            <div class="test-card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>التاريخ: ${v.date}</span>
                <button class="btn btn-blue" style="width:80px; padding:8px;" onclick='printPDF("${d.name}","${d.code}",${JSON.stringify(v)})'>PDF</button>
            </div>`).join('');
    }

    function printPDF(name, code, v) {
        document.getElementById('prName').innerText = name;
        document.getElementById('prCode').innerText = code;
        document.getElementById('prDate').innerText = v.date;
        let table = `<table><tr><th style="width:30%">Investigation</th><th>Result</th></tr>`;
        v.tests.forEach(t => table += `<tr><td><b>${t.n}</b></td><td style="white-space:pre-wrap; font-family:monospace;">${t.r}</td></tr>`);
        document.getElementById('prTableArea').innerHTML = table + `</table><p style="font-size:20px; color:var(--blue);"><b>Total Paid: ${v.total} SDG</b></p>`;
        const area = document.getElementById('printArea'); area.style.left = "0";
        html2canvas(area, {scale: 2, useCORS: true}).then(can => {
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(can.toDataURL('image/png'), 'PNG', 0, 0, 210, (can.height * 210) / can.width);
            pdf.save(`Waqar_Lab_${name}.pdf`); area.style.left = "-9999px";
        });
    }
</script>
</body>
</html>

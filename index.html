<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث - النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCndh68IOzYk1bzf8VXvQ5b6aS4b5TXI-o",
            authDomain: "omalilhealth.firebaseapp.com",
            projectId: "omalilhealth",
            storageBucket: "omalilhealth.firebasestorage.app",
            messagingSenderId: "1023228434530",
            appId: "1:1023228434530:web:1ddf72660d0a68b588193b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // تفعيل ميزة العمل بدون إنترنت وتجنب خطأ Offline
        enableIndexedDbPersistence(db).catch((err) => {
            console.error("Persistence failed", err.code);
        });

        window.dbSave = async (data) => {
            try {
                const ref = doc(db, "records", data.code.toUpperCase());
                const snap = await getDoc(ref);
                if (snap.exists()) { 
                    await updateDoc(ref, { visits: arrayUnion(data.visit) }); 
                } else { 
                    await setDoc(ref, { name: data.name, code: data.code, visits: [data.visit] }); 
                }
            } catch (e) { alert("عذراً: مشكلة في الاتصال بالخادم، يرجى المحاولة مرة أخرى."); throw e; }
        };

        window.dbGet = async (code) => { 
            try {
                const snap = await getDoc(doc(db, "records", code.toUpperCase())); 
                return snap.exists() ? snap.data() : null; 
            } catch (e) { alert("خطأ في جلب البيانات: تأكد من جودة الإنترنت."); return null; }
        };
    </script>

    <style>
        :root { --blue: #003366; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-container { max-width: 850px; background: white; margin: 10px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 10px solid var(--blue); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: #e2e8f0; font-size: 16px; }
        .tabs button.active { background: var(--blue); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: #10b981; margin-top: 10px; }
        .test-card { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 6px solid var(--blue); }
        #printArea { width: 800px; padding: 40px; background: white; position: absolute; left: -9999px; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 12px; text-align: left; font-size: 18px; }
        th { background: #f0f0f0; }
        .digital-signature { font-family: 'Dancing Script', cursive; font-size: 34px; color: #001f3f; margin-bottom: -10px; transform: rotate(-2deg); display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--blue); margin: 0;">معمل وقار الحديث 🔬</h1>
        <p style="color: #64748b; font-weight: bold;">إشراف د. السني خالد محمدأحمد السني</p>
    </div>

    <div class="tabs">
        <button id="pTab" class="active" onclick="switchTab('p')">بوابة النتائج</button>
        <button id="aTab" onclick="adminCheck()">لوحة الإدارة والتسعير</button>
    </div>

    <div id="pPanel" class="panel active">
        <input type="text" id="pSearch" placeholder="أدخل كود المريض (WQR-1234)" style="text-align: center;">
        <button class="btn btn-blue" onclick="loadHistory()">عرض النتائج</button>
        <div id="historyOutput"></div>
    </div>

    <div id="aPanel" class="panel">
        <input type="text" id="admName" placeholder="اسم المريض بالكامل">
        <input type="text" id="admCode" placeholder="كود الملف">
        <div class="test-card">
            <input list="labList" id="tName" placeholder="اختر الفحص..." onchange="applyTpl()">
            <textarea id="tRes" placeholder="النتائج..." style="height: 120px; direction: ltr; font-weight: bold;"></textarea>
            <input type="number" id="tPrice" placeholder="السعر">
            <button class="btn btn-blue" onclick="addTest()">+ إضافة الفحص</button>
        </div>
        <div id="visitQueue" style="display:none;">
            <div id="queueList"></div>
            <button class="btn btn-green" id="finalSaveBtn" onclick="saveVisit()">حفظ وتحديث السحابة ✅</button>
        </div>
    </div>
</div>

<datalist id="labList">
    <option value="Urine Analysis"><option value="CBC"><option value="Kidney Functions"><option value="Liver Functions"><option value="Lipid Profile"><option value="RBS"><option value="Widal Test"><option value="Malaria P/S"><option value="Stool Analysis">
</datalist>

<div id="printArea">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--blue); padding-bottom: 10px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="https://raw.githubusercontent.com/Wagaarlab/Wagarlab/main/209963.png" style="height: 120px; width: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue);" crossOrigin="anonymous">
            <div>
                <h1 style="color: var(--blue); margin:0; font-size: 28px;">Waqar Medical Lab</h1>
                <p style="margin: 5px 0; font-size: 18px;"><b>Dr. Alsunni Khalid Mohammed Ahmed Alsunni</b></p>
                <p style="margin: 0; font-size: 14px; color: #444;">Specialist Laboratory Doctor</p>
            </div>
        </div>
        <div style="text-align: right; font-size: 16px;">
            <p>Date: <b id="prDate"></b></p>
            <p>Patient ID: <b id="prCode"></b></p>
        </div>
    </div>
    <div style="margin: 30px 0 10px; font-size: 22px; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
        Patient Name: <b id="prName"></b>
    </div>
    <div id="prTableArea"></div>
    <div style="margin-top: 50px; display: flex; justify-content: space-between; font-weight: bold; align-items: flex-end;">
        <div style="text-align: center;">
            <div class="digital-signature">Dr. Alsunni Khalid</div>
            <p style="margin-top: 0; border-top: 1px solid #000; width: 220px; padding-top: 5px;">Lab Manager Signature</p>
        </div>
        <div style="text-align: center;">
            <p style="margin-bottom: 40px;">Official Stamp</p>
            <div style="border: 2px solid #003366; width: 100px; height: 100px; border-radius: 50%; margin: auto; opacity: 0.15; display: flex; align-items: center; justify-content: center; color: #003366; font-size: 12px;">Waqar Lab</div>
        </div>
    </div>
</div>

<script>
    let currentVisitTests = [];
    function switchTab(t) {
        document.querySelectorAll('.panel, .tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(t+'Panel').classList.add('active');
        document.getElementById(t+'Tab').classList.add('active');
    }
    function adminCheck() { if(prompt("رمز الدخول:") === "1001") switchTab('a'); }
    
    function applyTpl() {
        const t = document.getElementById('tName').value;
        const tpls = { "Urine": "Color: ...\nSugar: ...\nAlbumin: ...\nPus Cells: ...", "CBC": "Hb: ...\nWBCs: ...\nPLT: ..." };
        document.getElementById('tRes').value = tpls[Object.keys(tpls).find(k => t.includes(k))] || "Result: ...";
    }

    function addTest() {
        const n = document.getElementById('tName').value, r = document.getElementById('tRes').value, p = parseFloat(document.getElementById('tPrice').value) || 0;
        if(!n || !r) return alert("أكمل البيانات");
        currentVisitTests.push({ n, r, p });
        document.getElementById('tName').value = ""; document.getElementById('tRes').value = ""; document.getElementById('tPrice').value = "";
        renderQueue();
    }

    function renderQueue() {
        const q = document.getElementById('visitQueue');
        q.style.display = currentVisitTests.length ? 'block' : 'none';
        document.getElementById('queueList').innerHTML = currentVisitTests.map(t => `<div style="padding:8px; border-bottom:1px solid #ddd;">${t.n} - ${t.p} SDG</div>`).join('');
    }

    async function saveVisit() {
        const btn = document.getElementById('finalSaveBtn'), name = document.getElementById('admName').value;
        const code = document.getElementById('admCode').value || "WQR-" + Math.floor(1000 + Math.random() * 9000);
        if(!name || !currentVisitTests.length) return alert("يرجى إكمال البيانات");
        btn.disabled = true; btn.innerText = "جاري الحفظ...";
        try {
            const visit = { date: new Date().toLocaleDateString('ar-EG'), tests: currentVisitTests, total: currentVisitTests.reduce((s,t)=>s+t.p,0) };
            await window.dbSave({ name, code, visit });
            alert("✅ تم الحفظ! الكود: " + code);
            currentVisitTests = []; renderQueue(); document.getElementById('admName').value = "";
        } catch(e) { console.error(e); }
        finally { btn.disabled = false; btn.innerText = "حفظ وتحديث السحابة ✅"; }
    }

    async function loadHistory() {
        const codeInput = document.getElementById('pSearch').value;
        if(!codeInput) return;
        const data = await window.dbGet(codeInput);
        if(!data) return document.getElementById('historyOutput').innerHTML = "لا توجد بيانات لهذا الكود";
        document.getElementById('historyOutput').innerHTML = `<h3>المريض: ${data.name}</h3>` + data.visits.reverse().map(v => `
            <div class="test-card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>بتاريخ: ${v.date}</span>
                <button class="btn btn-blue" style="width:100px; padding:8px;" onclick='printV("${data.name}","${data.code}",${JSON.stringify(v)})'>تحميل PDF</button>
            </div>
        `).join('');
    }

    function printV(name, code, v) {
        document.getElementById('prName').innerText = name;
        document.getElementById('prCode').innerText = code;
        document.getElementById('prDate').innerText = v.date;
        let table = `<table><tr><th style="width:35%">Investigation</th><th>Result</th></tr>`;
        v.tests.forEach(t => { table += `<tr><td><b>${t.n}</b></td><td style="white-space: pre-wrap; direction:ltr;">${t.r}</td></tr>`; });
        document.getElementById('prTableArea').innerHTML = table + `</table><div style="margin-top:20px; font-weight:bold; font-size:20px;">Total Paid: ${v.total} SDG</div>`;
        const area = document.getElementById('printArea'); area.style.left = "0";
        html2canvas(area, {scale: 2, useCORS: true, allowTaint: true}).then(can => {
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            const imgData = can.toDataURL('image/png');
            pdf.addImage(imgData, 'PNG', 0, 0, 210, (can.height * 210) / can.width);
            pdf.save(`Waqar_Lab_${name}.pdf`); area.style.left = "-9999px";
        });
    }
</script>
</body>
</html>

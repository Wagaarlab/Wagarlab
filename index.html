<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معمل وقار الحديث - النظام الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCndh68IOzYk1bzf8VXvQ5b6aS4b5TXI-o",
            authDomain: "omalilhealth.firebaseapp.com",
            projectId: "omalilhealth",
            storageBucket: "omalilhealth.firebasestorage.app",
            messagingSenderId: "1023228434530",
            appId: "1:1023228434530:web:1ddf72660d0a68b588193b"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        window.dbSave = async (data) => {
            const ref = doc(db, "records", data.code.toUpperCase());
            try {
                await setDoc(ref, { 
                    name: data.name, 
                    nameLower: data.name.toLowerCase(), 
                    code: data.code.toUpperCase(), 
                    lastUpdate: serverTimestamp(),
                    visits: arrayUnion(data.visit) 
                }, { merge: true });
                return true;
            } catch (e) { console.error(e); return false; }
        };

        window.dbGet = async (code) => { 
            try {
                const snap = await getDoc(doc(db, "records", code.toUpperCase())); 
                return snap.exists() ? snap.data() : null;
            } catch (e) { return null; }
        };
    </script>

    <style>
        :root { --blue: #003366; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .app-container { width: 100%; max-width: 900px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 6px solid var(--blue); }
        .header { text-align: center; margin-bottom: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--border); color: var(--text); }
        .tabs button.active { background: var(--blue); color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 10px; background: var(--card); color: var(--text); font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: #10b981; }
        .test-card { background: #f1f5f9; padding: 15px; border-radius: 10px; border-right: 4px solid var(--blue); margin-bottom: 10px; }
        #printArea { width: 800px; padding: 40px; background: white; position: absolute; left: -9999px; color: black; }
        .print-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #003366; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 style="color: var(--blue); margin: 0;">معمل وقار الحديث 🔬</h1>
        <p>د. السني خالد محمد أحمد السني</p>
    </div>

    <div class="tabs">
        <button id="pTab" class="active" onclick="switchTab('p')">بوابة المرضى</button>
        <button id="aTab" onclick="adminCheck()">لوحة الإدارة</button>
    </div>

    <div id="pPanel" class="panel active">
        <input type="text" id="pSearch" placeholder="كود المريض (WQR-XXXX)" style="text-align: center;">
        <button class="btn btn-blue" onclick="loadHistory('p')">بحث وجلب النتائج ☁️</button>
        <div id="historyOutput_p" style="margin-top: 20px;"></div>
    </div>

    <div id="aPanel" class="panel">
        <input type="text" id="admName" placeholder="اسم المريض بالكامل" oninput="autoCode()">
        <input type="text" id="admCode" placeholder="كود الملف" readonly style="background: #eee;">

        <div class="test-card">
            <h4 style="margin-top:0">إضافة فحص جديد للمريض:</h4>
            <input list="labList" id="tName" placeholder="اختر الفحص" onchange="applyTpl()">
            <textarea id="tRes" placeholder="اكتب النتائج هنا..." style="height: 120px; direction: ltr; font-family: monospace;"></textarea>
            <input type="number" id="tPrice" placeholder="سعر الفحص (SDG)" oninput="calcQueue()">
            <button class="btn btn-blue" onclick="addTestToQueue()">+ إضافة هذا الفحص للمسودة</button>
        </div>

        <div id="visitQueue" style="display:none; border: 2px dashed var(--blue); padding: 15px; border-radius: 10px; margin-top: 15px;">
            <h4 style="margin-top:0">الفحوصات المضافة حالياً:</h4>
            <div id="queueList"></div>
            <hr>
            <div style="font-weight: bold; text-align: center; margin-bottom: 10px;">
                الإجمالي: <span id="totalDisp">0</span> SDG | 
                المدفوع: <input type="number" id="paidAmt" style="width:80px; margin:0" value="0" oninput="calcQueue()">
            </div>
            <button class="btn btn-green" id="saveBtn" onclick="saveVisit()">حفظ جميع الفحوصات في السحابة ✅</button>
        </div>
    </div>
</div>

<datalist id="labList">
    <option value="Hematology Report (CBC)">
    <option value="General Urine Examination">
    <option value="General Stool Examination">
    <option value="Kidney Functions (Urea/Creat)">
    <option value="Lipid Profile">
    <option value="Complete Semen Analysis">
</datalist>

<div id="printArea">
    <div class="print-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="https://raw.githubusercontent.com/Wagaarlab/Wagarlab/main/209963.png" style="height: 90px; border-radius: 50%;" crossOrigin="anonymous">
            <div>
                <h1 style="color: #003366; margin:0; font-size: 32px;">Waqar Medical Lab</h1>
                <p style="margin: 2px 0;"><b>Dr. Alsunni Khalid Mohammed Ahmed</b></p>
                <small>Laboratory Specialist Doctor</small>
            </div>
        </div>
        <div style="text-align: right;">ID: <b id="prCode"></b><br>Date: <b id="prDate"></b></div>
    </div>
    <div style="margin: 20px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Patient: <b id="prName"></b></div>
    <div id="prTableArea"></div>
    <div style="margin-top: 40px; text-align: right;">
        <p style="font-family: 'Dancing Script', cursive; font-size: 24px; margin:0;">Dr. Alsunni Khalid</p>
        <div style="border-top: 2px solid #000; width: 150px; display: inline-block;">Signature</div>
    </div>
</div>

<script>
    let currentTests = [];
    const templates = {
        "Hematology Report (CBC)": "Hb: ... g/dl (12-16)\nPCV: ... % (33-51)\nRBC: ... X10^12/l\nWBC: ... X10^9/l\nPlatelets: ... X10^9/l",
        "General Urine Examination": "Color: Amber Yellow\nReaction: Acidic\nPus Cells: ... (0-1)\nRBCs: ... (1-2)\nCrystals: Nil",
        "General Stool Examination": "Color: Brownish\nConsistency: Formed\nPus Cells: ...\nRBCs: ...\nOva/Cyst: Not Detected",
        "Kidney Functions (Urea/Creat)": "Urea: ... mg/dl (15-45)\nCreatinine: ... mg/dl (0.7-1.4)"
    };

    function switchTab(t) {
        document.querySelectorAll('.panel, .tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(t+'Panel').classList.add('active');
        document.getElementById(t+'Tab').classList.add('active');
    }

    function adminCheck() { 
        if(prompt("رقم الدخول السري:") === "6519") switchTab('a'); 
        else alert("خطأ في الرقم!");
    }

    function autoCode() { if(!document.getElementById('admCode').value) document.getElementById('admCode').value = "WQR-"+Math.floor(1000+Math.random()*8999); }
    function applyTpl() { const v = document.getElementById('tName').value; if(templates[v]) document.getElementById('tRes').value = templates[v]; }

    function addTestToQueue() {
        const n = document.getElementById('tName').value, r = document.getElementById('tRes').value, p = parseFloat(document.getElementById('tPrice').value) || 0;
        if(!n || !r) return alert("أكمل بيانات الفحص");
        currentTests.push({n, r, p});
        
        document.getElementById('tName').value = "";
        document.getElementById('tRes').value = "";
        document.getElementById('tPrice').value = "";
        
        renderQueue();
    }

    function renderQueue() {
        const qBox = document.getElementById('visitQueue');
        const qList = document.getElementById('queueList');
        if(currentTests.length > 0) {
            qBox.style.display = 'block';
            qList.innerHTML = currentTests.map((t, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#fff; padding:8px; border-radius:5px">
                    <span>${i+1}. ${t.n}</span>
                    <button onclick="currentTests.splice(${i},1); renderQueue()" style="color:red; border:none; background:none; cursor:pointer">حذف</button>
                </div>
            `).join('');
            calcQueue();
        } else {
            qBox.style.display = 'none';
        }
    }

    function calcQueue() {
        const total = currentTests.reduce((s, x) => s + x.p, 0);
        document.getElementById('totalDisp').innerText = total;
    }

    async function saveVisit() {
        const name = document.getElementById('admName').value, code = document.getElementById('admCode').value;
        if(!name || currentTests.length === 0) return alert("أدخل اسم المريض وفحصاً واحداً على الأقل");

        const btn = document.getElementById('saveBtn');
        btn.innerText = "جاري الرفع... ⏳"; btn.disabled = true;

        const total = currentTests.reduce((s, x) => s + x.p, 0), paid = parseFloat(document.getElementById('paidAmt').value) || 0;

        const ok = await window.dbSave({
            name, code,
            visit: { date: new Date().toLocaleDateString('en-GB'), tests: currentTests, total, paid, remaining: total-paid }
        });

        if(ok) {
            alert("تم حفظ بيانات " + name + " بنجاح ✅");
            location.reload(); // تصفير تلقائي عبر إعادة التحميل
        } else {
            alert("فشل الحفظ! تأكد من ضغط 'Publish' في Firebase Rules");
            btn.innerText = "حفظ ورفع السجلات ✅"; btn.disabled = false;
        }
    }

    async function loadHistory(m) {
        const c = document.getElementById('pSearch').value;
        const d = await window.dbGet(c);
        if(!d) return alert("الكود غير صحيح أو المريض غير موجود");
        document.getElementById('historyOutput_'+m).innerHTML = `<h3>المريض: ${d.name}</h3>` + d.visits.reverse().map(v => `
            <div class="test-card" style="display:flex; justify-content:space-between; align-items:center;">
                <div>التاريخ: ${v.date} (${v.tests.length} فحص)</div>
                <button class="btn btn-blue" style="width:80px; padding:8px; font-size:12px" onclick='printPDF("${d.name}","${d.code}",${JSON.stringify(v)})'>PDF</button>
            </div>`).join('');
    }

    function printPDF(n, c, v) {
        document.getElementById('prName').innerText = n; document.getElementById('prCode').innerText = c; document.getElementById('prDate').innerText = v.date;
        let table = `<table><tr><th style="width:30%">Investigation</th><th>Result / Reference Range</th></tr>`;
        v.tests.forEach(x => table += `<tr><td><b>${x.n}</b></td><td style="white-space:pre-wrap">${x.r}</td></tr>`);
        document.getElementById('prTableArea').innerHTML = table + `</table>`;
        const area = document.getElementById('printArea'); area.style.left = "0";
        html2canvas(area, {scale:2, useCORS:true}).then(can => {
            const pdf = new jspdf.jsPDF();
            pdf.addImage(can.toDataURL('image/png'), 'PNG', 0, 0, 210, (can.height*210)/can.width);
            pdf.save(`${n}_Result.pdf`); area.style.left = "-9999px";
        });
    }
</script>
</body>
</html>

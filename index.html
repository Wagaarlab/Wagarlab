<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث - النظام الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCndh68IOzYk1bzf8VXvQ5b6aS4b5TXI-o",
            authDomain: "omalilhealth.firebaseapp.com",
            projectId: "omalilhealth",
            storageBucket: "omalilhealth.firebasestorage.app",
            messagingSenderId: "1023228434530",
            appId: "1:1023228434530:web:1ddf72660d0a68b588193b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.dbSave = async (data) => {
            const ref = doc(db, "records", data.code.toUpperCase());
            const snap = await getDoc(ref);
            if (snap.exists()) { 
                await updateDoc(ref, { visits: arrayUnion(data.visit) }); 
            } else { 
                await setDoc(ref, { name: data.name, code: data.code, visits: [data.visit] }); 
            }
        };

        window.dbGet = async (code) => { 
            const snap = await getDoc(doc(db, "records", code.toUpperCase())); 
            return snap.exists() ? snap.data() : null; 
        };
    </script>

    <style>
        :root { --blue: #003366; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-container { max-width: 850px; background: white; margin: 10px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 10px solid var(--blue); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: #e2e8f0; font-size: 16px; }
        .tabs button.active { background: var(--blue); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: #10b981; margin-top: 10px; }
        .test-card { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 6px solid var(--blue); }
        #printArea { width: 800px; padding: 40px; background: white; position: absolute; left: -9999px; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 12px; text-align: left; font-size: 18px; }
        th { background: #f0f0f0; }
        .digital-signature { font-family: 'Dancing Script', cursive; font-size: 34px; color: #001f3f; margin-bottom: -10px; transform: rotate(-3deg); display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--blue); margin: 0;">معمل وقار الحديث 🔬</h1>
        <p style="color: #64748b; font-weight: bold;">إشراف د. السني خالد محمدأحمد السني</p>
    </div>

    <div class="tabs">
        <button id="pTab" class="active" onclick="switchTab('p')">بوابة النتائج</button>
        <button id="aTab" onclick="adminCheck()">لوحة الإدارة</button>
    </div>

    <div id="pPanel" class="panel active">
        <input type="text" id="pSearch" placeholder="أدخل كود المريض (مثال: WQR-1234)" style="text-align: center;">
        <button class="btn btn-blue" onclick="loadHistory()">عرض النتائج</button>
        <div id="historyOutput" style="margin-top: 20px;"></div>
    </div>

    <div id="aPanel" class="panel">
        <input type="text" id="admName" placeholder="اسم المريض بالكامل" oninput="generateAutoCode()">
        <input type="text" id="admCode" placeholder="كود الملف (تلقائي)">
        
        <div class="test-card">
            <h4 style="margin:0 0 10px 0;">إضافة فحص جديد:</h4>
            <input list="labList" id="tName" placeholder="اختر الفحص..." onchange="applyTpl()">
            <textarea id="tRes" placeholder="النتائج..." style="height: 150px; direction: ltr; font-weight: bold;"></textarea>
            <input type="number" id="tPrice" placeholder="السعر (SDG)">
            <button class="btn btn-blue" onclick="addTestToList()">+ إدراج في الفاتورة</button>
        </div>

        <div id="visitQueue" style="display:none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px;">
            <h4 style="color: var(--blue);">الفحوصات المضافة حالياً:</h4>
            <div id="queueList"></div>
            <div id="totalDisplay" style="font-weight: bold; margin: 10px 0; font-size: 18px;"></div>
            <button class="btn btn-green" id="finalSaveBtn" onclick="saveVisitToCloud()">رفع النتائج وتحديث السحابة ✅</button>
        </div>
    </div>
</div>

<datalist id="labList">
    <option value="CBC (Complete Blood Count)">
    <option value="Urine Analysis">
    <option value="Stool Analysis">
    <option value="RBS (Random Blood Sugar)">
    <option value="Kidney Function Test (KFT)">
    <option value="Liver Function Test (LFT)">
    <option value="Widal Test">
    <option value="Malaria P/S (B.F.F.M)">
    <option value="Lipid Profile">
</datalist>

<div id="printArea">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--blue); padding-bottom: 10px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="https://raw.githubusercontent.com/Wagaarlab/Wagarlab/main/209963.png" style="height: 120px; width: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue);" crossOrigin="anonymous">
            <div>
                <h1 style="color: var(--blue); margin:0; font-size: 28px;">Waqar Medical Lab</h1>
                <p style="margin: 5px 0; font-size: 18px;"><b>Dr. Alsunni Khalid Mohammed Ahmed Alsunni</b></p>
                <p style="margin: 0; font-size: 14px; color: #444;">Specialist Laboratory Doctor</p>
            </div>
        </div>
        <div style="text-align: right; font-size: 16px;">
            <p>Date: <b id="prDate"></b></p>
            <p>Patient ID: <b id="prCode"></b></p>
        </div>
    </div>
    <div style="margin: 30px 0 10px; font-size: 22px; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
        Patient Name: <b id="prName"></b>
    </div>
    <div id="prTableArea"></div>
    <div style="margin-top: 50px; display: flex; justify-content: space-between; font-weight: bold; align-items: flex-end;">
        <div style="text-align: center;">
            <div class="digital-signature">Dr. Alsunni Khalid</div>
            <p style="margin-top: 0; border-top: 1px solid #000; width: 220px; padding-top: 5px;">Lab Manager Signature</p>
        </div>
        <div style="text-align: center;">
            <p style="margin-bottom: 40px;">Official Stamp</p>
            <div style="border: 2px solid #003366; width: 100px; height: 100px; border-radius: 50%; margin: auto; opacity: 0.15; display: flex; align-items: center; justify-content: center; color: #003366; font-size: 12px;">Waqar Lab</div>
        </div>
    </div>
</div>

<script>
    let currentVisitTests = [];

    function switchTab(t) {
        document.querySelectorAll('.panel, .tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(t+'Panel').classList.add('active');
        document.getElementById(t+'Tab').classList.add('active');
    }

    function adminCheck() { if(prompt("رمز دخول الإدارة:") === "1001") switchTab('a'); }

    // توليد كود تلقائي للمريض
    function generateAutoCode() {
        const name = document.getElementById('admName').value;
        const codeInput = document.getElementById('admCode');
        if(name.length > 2 && !codeInput.value) {
            codeInput.value = "WQR-" + Math.floor(1000 + Math.random() * 9000);
        }
    }

    // القوالب التفصيلية للفحوصات
    function applyTpl() {
        const t = document.getElementById('tName').value;
        const tpls = {
            "CBC": "Hb: ... g/dl\nWBCs: ... /cmm\nPLT: ... /cmm\nPCV: ... %",
            "Urine": "Color: Pale Yellow\nReaction: Acidic\nAlbumin: Nil\nSugar: Nil\nPus Cells: ... /HPF\nR.B.Cs: ... /HPF",
            "Stool": "Color: Brown\nConsistency: Formed\nTrophozoite: Not seen\nCyst: Not seen\nHelminths: Not seen",
            "Malaria": "Result: ...\nStage: ...\nDensity: ...",
            "Widal": "S. Typhi (O): ...\nS. Typhi (H): ...\nS. Para A (H): ...\nS. Para B (H): ...",
            "KFT": "Urea: ... mg/dl\nCreatinine: ... mg/dl\nUric Acid: ... mg/dl",
            "LFT": "S. Bilirubin: ... mg/dl\nS.G.O.T: ... U/L\nS.G.P.T: ... U/L",
            "Lipid": "Cholesterol: ... mg/dl\nTriglyceride: ... mg/dl\nHDL: ... mg/dl\nLDL: ... mg/dl"
        };
        const key = Object.keys(tpls).find(k => t.toUpperCase().includes(k));
        document.getElementById('tRes').value = tpls[key] || "Investigation: ...\nResult: ...\nNormal Range: ...";
    }

    function addTestToList() {
        const n = document.getElementById('tName').value;
        const r = document.getElementById('tRes').value;
        const p = parseFloat(document.getElementById('tPrice').value) || 0;
        
        if(!n || !r) return alert("يرجى ملء اسم الفحص والنتيجة");
        
        currentVisitTests.push({ n, r, p });
        
        // مسح الحقول للإضافة التالية
        document.getElementById('tName').value = "";
        document.getElementById('tRes').value = "";
        document.getElementById('tPrice').value = "";
        
        renderQueue();
    }

    function renderQueue() {
        const q = document.getElementById('visitQueue');
        const list = document.getElementById('queueList');
        const totalDiv = document.getElementById('totalDisplay');
        
        if(currentVisitTests.length > 0) {
            q.style.display = 'block';
            list.innerHTML = currentVisitTests.map((t, idx) => `
                <div style="background:#fff; padding:10px; border-radius:8px; margin-bottom:5px; display:flex; justify-content:space-between;">
                    <span><b>${t.n}</b></span>
                    <span>${t.p} SDG <button onclick="removeTest(${idx})" style="color:red; border:none; background:none; cursor:pointer;">✖</button></span>
                </div>
            `).join('');
            const total = currentVisitTests.reduce((sum, t) => sum + t.p, 0);
            totalDiv.innerText = "إجمالي الفاتورة: " + total + " SDG";
        } else {
            q.style.display = 'none';
        }
    }

    function removeTest(i) {
        currentVisitTests.splice(i, 1);
        renderQueue();
    }

    async function saveVisitToCloud() {
        const btn = document.getElementById('finalSaveBtn');
        const name = document.getElementById('admName').value;
        const code = document.getElementById('admCode').value;

        if(!name || currentVisitTests.length === 0) return alert("البيانات ناقصة (الاسم أو الفحوصات)");

        btn.disabled = true;
        btn.innerText = "جاري الرفع للسحابة...";

        try {
            const visitData = {
                date: new Date().toLocaleDateString('ar-EG'),
                tests: currentVisitTests,
                total: currentVisitTests.reduce((s, t) => s + t.p, 0)
            };

            await window.dbSave({ name, code, visit: visitData });
            
            alert("✅ تم رفع النتائج بنجاح!\nكود المريض: " + code);
            
            // تصفير الواجهة بعد النجاح
            currentVisitTests = [];
            renderQueue();
            document.getElementById('admName').value = "";
            document.getElementById('admCode').value = "";
        } catch(e) {
            alert("خطأ في الرفع: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "رفع النتائج وتحديث السحابة ✅";
        }
    }

    async function loadHistory() {
        const val = document.getElementById('pSearch').value.trim();
        if(!val) return alert("أدخل الكود أولاً");
        
        const output = document.getElementById('historyOutput');
        output.innerHTML = "جاري البحث...";

        const data = await window.dbGet(val);
        if(!data) {
            output.innerHTML = "<p style='color:red;'>عذراً، هذا الكود غير موجود في سجلاتنا.</p>";
            return;
        }

        output.innerHTML = `<h3>النتائج السابقة للمريض: ${data.name}</h3>` + 
            data.visits.reverse().map(v => `
                <div class="test-card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <b>تاريخ الزيارة: ${v.date}</b><br>
                        <small>عدد الفحوصات: ${v.tests.length}</small>
                    </div>
                    <button class="btn btn-blue" style="width:120px; padding:10px; font-size:14px;" onclick='preparePDF("${data.name}","${data.code}",${JSON.stringify(v)})'>تحميل PDF</button>
                </div>
            `).join('');
    }

    function preparePDF(name, code, v) {
        document.getElementById('prName').innerText = name;
        document.getElementById('prCode').innerText = code;
        document.getElementById('prDate').innerText = v.date;
        
        let tableRows = `<table><tr><th style="width:40%">Investigation</th><th>Result</th></tr>`;
        v.tests.forEach(t => {
            tableRows += `<tr><td><b>${t.n}</b></td><td style="white-space: pre-wrap; direction:ltr; font-family:monospace;">${t.r}</td></tr>`;
        });
        
        document.getElementById('prTableArea').innerHTML = tableRows + `</table><div style="margin-top:20px; font-weight:bold; font-size:20px; text-align:right;">Total Paid: ${v.total} SDG</div>`;
        
        const area = document.getElementById('printArea');
        area.style.left = "0";

        html2canvas(area, {scale: 2, useCORS: true, allowTaint: true}).then(canvas => {
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            const imgData = canvas.toDataURL('image/png');
            pdf.addImage(imgData, 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
            pdf.save(`Waqar_Lab_${name}.pdf`);
            area.style.left = "-9999px";
        });
    }
</script>
</body>
</html>

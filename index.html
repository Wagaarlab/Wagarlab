<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث - الإصدار الذهبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCndh68IOzYk1bzf8VXvQ5b6aS4b5TXI-o",
            authDomain: "omalilhealth.firebaseapp.com",
            projectId: "omalilhealth",
            storageBucket: "omalilhealth.firebasestorage.app",
            messagingSenderId: "1023228434530",
            appId: "1:1023228434530:web:1ddf72660d0a68b588193b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // تفعيل ميزة العمل بدون إنترنت القوية لمنع رسالة Offline
        enableIndexedDbPersistence(db).catch((err) => console.log("Offline mode active"));

        window.dbSave = async (data) => {
            const ref = doc(db, "records", data.code.toUpperCase());
            try {
                const snap = await getDoc(ref);
                if (snap.exists()) { 
                    await updateDoc(ref, { visits: arrayUnion(data.visit) }); 
                } else { 
                    await setDoc(ref, { name: data.name, code: data.code, visits: [data.visit] }); 
                }
                return true;
            } catch (e) { console.error(e); return false; }
        };

        window.dbGet = async (code) => { 
            try {
                const snap = await getDoc(doc(db, "records", code.toUpperCase())); 
                return snap.exists() ? snap.data() : null;
            } catch (e) { return null; }
        };
    </script>

    <style>
        :root { --blue: #003366; --bg: #f0f4f8; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-container { max-width: 850px; background: white; margin: 10px auto; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-top: 10px solid var(--blue); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: #dfe6ed; font-size: 16px; transition: 0.3s; }
        .tabs button.active { background: var(--blue); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-blue { background: var(--blue); } .btn-blue:hover { opacity: 0.9; }
        .btn-green { background: #10b981; margin-top: 10px; }
        .test-card { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 6px solid var(--blue); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #printArea { width: 800px; padding: 40px; background: white; position: absolute; left: -9999px; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 12px; text-align: left; font-size: 18px; }
        th { background: #f0f0f0; }
        .digital-signature { font-family: 'Dancing Script', cursive; font-size: 38px; color: #001f3f; margin-bottom: -10px; transform: rotate(-3deg); display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="text-align: center; margin-bottom: 25px;">
        <h1 style="color: var(--blue); margin: 0; font-size: 32px;">مـعـمل وقار الـحـديث 🔬</h1>
        <p style="color: #64748b; font-weight: bold; font-size: 18px;">إشراف د. السني خالد محمدأحمد السني</p>
    </div>

    <div class="tabs">
        <button id="pTab" class="active" onclick="switchTab('p')">بوابة المرضى</button>
        <button id="aTab" onclick="adminCheck()">لوحة التحكم</button>
    </div>

    <div id="pPanel" class="panel active">
        <input type="text" id="pSearch" placeholder="أدخل كود المريض (WQR-XXXX)" style="text-align: center; font-weight: bold; font-size: 20px;">
        <button class="btn btn-blue" onclick="loadHistory()">استخراج النتائج والتقارير</button>
        <div id="historyOutput" style="margin-top: 25px;"></div>
    </div>

    <div id="aPanel" class="panel">
        <div style="display: flex; gap: 10px;">
            <input type="text" id="admName" placeholder="اسم المريض بالكامل" style="flex: 2;" oninput="generateCode()">
            <input type="text" id="admCode" placeholder="الكود" style="flex: 1; text-align: center; background: #eef2f7;" readonly>
        </div>
        
        <div class="test-card">
            <input list="labList" id="tName" placeholder="اختر الفحص من القائمة..." onchange="applyTpl()">
            <textarea id="tRes" placeholder="اكتب النتيجة هنا..." style="height: 160px; direction: ltr; font-weight: bold; font-family: monospace;"></textarea>
            <input type="number" id="tPrice" placeholder="سعر الفحص بالجنيه">
            <button class="btn btn-blue" onclick="addTest()">+ إدراج الفحص في الزيارة</button>
        </div>

        <div id="visitQueue" style="display:none; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #ddd;">
            <h4 style="margin:0 0 10px 0; color: var(--blue);">قائمة الفحوصات الحالية:</h4>
            <div id="queueList"></div>
            <div id="totalDisplay" style="font-weight: bold; font-size: 20px; color: #1e293b; margin: 15px 0;"></div>
            <button class="btn btn-green" id="finalSaveBtn" onclick="saveVisit()">رفع وحفظ في السحابة الآن ✅</button>
        </div>
    </div>
</div>

<datalist id="labList">
    <option value="CBC (Complete Blood Count)">
    <option value="Urine Analysis">
    <option value="Stool Analysis">
    <option value="Malaria P/S (B.F.F.M)">
    <option value="Widal Test">
    <option value="RBS (Random Blood Sugar)">
    <option value="Kidney Function (Urea/Creatinine)">
    <option value="Liver Function (LFT)">
    <option value="Lipid Profile">
</datalist>

<div id="printArea">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--blue); padding-bottom: 15px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="https://raw.githubusercontent.com/Wagaarlab/Wagarlab/main/209963.png" style="height: 130px; width: 130px; border-radius: 50%; border: 2px solid var(--blue);" crossOrigin="anonymous">
            <div>
                <h1 style="color: var(--blue); margin:0; font-size: 32px;">Waqar Medical Lab</h1>
                <p style="margin: 5px 0; font-size: 20px;"><b>Dr. Alsunni Khalid Mohammed Ahmed Alsunni</b></p>
                <p style="margin: 0; font-size: 16px; color: #444;">Laboratory Specialist & Manager</p>
            </div>
        </div>
        <div style="text-align: right; font-size: 18px;">
            <p>Date: <b id="prDate"></b></p>
            <p>Ref No: <b id="prCode"></b></p>
        </div>
    </div>
    <div style="margin: 30px 0; font-size: 24px; padding: 10px; background: #f8f9fa;">
        Patient: <b id="prName"></b>
    </div>
    <div id="prTableArea"></div>
    <div style="margin-top: 60px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div style="text-align: center;">
            <div class="digital-signature">Dr. Alsunni Khalid</div>
            <p style="margin: 0; border-top: 2px solid #000; width: 250px; padding-top: 5px; font-weight: bold;">Lab Manager Signature</p>
        </div>
        <div style="text-align: center; border: 2px solid var(--blue); padding: 20px; border-radius: 50%; opacity: 0.2; width: 80px; height: 80px;">
            OFFICIAL STAMP
        </div>
    </div>
</div>

<script>
    let currentVisitTests = [];

    function switchTab(t) {
        document.querySelectorAll('.panel, .tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(t+'Panel').classList.add('active');
        document.getElementById(t+'Tab').classList.add('active');
    }

    function adminCheck() { if(prompt("أدخل كلمة المرور:") === "1001") switchTab('a'); }

    function generateCode() {
        const name = document.getElementById('admName').value;
        if(name.length > 2 && !document.getElementById('admCode').value) {
            document.getElementById('admCode').value = "WQR-" + Math.floor(1000 + Math.random() * 8999);
        }
    }

    function applyTpl() {
        const t = document.getElementById('tName').value.toUpperCase();
        const templates = {
            "CBC": "Hb: ... g/dl\nWBCs: ... /cmm\nPLT: ... /cmm\nPCV: ... %",
            "URINE": "Pus Cells: ... /HPF\nR.B.Cs: ... /HPF\nAlbumin: Nil\nSugar: Nil",
            "STOOL": "Trophozoite: Not seen\nCyst: Not seen\nHelminths: Not seen",
            "MALARIA": "Result: ...\nStage: ...\nDensity: ...",
            "WIDAL": "S. Typhi (O): ...\nS. Typhi (H): ...",
            "KIDNEY": "Urea: ... mg/dl\nCreatinine: ... mg/dl"
        };
        const key = Object.keys(templates).find(k => t.includes(k));
        document.getElementById('tRes').value = templates[key] || "Result: ...\nNote: ...";
    }

    function addTest() {
        const n = document.getElementById('tName').value, r = document.getElementById('tRes').value, p = parseFloat(document.getElementById('tPrice').value) || 0;
        if(!n || !r) return alert("البيانات ناقصة");
        currentVisitTests.push({ n, r, p });
        document.getElementById('tName').value = ""; document.getElementById('tRes').value = ""; document.getElementById('tPrice').value = "";
        renderQueue();
    }

    function renderQueue() {
        const q = document.getElementById('visitQueue');
        q.style.display = currentVisitTests.length ? 'block' : 'none';
        document.getElementById('queueList').innerHTML = currentVisitTests.map((t,i) => `
            <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <span><b>${t.n}</b></span>
                <span>${t.p} SDG <button onclick="currentVisitTests.splice(${i},1);renderQueue();" style="color:red;border:none;background:none;cursor:pointer;">✖</button></span>
            </div>`).join('');
        document.getElementById('totalDisplay').innerText = "الإجمالي: " + currentVisitTests.reduce((s,t)=>s+t.p,0) + " SDG";
    }

    async function saveVisit() {
        const btn = document.getElementById('finalSaveBtn'), name = document.getElementById('admName').value, code = document.getElementById('admCode').value;
        if(!name || !currentVisitTests.length) return alert("أكمل البيانات");
        btn.disabled = true; btn.innerText = "جاري الحفظ في السحابة...";
        
        const visit = { date: new Date().toLocaleDateString('en-GB'), tests: currentVisitTests, total: currentVisitTests.reduce((s,t)=>s+t.p,0) };
        const success = await window.dbSave({ name, code, visit });
        
        if(success) {
            alert("✅ تم الحفظ بنجاح! كود المريض: " + code);
            currentVisitTests = []; renderQueue(); document.getElementById('admName').value = ""; document.getElementById('admCode').value = "";
        } else {
            alert("❌ حدث خطأ، سيتم الحفظ تلقائياً عند استقرار الإنترنت.");
        }
        btn.disabled = false; btn.innerText = "رفع وحفظ في السحابة الآن ✅";
    }

    async function loadHistory() {
        const code = document.getElementById('pSearch').value.trim();
        if(!code) return;
        const data = await window.dbGet(code);
        if(!data) return document.getElementById('historyOutput').innerHTML = "<b style='color:red;'>لا يوجد مريض بهذا الكود</b>";
        
        document.getElementById('historyOutput').innerHTML = `<h3>المريض: ${data.name}</h3>` + data.visits.reverse().map(v => `
            <div class="test-card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>تاريخ: ${v.date}</span>
                <button class="btn btn-blue" style="width:120px; padding:10px; font-size:14px;" onclick='printPDF("${data.name}","${data.code}",${JSON.stringify(v)})'>تحميل PDF</button>
            </div>`).join('');
    }

    function printPDF(name, code, v) {
        document.getElementById('prName').innerText = name;
        document.getElementById('prCode').innerText = code;
        document.getElementById('prDate').innerText = v.date;
        let rows = `<table><tr><th style="width:35%">Investigation</th><th>Result</th></tr>`;
        v.tests.forEach(t => rows += `<tr><td><b>${t.n}</b></td><td style="white-space: pre-wrap; font-family:monospace; direction:ltr;">${t.r}</td></tr>`);
        document.getElementById('prTableArea').innerHTML = rows + `</table><div style="margin-top:20px; font-weight:bold; font-size:22px;">Total: ${v.total} SDG</div>`;
        
        const area = document.getElementById('printArea'); area.style.left = "0";
        html2canvas(area, {scale: 2, useCORS: true}).then(can => {
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(can.toDataURL('image/png'), 'PNG', 0, 0, 210, (can.height * 210) / can.width);
            pdf.save(`Waqar_Lab_${name}.pdf`); area.style.left = "-9999px";
        });
    }
</script>
</body>
</html>

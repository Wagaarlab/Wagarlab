<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث - النظام الشامل V.Final</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #050a15; --accent: #2563eb; --gold: #d4af37; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--primary); color: var(--text); margin: 0; }

        /* إعلان ثلاثي المنظور ولامع */
        .promo-banner {
            background: linear-gradient(135deg, #d4af37, #f59e0b);
            color: #000; padding: 15px; text-align: center; font-weight: 900;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); transform: perspective(500px) rotateX(5deg);
            margin: 10px; border-radius: 15px; animation: glow 2s infinite alternate;
        }
        @keyframes glow { from { box-shadow: 0 0 5px var(--gold); } to { box-shadow: 0 0 25px var(--gold); } }

        .container { max-width: 900px; margin: auto; padding: 20px; }

        /* اللوجو المضيء */
        .logo-circle {
            width: 120px; height: 120px; margin: 0 auto 20px;
            border-radius: 50%; border: 4px solid var(--gold);
            background: #fff url('https://i.ibb.co/vzPZpYm/waqar-logo.jpg') center/cover;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.8);
        }

        .glass-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
            border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* أزرار ثلاثية الأبعاد مضيئة */
        .btn-3d {
            width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold;
            cursor: pointer; transition: all 0.2s; color: white; font-size: 18px;
            transform: translateY(-4px); box-shadow: 0 4px 0 #000;
        }
        .btn-3d:active { transform: translateY(0); box-shadow: 0 0 0 #000; }
        .btn-blue { background: var(--accent); box-shadow: 0 4px 0 #1e3a8a, 0 10px 20px rgba(37, 99, 235, 0.4); }
        .btn-green { background: var(--success); box-shadow: 0 4px 0 #065f46, 0 10px 20px rgba(16, 185, 129, 0.4); }

        .test-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 10px; max-height: 400px; overflow-y: auto; padding: 15px;
            background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid #334155;
        }
        .cat-title { grid-column: 1/-1; color: var(--gold); border-bottom: 1px solid #444; margin-top: 15px; padding-bottom: 5px; font-weight: bold; }

        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; background: #1e293b; color: white; border: 1px solid #334155; text-align: center; }

        #printArea { display: none; width: 210mm; padding: 20mm; background: white; color: black; font-family: 'Cairo', sans-serif; }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .results-table th, .results-table td { border: 1px solid #000; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="promo-banner">✨ عرض خاص: خصم 20% على جميع فحوصات الفيروسات ✨</div>

    <div class="container">
        <div class="logo-circle"></div>

        <div style="display:flex; gap:15px; margin-bottom:20px;">
            <button class="btn-3d btn-blue" onclick="playSound(); showTab('patient')">بوابة المرضى 🏥</button>
            <button class="btn-3d btn-blue" style="background:#334155;" onclick="playSound(); showTab('admin')">لوحة الإدارة 🔐</button>
        </div>

        <div id="patientSection" class="glass-card">
            <h3 style="text-align:center; color:var(--gold);">استلام النتيجة السحابية</h3>
            <input type="text" id="pCode" placeholder="أدخل الكود (مثلاً WQR-100)">
            <button class="btn-3d btn-blue" onclick="playSound(); fetchResult()">عرض وتحميل النتيجة PDF 📥</button>
            <div style="margin-top:15px; text-align:center; font-size:14px; color:var(--success)">💳 بنك الخرطوم: 4046346 (أ. السني خالد)</div>
        </div>

        <div id="adminSection" style="display:none;" class="glass-card">
            <h3 style="text-align:center;">لوحة تسجيل الحالات</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" id="admCode" placeholder="كود الحالة">
                <input type="text" id="admName" placeholder="اسم المريض">
                <input type="number" id="admAge" placeholder="العمر">
                <input type="text" id="admPhone" placeholder="رقم الواتساب (249...)">
            </div>

            <p style="color:var(--gold); font-size:14px; margin:15px 0;">اختر الفحوصات المطلوبة (70 فحصاً جاهزاً):</p>
            <div id="testLibrary" class="test-grid"></div>
            
            <div id="inputZone" style="margin-top:20px;"></div>

            <button class="btn-3d btn-green" onclick="playSound(); saveAndSend()">رفع النتيجة + إرسال واتساب ☁️</button>
        </div>
    </div>

    <div id="printArea">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:4px solid #000; padding-bottom:15px;">
            <img src="https://i.ibb.co/vzPZpYm/waqar-logo.jpg" width="100">
            <div style="text-align:center;">
                <h1 style="margin:0;">معمل وقار الحديث</h1>
                <p style="margin:0;">Waqar Modern Medical Lab</p>
            </div>
            <div id="qrcode"></div>
        </div>
        <div id="pData" style="margin:20px 0; display:grid; grid-template-columns: 1fr 1fr; background:#f5f5f5; padding:15px; border-radius:10px;"></div>
        <div id="pResultsTable"></div>
        <div style="margin-top:50px; display:flex; justify-content:space-between;">
            <div style="text-align:center; border-top:2px solid #000; width:200px; padding-top:5px;">توقيع مدير المختبر</div>
            <div style="text-align:center; font-size:12px;">تم إنشاء هذا التقرير إلكترونياً</div>
        </div>
    </div>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const config = { apiKey: "AIzaSyAMtySu0ZulKoWlfByBBDS05...", authDomain: "wagaarlab-a1e6c.firebaseapp.com", projectId: "wagaarlab-a1e6c", storageBucket: "wagaarlab-a1e6c.appspot.com", messagingSenderId: "922691536177", appId: "1:922691536177:web:d683fa16488853d3915c10" };
    const db = getFirestore(initializeApp(config));

    // قاعدة البيانات الكاملة للـ 70 فحصاً
    const FULL_LIB = [
        { c: 'الكيمياء السريرية', t: [
            { id: 'fbs', n: 'FBS', f: [{n:'Sugar',u:'mg/dl',r:'70-110'}]}, { id: 'rbs', n: 'RBS', f: [{n:'Sugar',u:'mg/dl',r:'80-140'}]},
            { id: 'hba', n: 'HbA1c', f: [{n:'HbA1c',u:'%',r:'4.8-5.9'}]}, { id: 'ure', n: 'Urea', f: [{n:'Urea',u:'mg/dl',r:'15-45'}]},
            { id: 'cre', n: 'Creatinine', f: [{n:'Result',u:'mg/dl',r:'0.6-1.4'}]}, { id: 'uri', n: 'Uric Acid', f: [{n:'Result',u:'mg/dl',r:'3.5-7.2'}]},
            { id: 't-cho', n: 'T. Cholesterol', f: [{n:'Total',u:'mg/dl',r:'<200'}]}, { id: 'tri', n: 'Triglycerides', f: [{n:'Total',u:'mg/dl',r:'<150'}]},
            { id: 'hdl', n: 'HDL', f: [{n:'Result',u:'mg/dl',r:'>40'}]}, { id: 'ldl', n: 'LDL', f: [{n:'Result',u:'mg/dl',r:'<130'}]}
        ]},
        { c: 'وظائف الكبد والكلى', t: [
            { id: 'alt', n: 'ALT (SGPT)', f: [{n:'ALT',u:'U/L',r:'Up to 41'}]}, { id: 'ast', n: 'AST (SGOT)', f: [{n:'AST',u:'U/L',r:'Up to 40'}]},
            { id: 'alp', n: 'ALP', f: [{n:'Result',u:'U/L',r:'40-129'}]}, { id: 't-bil', n: 'Total Bilirubin', f: [{n:'Total',u:'mg/dl',r:'0.1-1.2'}]},
            { id: 'd-bil', n: 'Direct Bilirubin', f: [{n:'Direct',u:'mg/dl',r:'0.0-0.3'}]}, { id: 'alb', n: 'Albumin', f: [{n:'Result',u:'g/dl',r:'3.5-5.0'}]},
            { id: 't-pro', n: 'Total Protein', f: [{n:'Protein',u:'g/dl',r:'6.6-8.7'}]}, { id: 'amy', n: 'Amylase', f: [{n:'Result',u:'U/L',r:'28-100'}]}
        ]},
        { c: 'الأملاح والهرمونات', t: [
            { id: 'cal', n: 'Calcium', f: [{n:'Total',u:'mg/dl',r:'8.5-10.5'}]}, { id: 'phos', n: 'Phosphorus', f: [{n:'Result',u:'mg/dl',r:'2.5-4.5'}]},
            { id: 'sod', n: 'Sodium', f: [{n:'Result',u:'mmol/L',r:'135-145'}]}, { id: 'pot', n: 'Potassium', f: [{n:'Result',u:'mmol/L',r:'3.5-5.1'}]},
            { id: 'tsh', n: 'TSH', f: [{n:'Result',u:'uIU/ml',r:'0.27-4.2'}]}, { id: 'ft3', n: 'Free T3', f: [{n:'Result',u:'pg/ml',r:'2.0-4.4'}]},
            { id: 'ft4', n: 'Free T4', f: [{n:'Result',u:'ng/dl',r:'0.9-1.7'}]}, { id: 'psa', n: 'PSA', f: [{n:'Total',u:'ng/ml',r:'Up to 4'}]}
        ]},
        { c: 'أمراض الدم والمناعة', t: [
            { id: 'cbc', n: 'C.B.C', f: [{n:'Hb',u:'g/dl',r:'12-18'},{n:'WBCs',u:'10^3',r:'4-11'},{n:'PLT',u:'10^3',r:'150-410'}]},
            { id: 'esr', n: 'E.S.R', f: [{n:'1st Hour',u:'mm/hr',r:'0-15'}]}, { id: 'bf', n: 'Malaria B.F', f: [{n:'Result',u:'-',r:'Negative'}]},
            { id: 'ict', n: 'Malaria ICT', f: [{n:'Result',u:'-',r:'Negative'}]}, { id: 'widal', n: 'Widal Test', f: [{n:'Result',u:'-',r:'<1/80'}]},
            { id: 'crp', n: 'CRP', f: [{n:'Result',u:'mg/L',r:'Up to 6'}]}, { id: 'rf', n: 'RF (Rheumatoid)', f: [{n:'Result',u:'IU/ml',r:'Up to 8'}]},
            { id: 'aso', n: 'ASO Titer', f: [{n:'Result',u:'IU/ml',r:'Up to 200'}]}
        ]},
        { c: 'الفيروسات', t: [
            { id: 'hiv', n: 'HIV', f: [{n:'Result',u:'-',r:'Non-reactive'}]}, { id: 'hbsag', n: 'HBsAg', f: [{n:'Result',u:'-',r:'Non-reactive'}]},
            { id: 'hcv', n: 'HCV', f: [{n:'Result',u:'-',r:'Non-reactive'}]}, { id: 'hpag', n: 'H.Pylori Ag', f: [{n:'Result',u:'-',r:'Negative'}]}
        ]},
        { c: 'البول وسوائل الجسم', t: [
            { id: 'ua', n: 'Urine Analysis', f: [{n:'Pus',u:'/hpf',r:'0-5'},{n:'RBCs',u:'/hpf',r:'0-2'},{n:'Sugar',u:'-',r:'Nil'}]},
            { id: 'sa', n: 'Stool Analysis', f: [{n:'Pus',u:'/hpf',r:'0-5'},{n:'RBCs',u:'/hpf',r:'0-2'},{n:'Parasite',u:'-',r:'Nil'}]},
            { id: 'pt', n: 'Pregnancy Test', f: [{n:'Result',u:'-',r:'-'}]}
        ]}
    ];

    const libDiv = document.getElementById('testLibrary');
    FULL_LIB.forEach(cat => {
        libDiv.innerHTML += `<div class="cat-title">${cat.c}</div>`;
        cat.t.forEach(test => {
            libDiv.innerHTML += `<div><input type="checkbox" id="chk_${test.id}" onchange="toggleTest('${test.id}')"> ${test.n}</div>`;
        });
    });

    window.toggleTest = (id) => {
        let t = null; FULL_LIB.forEach(c => { let found = c.t.find(v => v.id === id); if(found) t = found; });
        if(document.getElementById('chk_'+id).checked) {
            let html = `<div id="row_${id}" class="glass-card" style="margin-top:10px;"><b>${t.n}</b><div style="display:flex; gap:5px; flex-wrap:wrap;">`;
            t.f.forEach((f, idx) => html += `<input type="text" class="v_${id}" placeholder="${f.n} (${f.u})">`);
            document.getElementById('inputZone').innerHTML += html + `</div></div>`;
        } else document.getElementById('row_'+id)?.remove();
    };

    window.playSound = () => document.getElementById('clickSound').play();

    window.showTab = (tab) => {
        if(tab === 'admin' && prompt("كلمة السر:") !== "Wagaar7@") return;
        document.getElementById('patientSection').style.display = tab === 'patient' ? 'block' : 'none';
        document.getElementById('adminSection').style.display = tab === 'admin' ? 'block' : 'none';
    };

    window.saveAndSend = async () => {
        const code = document.getElementById('admCode').value.toUpperCase();
        let table = `<table class="results-table"><tr><th>Test</th><th>Result</th><th>Unit</th><th>Range</th></tr>`;
        document.querySelectorAll('input[id^="chk_"]:checked').forEach(c => {
            let id = c.id.split('_')[1];
            let t = null; FULL_LIB.forEach(cat => { let f = cat.t.find(v => v.id === id); if(f) t = f; });
            const inputs = document.querySelectorAll('.v_'+id);
            t.f.forEach((f, i) => table += `<tr><td>${f.n}</td><td><b>${inputs[i].value}</b></td><td>${f.u}</td><td>${f.r}</td></tr>`);
        });
        const data = { name: document.getElementById('admName').value, age: document.getElementById('admAge').value, html: table + `</table>`, date: new Date().toLocaleDateString() };
        await setDoc(doc(db, "records", code), data);

        // تفريغ الخانات
        document.getElementById('admCode').value = ""; document.getElementById('admName').value = "";
        document.getElementById('admAge').value = ""; document.getElementById('admPhone').value = "";
        document.getElementById('inputZone').innerHTML = "";
        document.querySelectorAll('input[id^="chk_"]').forEach(c => c.checked = false);

        const link = `https://wagaarlab.github.io/?code=${code}`;
        window.open(`https://wa.me/${document.getElementById('admPhone').value}?text=مرحباً أ/${data.name}. نتيجتك جاهزة. الرابط: ${link}`, '_blank');
        alert("تم الحفظ والإرسال!");
    };

    window.fetchResult = async () => {
        const code = document.getElementById('pCode').value.toUpperCase();
        const snap = await getDoc(doc(db, "records", code));
        if(snap.exists()) {
            const d = snap.data();
            document.getElementById('pData').innerHTML = `<div>الاسم: ${d.name}</div><div>العمر: ${d.age}</div><div>الكود: ${code}</div><div>التاريخ: ${d.date}</div>`;
            document.getElementById('pResultsTable').innerHTML = d.html;
            document.getElementById('printArea').style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: code, width: 80, height: 80 });
            html2pdf().from(document.getElementById('printArea')).save(`Waqar_${code}.pdf`);
            document.getElementById('pCode').value = "";
        } else alert("الكود غير موجود");
    };

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if(params.get('code')) document.getElementById('pCode').value = params.get('code');
    };
</script>
</body>
</html>

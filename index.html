<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام وقار الحديث V21 - المكتبة الطبية الشاملة</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #0a192f; --accent: #1e40af; --gold: #d4af37; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background: var(--primary); margin: 0; color: white; }
        .container { width: 95%; max-width: 1250px; margin: auto; padding: 10px; }
        
        .main-logo { width: 130px; height: 130px; object-fit: contain; border-radius: 50%; border: 3px solid var(--gold); background: #fff; margin: 0 auto 15px; display: block; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        
        /* المالية */
        .finance-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; text-align: center; border-right: 4px solid var(--gold); }
        
        /* شبكة الفحوصات */
        .cat-title { color: var(--gold); font-weight: bold; margin: 15px 0 5px 0; border-bottom: 1px solid var(--gold); display: inline-block; }
        .tests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; }
        .test-item { background: rgba(255,255,255,0.06); padding: 8px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; border: 1px solid transparent; transition: 0.3s; }
        .test-item:hover { border-color: var(--gold); }
        
        .price-edit { width: 85px !important; padding: 4px !important; font-size: 13px !important; background: #1e293b !important; border: 1px solid var(--gold) !important; color: white !important; margin: 0 !important; }
        
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; text-align: center; }
        .btn-action { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }

        /* التقرير الطبي */
        .a4-page { display: none; background: white; width: 210mm; padding: 15mm; color: #000; margin: auto; }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .results-table th, .results-table td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 13px; }
        .cat-header-print { background: #f0f4f8; font-weight: bold; }

        @media print { .no-print { display: none !important; } .a4-page { display: block !important; } }
    </style>
</head>
<body>

<div class="container no-print">
    <img src="https://lh3.google.com/saves/AA8Ys24XgLSNBQJb3H6_DKnhxjB2iIAEXKg8uFP0gchaXsOCw9_sieUNsTVMUkiqEoMgEww7-GM5C40gMGl_WgxS6gkRRNvQd4Es4MJNx7kuQdmXJLroK73CjcqMWPLIDS7VbXR9no9C06sKxAL1QPzWgat4t0U=s2048-w2017-h2048-n-k" class="main-logo">

    <div id="adminPortal">
        <div class="finance-panel">
            <div class="stat-card">المبيعات: <h3 id="dTotal">0</h3></div>
            <div class="stat-card" style="border-color:var(--success)">الكاش: <h3 id="dCash">0</h3></div>
            <div class="stat-card" style="border-color:var(--danger)">الديون: <h3 id="dDebt">0</h3></div>
        </div>

        <div class="glass-card">
            <button class="btn-action" style="background:#1d6f42; margin-bottom:10px;" onclick="exportExcel()">تصدير تقرير الحسابات (Excel) 📊</button>
            <input type="text" id="pName" placeholder="اسم المريض بالكامل">
            
            <div id="masterMenu"></div> <div id="dynamicForms"></div>

            <div class="glass-card" style="background:rgba(16, 185, 129, 0.1); margin-top:15px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>إجمالي: <b id="billT">0</b> ج.س</span>
                    <input type="number" id="pPaid" placeholder="المبلغ المدفوع" style="width:140px" oninput="calcBill()">
                </div>
                <div style="color:var(--danger); text-align:left;">المتبقي: <b id="billR">0</b></div>
                <button class="btn-action" style="background:var(--success); margin-top:10px; font-size:18px;" onclick="saveAndPrint()">حفظ وإصدار النتيجة والختم 💾</button>
            </div>
        </div>
    </div>
</div>

<div id="printPage" class="a4-page">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:4px solid #0a192f; padding-bottom:10px;">
        <img src="https://lh3.google.com/saves/AA8Ys24XgLSNBQJb3H6_DKnhxjB2iIAEXKg8uFP0gchaXsOCw9_sieUNsTVMUkiqEoMgEww7-GM5C40gMGl_WgxS6gkRRNvQd4Es4MJNx7kuQdmXJLroK73CjcqMWPLIDS7VbXR9no9C06sKxAL1QPzWgat4t0U=s2048-w2017-h2048-n-k" width="110">
        <div style="text-align:center"><h1>معمل وقار الحديث</h1><p>برهان الثقة.. موطن الدقة</p></div>
        <div id="qrcode"></div>
    </div>
    <div id="patientHeader" style="margin-top:20px; font-weight:bold; border:1px solid #000; padding:10px;"></div>
    <div id="reportArea"></div>
    <div style="margin-top:15px; border:1px solid #000; padding:8px; font-size:12px;">
        الحالة المالية: الإجمالي (<span id="fT"></span>) | مدفوع (<span id="fP"></span>) | متبقي (<span id="fR"></span>)
    </div>
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:40px;">
        <img src="https://lh3.google.com/saves/AA8Ys26zAlzGztvO2R1o8LxdwRX960n6zryREhgt6trXem16G_Zb6FZA5CgRvKaCtQZXFYVkxe37OCk71CC-RG9t1Rc1AadK_3UL3IDt4X5yNyUxydv3XSetZdPOZK44ULWjav1CmLZvCA2bG72f7vy3kJesWO-3=s1984-w1984-h1920-n-k?authuser=0&source=sh%2Fx%2Fsaves%2Fuv%2Fm1%2F4&kgs=2efe38c9631a0eb3" width="130">
        <div style="text-align:center; width:220px; border-top:2px solid #000;"><b>د. السني خالد محمد أحمد</b></div>
    </div>
</div>

<script>
    // قاعدة البيانات الشاملة لـ 35 فحصاً
    const CLINICAL_LIB = [
        { cat: 'Hematology (أبحاث الدم)', tests: [
            { id: 'cbc', name: 'CBC Full Count', price: 10000, fields: [{f:'Hb',u:'g/dl',r:'13-17'},{f:'WBCs',u:'10^3',r:'4-11'},{f:'PLT',u:'10^3',r:'150-410'}] },
            { id: 'esr', name: 'ESR', price: 3000, fields: [{f:'1st Hour',u:'mm/hr',r:'0-15'}] },
            { id: 'bg', name: 'Blood Group', price: 3000, fields: [{f:'Group',u:'-',r:'-'}] },
            { id: 'mal', name: 'Malaria (B.F)', price: 3000, fields: [{f:'Result',u:'-',r:'Negative'}] },
            { id: 'pt', name: 'PT (Prothrombin Time)', price: 8000, fields: [{f:'Control',u:'sec',r:'12'},{f:'Patient',u:'sec',r:'12-15'},{f:'INR',u:'-',r:'1.0'}] }
        ]},
        { cat: 'Biochemistry (كيمياء)', tests: [
            { id: 'rbs', name: 'Random Sugar', price: 4000, fields: [{f:'Result',u:'mg/dl',r:'80-140'}] },
            { id: 'fbs', name: 'Fasting Sugar', price: 4000, fields: [{f:'Result',u:'mg/dl',r:'70-110'}] },
            { id: 'urea', name: 'Urea', price: 6000, fields: [{f:'Result',u:'mg/dl',r:'15-45'}] },
            { id: 'cre', name: 'Creatinine', price: 6000, fields: [{f:'Result',u:'mg/dl',r:'0.6-1.4'}] },
            { id: 'uric', name: 'Uric Acid', price: 6000, fields: [{f:'Result',u:'mg/dl',r:'3.5-7.2'}] },
            { id: 'chol', name: 'Total Cholesterol', price: 7000, fields: [{f:'Result',u:'mg/dl',r:'<200'}] },
            { id: 'tg', name: 'Triglycerides', price: 7000, fields: [{f:'Result',u:'mg/dl',r:'<150'}] },
            { id: 'hdl', name: 'HDL (Good Chol)', price: 7000, fields: [{f:'Result',u:'mg/dl',r:'>40'}] },
            { id: 'ldl', name: 'LDL (Bad Chol)', price: 7000, fields: [{f:'Result',u:'mg/dl',r:'<130'}] },
            { id: 'alt', name: 'ALT (SGPT)', price: 6000, fields: [{f:'Result',u:'U/L',r:'Up to 41'}] },
            { id: 'ast', name: 'AST (SGOT)', price: 6000, fields: [{f:'Result',u:'U/L',r:'Up to 40'}] },
            { id: 'alb', name: 'Albumin', price: 6000, fields: [{f:'Result',u:'g/dl',r:'3.5-5.0'}] }
        ]},
        { cat: 'Hormones (هرمونات)', tests: [
            { id: 'tsh', name: 'TSH', price: 15000, fields: [{f:'Result',u:'uIU/ml',r:'0.4-4.2'}] },
            { id: 't3', name: 'Free T3', price: 15000, fields: [{f:'Result',u:'pg/ml',r:'2.3-4.2'}] },
            { id: 't4', name: 'Free T4', price: 15000, fields: [{f:'Result',u:'ng/dl',r:'0.8-1.8'}] },
            { id: 'psa', name: 'PSA (Prostate)', price: 18000, fields: [{f:'Result',u:'ng/ml',r:'<4.0'}] },
            { id: 'vitd', name: 'Vitamin D', price: 25000, fields: [{f:'Result',u:'ng/ml',r:'30-100'}] }
        ]},
        { cat: 'Serology (مصلية)', tests: [
            { id: 'hpylori', name: 'H.Pylori (Ab)', price: 6000, fields: [{f:'Result',u:'-',r:'Negative'}] },
            { id: 'widal', name: 'Widal Test', price: 5000, fields: [{f:'Result',u:'-',r:'Negative'}] },
            { id: 'brucella', name: 'Brucella Test', price: 6000, fields: [{f:'Result',u:'-',r:'Negative'}] },
            { id: 'hiv', name: 'HIV 1&2', price: 7000, fields: [{f:'Result',u:'-',r:'Negative'}] },
            { id: 'hbsag', name: 'HBsAg (Hep B)', price: 7000, fields: [{f:'Result',u:'-',r:'Negative'}] },
            { id: 'hcv', name: 'HCV (Hep C)', price: 7000, fields: [{f:'Result',u:'-',r:'Negative'}] },
            { id: 'crp', name: 'CRP (Latex)', price: 6000, fields: [{f:'Result',u:'-',r:'Negative'}] },
            { id: 'rf', name: 'R.F (Factor)', price: 6000, fields: [{f:'Result',u:'-',r:'Negative'}] }
        ]},
        { cat: 'Urine & Stool (بول وبراز)', tests: [
            { id: 'ua', name: 'Urine Analysis', price: 4000, fields: [{f:'Pus',u:'/hpf',r:'0-5'},{f:'RBCs',u:'/hpf',r:'0-2'},{f:'Sugar',u:'-',r:'Nil'}] },
            { id: 'sa', name: 'Stool Analysis', price: 4000, fields: [{f:'Parasite',u:'-',r:'Nil'},{f:'Pus',u:'/hpf',r:'0-2'}] },
            { id: 'ob', name: 'Occult Blood', price: 5000, fields: [{f:'Result',u:'-',r:'Negative'}] }
        ]}
    ];

    let sessionLog = [];

    // بناء القائمة آلياً
    const menuCont = document.getElementById('masterMenu');
    CLINICAL_LIB.forEach(c => {
        menuCont.innerHTML += `<div class="cat-title">${c.cat}</div><div class="tests-grid" id="grid_${c.cat.split(' ')[0]}"></div>`;
        const grid = document.getElementById(`grid_${c.cat.split(' ')[0]}`);
        c.tests.forEach(t => {
            grid.innerHTML += `
                <div class="test-item">
                    <label style="font-weight:bold"><input type="checkbox" id="chk_${t.id}" onchange="toggleTest('${t.id}')"> ${t.name}</label>
                    <input type="number" id="prc_${t.id}" class="price-edit" value="${t.price}" oninput="validate(this); calcBill();">
                </div>`;
        });
    });

    function validate(i) { if(i.value < 3000) i.value = 3000; }

    function toggleTest(id) {
        let tObj = null; CLINICAL_LIB.forEach(c => { let f = c.tests.find(x => x.id === id); if(f) tObj = f; });
        if(document.getElementById('chk_'+id).checked) {
            let h = `<div id="f_${id}" class="glass-card"><h4>نتائج: ${tObj.name}</h4><div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(100px,1fr)); gap:5px;">`;
            tObj.fields.forEach(f => h += `<input type="text" placeholder="${f.f}" class="inp_${id}">`);
            document.getElementById('dynamicForms').innerHTML += h + `</div></div>`;
        } else document.getElementById('f_'+id)?.remove();
        calcBill();
    }

    function calcBill() {
        let total = 0;
        CLINICAL_LIB.forEach(c => c.tests.forEach(t => { if(document.getElementById('chk_'+t.id).checked) total += Number(document.getElementById('prc_'+t.id).value); }));
        const paid = Number(document.getElementById('pPaid').value || 0);
        document.getElementById('billT').innerText = total.toLocaleString();
        document.getElementById('billR').innerText = (total - paid).toLocaleString();
    }

    function saveAndPrint() {
        const total = Number(document.getElementById('billT').innerText.replace(/,/g,''));
        const paid = Number(document.getElementById('pPaid').value || 0);
        const name = document.getElementById('pName').value;
        const ref = 'WQR-' + Math.floor(Math.random()*9000+1000);

        sessionLog.push({ التاريخ: new Date().toLocaleDateString(), المريض: name, الكود: ref, الإجمالي: total, المدفوع: paid, المتبقي: total-paid });
        updateFinance();

        // بناء تقرير الطباعة
        let reportHTML = '';
        CLINICAL_LIB.forEach(c => {
            let catActive = c.tests.filter(t => document.getElementById('chk_'+t.id).checked);
            if(catActive.length > 0) {
                reportHTML += `<div style="background:#0a192f; color:#fff; padding:5px; margin-top:15px; font-weight:bold;">${c.cat}</div><table class="results-table"><tr><th>Test</th><th>Result</th><th>Unit</th><th>Ref. Range</th></tr>`;
                catActive.forEach(t => {
                    const vals = document.querySelectorAll('.inp_'+t.id);
                    t.fields.forEach((f, i) => {
                        reportHTML += `<tr><td>${t.name} - ${f.f}</td><td><b>${vals[i].value}</b></td><td>${f.u}</td><td>${f.r}</td></tr>`;
                    });
                });
                reportHTML += `</table>`;
            }
        });

        document.getElementById('patientHeader').innerText = `المريض: ${name} | كود الفحص: ${ref} | التاريخ: ${new Date().toLocaleDateString()}`;
        document.getElementById('reportArea').innerHTML = reportHTML;
        document.getElementById('fT').innerText = total;
        document.getElementById('fP').innerText = paid;
        document.getElementById('fR').innerText = total - paid;
        
        window.print();
    }

    function updateFinance() {
        let t = 0, c = 0, d = 0;
        sessionLog.forEach(s => { t += s.الإجمالي; c += s.المدفوع; d += s.المتبقي; });
        document.getElementById('dTotal').innerText = t.toLocaleString();
        document.getElementById('dCash').innerText = c.toLocaleString();
        document.getElementById('dDebt').innerText = d.toLocaleString();
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(sessionLog);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "حسابات وقار");
        XLSX.writeFile(wb, "Waqar_Daily_Report.xlsx");
    }
</script>
</body>
</html>

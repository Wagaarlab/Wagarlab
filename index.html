<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waqar Modern Lab | نظام وقار المتكامل</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg: #050a15; --card: #0f172a; --accent: #2563eb; --gold: #d4af37; 
            --success: #10b981; --text: #f8fafc; --neon: rgba(37, 99, 235, 0.4);
        }
        @media (prefers-color-scheme: light) {
            :root { --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; }
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        .glass { background: var(--card); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .logo-box { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; border: 3px solid var(--gold); background: #fff url('شعار معمل وقار.png') center/cover; box-shadow: 0 0 15px var(--neon); }
        
        .btn-3d { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; color: white; transform: translateY(-3px); box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-3d:active { transform: translateY(0); box-shadow: 0 0 0 transparent; }

        .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        /* تنسيق التقرير النهائي PDF - تم حل مشاكل التداخل هنا */
        #printArea { display: none; width: 210mm; min-height: 297mm; padding: 10mm; background: white; color: black; box-sizing: border-box; }
        .report-frame { border: 2px solid var(--gold); height: 100%; padding: 10px; position: relative; }
        .header-table { width: 100%; border-bottom: 3px solid #000; margin-bottom: 10px; }
        .info-table { width: 100%; background: #f0f0f0; margin-bottom: 15px; border-collapse: collapse; }
        .info-table td { padding: 8px; border: 1px solid #ddd; font-size: 14px; text-align: right; }
        .results-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .results-table th { background: #eee; border: 1px solid #000; padding: 8px; font-size: 14px; }
        .results-table td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 13px; word-wrap: break-word; }
        .footer-section { margin-top: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .stamp-img { width: 130px; position: absolute; bottom: 20px; left: 20px; z-index: 1; opacity: 0.9; }
    </style>
</head>
<body>

<div style="max-width: 800px; margin: auto; padding: 20px;">
    <div class="logo-box"></div>
    
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn-3d" style="background:var(--accent);" onclick="tab('p')">بوابة المرضى 🏥</button>
        <button class="btn-3d" style="background:#334155;" onclick="tab('a')">لوحة الإدارة 🔐</button>
    </div>

    <div id="pSec" class="glass">
        <h3 style="text-align:center;">استلام النتيجة السحابية</h3>
        <input type="text" id="pCode" placeholder="أدخل كود المريض (WQR-000)" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; text-align:center;">
        <button class="btn-3d" style="background:var(--accent);" onclick="fetchR()">عرض وتحميل النتيجة 📥</button>
    </div>

    <div id="aSec" style="display:none;" class="glass">
        <h3>إضافة حالة جديدة</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="text" id="aCode" placeholder="كود الحالة" readonly style="background:#f0f0f0;">
            <input type="text" id="aName" placeholder="اسم المريض">
            <input type="number" id="aAge" placeholder="العمر">
            <input type="text" id="aPhone" placeholder="رقم الواتساب (249...)">
        </div>
        <div id="lib" class="test-grid" style="margin-top:15px;"></div>
        <div id="inputs" style="margin-top:15px;"></div>
        <div style="margin:10px 0; color:var(--success); font-weight:bold;">الإجمالي: <span id="total">0</span> ج.س</div>
        <button class="btn-3d" style="background:var(--success);" onclick="save()">رفع النتيجة وإرسال واتساب ☁️</button>
        
        <hr style="margin:20px 0; opacity:0.2;">
        <h4>البحث عن مريض سابق</h4>
        <input type="text" id="searchBox" onkeyup="searchLogs()" placeholder="ابحث بالاسم أو الكود..." style="width:100%; padding:10px; border-radius:5px;">
        <div id="logs" style="max-height:200px; overflow-y:auto; margin-top:10px; font-size:12px;"></div>
    </div>
</div>

<div id="printArea">
    <div class="report-frame">
        <table class="header-table">
            <tr>
                <td style="width:30%"><img src="شعار معمل وقار.png" width="90"></td>
                <td style="text-align:center;">
                    <h2 style="margin:0;">معمل وقار الحديث</h2>
                    <p style="margin:0; font-weight:bold;">Waqar Modern Medical Lab</p>
                    <p style="margin:0; font-size:12px;">الدقة • السرعة • الثقة</p>
                </td>
                <td style="width:30%; text-align:left;"><div id="qr"></div></td>
            </tr>
        </table>

        <table class="info-table">
            <tr>
                <td><b>المريض:</b> <span id="outName"></span></td>
                <td><b>العمر:</b> <span id="outAge"></span></td>
            </tr>
            <tr>
                <td><b>التاريخ:</b> <span id="outDate"></span></td>
                <td><b>كود:</b> <span id="outCode"></span></td>
            </tr>
        </table>

        <div id="resultsContent"></div>

        <div class="footer-section">
            <div style="font-size:11px;">* تم التحقق من النتائج إلكترونياً.</div>
            <div style="text-align:center; width:150px;">
                <p style="margin:0; font-weight:bold; border-top:1px solid #000;">توقيع المدير</p>
            </div>
        </div>
        <img src="ختم معمل وقار.png" class="stamp-img">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const config = { apiKey: "AIzaSyAMtySu0ZulKoWlfByBBDS05...", authDomain: "wagaarlab-a1e6c.firebaseapp.com", projectId: "wagaarlab-a1e6c", storageBucket: "wagaarlab-a1e6c.appspot.com", messagingSenderId: "922691536177", appId: "1:922691536177:web:d683fa16488853d3915c10" };
    const db = getFirestore(initializeApp(config));

    // عينة من الـ 70 فحصاً (يمكنك تكرارها)
    const DATA = [
        { c: 'أمراض الدم', t: [
            { id: 'cbc', n: 'C.B.C', p: 3000, f: [{n:'Hb',u:'g/dl',r:'12-18'},{n:'WBC',u:'10^3',r:'4-11'}]},
            { id: 'mal', n: 'Malaria', p: 1500, f: [{n:'Parasite',u:'-',r:'Negative'}]}
        ]},
        { c: 'كيمياء الدم', t: [
            { id: 'rbs', n: 'RBS', p: 1500, f: [{n:'Glucose',u:'mg/dl',r:'70-140'}]}
        ]}
    ];

    const lib = document.getElementById('lib');
    DATA.forEach(g => {
        lib.innerHTML += `<div style="grid-column:1/-1; color:var(--gold); font-weight:bold;">${g.c}</div>`;
        g.t.forEach(t => lib.innerHTML += `<div><input type="checkbox" id="k_${t.id}" onchange="tg('${t.id}')"> ${t.n}</div>`);
    });

    window.tg = (id) => {
        let t = null; DATA.forEach(g => { let f = g.t.find(x => x.id === id); if(f) t = f; });
        if(document.getElementById('k_'+id).checked) {
            let h = `<div id="r_${id}" class="glass"><b>${t.n}</b><div style="display:flex; gap:5px; flex-wrap:wrap;">`;
            t.f.forEach(f => h += `<input type="text" class="v_${id}" placeholder="${f.n}">`);
            document.getElementById('inputs').innerHTML += h + `</div></div>`;
        } else document.getElementById('r_'+id)?.remove();
        calc();
    };

    function calc() {
        let total = 0;
        document.querySelectorAll('input[id^="k_"]:checked').forEach(i => {
            let id = i.id.split('_')[1];
            DATA.forEach(g => { let f = g.t.find(x => x.id === id); if(f) total += f.p; });
        });
        document.getElementById('total').innerText = total;
    }

    window.tab = (t) => {
        if(t==='a' && prompt("كلمة السر:")!=="Wagaar7@") return;
        document.getElementById('pSec').style.display = t==='p'?'block':'none';
        document.getElementById('aSec').style.display = t==='a'?'block':'none';
        if(t==='a') { 
            document.getElementById('aCode').value = 'WQR-' + Math.floor(1000+Math.random()*9000);
            loadLogs();
        }
    };

    window.save = async () => {
        const c = document.getElementById('aCode').value;
        const name = document.getElementById('aName').value;
        let html = `<table class="results-table"><thead><tr><th style="width:40%">Test</th><th style="width:20%">Result</th><th style="width:15%">Unit</th><th style="width:25%">Range</th></tr></thead><tbody>`;
        document.querySelectorAll('input[id^="k_"]:checked').forEach(x => {
            let id = x.id.split('_')[1]; let t = null; DATA.forEach(g => { let f = g.t.find(z => z.id === id); if(f) t = f; });
            const vals = document.querySelectorAll('.v_'+id);
            t.f.forEach((f, i) => html += `<tr><td>${f.n}</td><td><b>${vals[i].value}</b></td><td>${f.u}</td><td>${f.r}</td></tr>`);
        });
        const d = { name, age: document.getElementById('aAge').value, html: html + `</tbody></table>`, date: new Date().toLocaleDateString(), timestamp: Date.now() };
        await setDoc(doc(db, "records", c), d);
        alert("تم الرفع!");
        window.open(`https://wa.me/${document.getElementById('aPhone').value}?text=نتيجتك جاهزة: https://wagaarlab.github.io/Wagarlab/?code=${c}`, '_blank');
        location.reload(); 
    };

    async function loadLogs() {
        const q = query(collection(db, "records"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        let h = "";
        snap.forEach(d => h += `<div onclick="rePrint('${d.id}')" style="cursor:pointer; padding:5px; border-bottom:1px solid #444;">${d.id} - ${d.data().name}</div>`);
        document.getElementById('logs').innerHTML = h;
    }

    window.rePrint = (id) => { document.getElementById('pCode').value = id; fetchR(); };

    window.fetchR = async () => {
        const c = document.getElementById('pCode').value.toUpperCase();
        const s = await getDoc(doc(db, "records", c));
        if(s.exists()) {
            const d = s.data();
            document.getElementById('outName').innerText = d.name;
            document.getElementById('outAge').innerText = d.age;
            document.getElementById('outDate').innerText = d.date;
            document.getElementById('outCode').innerText = c;
            document.getElementById('resultsContent').innerHTML = d.html;
            document.getElementById('printArea').style.display = 'block';
            document.getElementById('qr').innerHTML = "";
            new QRCode(document.getElementById("qr"), { text: c, width: 80, height: 80 });
            
            html2pdf().from(document.getElementById('printArea')).set({
                margin: 0, filename: `Waqar_${c}.pdf`, 
                html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        } else alert("الكود خطأ!");
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام وقار الحديث V26 - الإصدار المعتمد</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #0a192f; --accent: #1e40af; --gold: #d4af37; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Cairo', sans-serif; background: var(--primary); margin: 0; color: white; }
        .container { width: 95%; max-width: 1200px; margin: auto; padding: 20px 10px; }
        .main-logo { width: 150px; height: 150px; object-fit: contain; border-radius: 50%; border: 3px solid var(--gold); background: #fff; margin: 0 auto 20px; display: block; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 25px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .nav-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid var(--accent); cursor: pointer; background: transparent; color: white; font-weight: bold; }
        .nav-btn.active { background: var(--accent); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #334155; text-align: center; font-family: 'Cairo'; }
        .btn-action { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 16px; }

        /* تنسيق التقرير للتحميل والطباعة */
        #printPage { display: none; background: white; width: 210mm; padding: 15mm; color: #000; margin: auto; position: relative; }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .results-table th, .results-table td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 13px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0a192f; padding-bottom: 10px; }
        
        @media print { .no-print { display: none !important; } #printPage { display: block !important; } }
    </style>
</head>
<body>

<div class="container no-print">
    <img src="https://waqaarlab.github.io/W/210350.png" class="main-logo" alt="لوجو وقار الحديث" onerror="this.src='https://raw.githubusercontent.com/Alsunni/Logo/main/waqar.png'">

    <div class="nav-tabs">
        <button id="tabP" class="nav-btn active" onclick="showTab('patient')">بوابة المرضى 🏥</button>
        <button id="tabA" class="nav-btn" onclick="showTab('admin')">لوحة الإدارة 🔐</button>
    </div>

    <div id="sectionPatient" class="glass-card" style="text-align: center;">
        <h2 style="color:var(--gold)">استلام النتيجة الطبية</h2>
        <input type="text" id="searchCode" placeholder="WQR-7103" style="text-transform: uppercase; font-size: 24px;">
        <button class="btn-action" style="background:var(--accent); margin-top:15px;" onclick="patientSearch()">عرض النتيجة وتحميل PDF 📥</button>
    </div>

    <div id="sectionAdmin" style="display:none">
        <div class="glass-card">
            <h3>إضافة مريض جديد</h3>
            <input type="text" id="admName" placeholder="اسم المريض">
            <input type="text" id="admPhone" placeholder="رقم واتساب (مثال: 249...)">
            <div id="masterTests"></div> <div id="inputForms"></div>
            <button class="btn-action" style="background:var(--success); margin-top:15px;" onclick="saveNewCase()">حفظ وإرسال تنبيه 💾</button>
        </div>
    </div>
</div>

<div id="printPage">
    <div class="header-box">
        <img src="https://waqaarlab.github.io/W/210350.png" width="100" style="object-fit: contain;">
        <div style="text-align:center">
            <h1 style="margin:0; font-size: 24px;">معمل وقار الحديث</h1>
            <p style="margin:0;">برهان الثقة.. موطن الدقة</p>
        </div>
        <div id="qrcode"></div>
    </div>
    
    <div id="prHeader" style="margin-top:20px; font-weight:bold; border:1px solid #000; padding:10px; background:#f9f9f9;"></div>
    <div id="prResultsArea"></div>
    
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:50px;">
        <div style="text-align:center; width:250px; border-top:2px solid #000; padding-top:5px;">
            <b>د. السني خالد محمد أحمد</b><br><small>مدير المختبر</small>
        </div>
        <img src="https://waqaarlab.github.io/W/210488.png" width="130" style="opacity: 0.9;">
    </div>
</div>

<script>
    // الإعدادات الأساسية
    const ADMIN_PASS = "Wagaar7@";
    let database = JSON.parse(localStorage.getItem('waqar_db_final')) || [];

    function showTab(tab) {
        if(tab === 'admin') {
            if(prompt("رمز الدخول للإدارة:") !== ADMIN_PASS) return alert("خطأ في الرمز!");
            document.getElementById('sectionAdmin').style.display = 'block';
            document.getElementById('sectionPatient').style.display = 'none';
        } else {
            document.getElementById('sectionAdmin').style.display = 'none';
            document.getElementById('sectionPatient').style.display = 'block';
        }
    }

    function patientSearch() {
        const code = document.getElementById('searchCode').value.toUpperCase();
        const p = database.find(x => x.code === code);
        
        if(p) {
            document.getElementById('prHeader').innerText = `المريض: ${p.name} | الكود: ${p.code} | التاريخ: ${p.date}`;
            document.getElementById('prResultsArea').innerHTML = p.resultsHTML;
            document.getElementById('printPage').style.display = 'block';
            
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: p.code, width: 80, height: 80 });

            // ميكانيكية التحميل المحدثة لضمان الصور
            const element = document.getElementById('printPage');
            const opt = {
                margin: [10, 10],
                filename: `Waqar_Result_${p.code}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                console.log("PDF Generated Successfully");
            });
        } else {
            alert("الكود غير موجود في السجلات.");
        }
    }

    // هنا تضع وظائف الحفظ (saveNewCase) وبناء قائمة الفحوصات (35 فحصاً) كما في النسخ السابقة لضمان استقرار العمل.
</script>
</body>
</html>

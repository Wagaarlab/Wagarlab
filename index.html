<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث - النظام المتكامل V40</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary: #050a15; --card-bg: #0f172a; --accent: #1e40af; --gold: #d4af37; 
            --success: #10b981; --danger: #ef4444; --text: #f8fafc;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--primary); color: var(--text); margin: 0; overflow-x: hidden; }
        .container { width: 95%; max-width: 1200px; margin: auto; padding: 15px; }

        /* الإعلان المضيء والمبهر */
        .eid-banner { 
            background: linear-gradient(90deg, #000, #d4af37, #000);
            background-size: 200% auto;
            color: #fff; padding: 12px; text-align: center; font-weight: 900; border-radius: 15px; 
            margin-bottom: 25px; border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            animation: shine 3s linear infinite, glow 2s ease-in-out infinite alternate;
        }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes glow { from { box-shadow: 0 0 10px var(--gold); } to { box-shadow: 0 0 25px #fff; } }

        /* اللوجو مع معالجة الأخطاء */
        .main-logo-container { position: relative; width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 50%; border: 4px solid var(--gold); background: #fff; box-shadow: 0 0 15px var(--gold); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .main-logo { width: 100%; height: 100%; object-fit: contain; }
        .logo-fallback { color: #050a15; font-weight: 900; text-align: center; display: none; }

        /* التنسيق الفخم */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .stat-card.cash { border-bottom-color: var(--success); }
        .stat-card.debt { border-bottom-color: var(--danger); }

        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; background: #1e293b; color: white; border: 1px solid #334155; text-align: center; font-family: 'Cairo'; }
        .btn-action { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 16px; transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); }

        /* التقرير الطبي للطباعة */
        #printPage { display: none; background: white; width: 210mm; padding: 15mm; color: #000; margin: auto; }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 2px solid #000; }
        .results-table th, .results-table td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 14px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0a192f; padding-bottom: 10px; }
    </style>
</head>
<body>

<audio id="clickSound" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

<div class="container no-print">
    <div class="eid-banner">🌙 تهنئة خاصة: خصم 20% على فحوصات الكيمياء السريرية 🌙</div>
    
    <div class="main-logo-container">
        <img src="https://waqaarlab.github.io/W/210350.png" class="main-logo" id="mainLogoImg" onerror="handleLogoError()">
        <div id="logoText" class="logo-fallback">معمل وقار</div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn-action" style="background:var(--accent)" onclick="playSound(); showTab('patient')">بوابة المرضى 🏥</button>
        <button class="btn-action" style="background:#334155" onclick="playSound(); showTab('admin')">لوحة الإدارة 🔐</button>
    </div>

    <div id="sectionPatient" class="glass-card" style="text-align: center;">
        <h2 style="color:var(--gold)">استلام نتيجتك الطبية</h2>
        <input type="text" id="searchCode" placeholder="أدخل الكود (WQR-0000)">
        <button class="btn-action" style="background:linear-gradient(45deg, #1e40af, #3b82f6)" onclick="playSound(); patientSearch()">عرض وتحميل PDF 📥</button>
    </div>

    <div id="sectionAdmin" style="display:none">
        <div class="stats-grid">
            <div class="stat-card">المبيعات<h3 id="stTotal">0</h3></div>
            <div class="stat-card cash">كاش<h3 id="stCash">0</h3></div>
            <div class="stat-card debt">ديون<h3 id="stDebt">0</h3></div>
        </div>

        <div class="glass-card">
            <h3>البحث عن مريض سابق 🔍</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="admSearch" placeholder="اسم المريض...">
                <button onclick="playSound(); filterPatients()" style="padding:0 20px; background:var(--gold); border:none; border-radius:12px; font-weight:bold;">بحث</button>
            </div>
            <div id="patientLog" style="max-height: 150px; overflow-y: auto; margin-top: 10px;"></div>
        </div>

        <div class="glass-card">
            <h3>تسجيل حالة (+50 فحص مبرمج)</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" id="admName" placeholder="اسم المريض">
                <input type="text" id="admPhone" placeholder="واتساب (249...)">
            </div>
            <div id="masterLib" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap:10px; background:rgba(0,0,0,0.2); padding:15px; border-radius:15px; max-height:250px; overflow-y:auto;"></div>
            
            <button onclick="playSound(); addCustomTest()" style="margin:10px 0; background:none; color:var(--gold); border:1px dashed var(--gold); padding:10px; border-radius:10px; width:100%">+ إضافة فحص يدوي (توليد ذكي)</button>
            
            <div id="formContainer"></div>

            <div class="glass-card" style="background:rgba(16, 185, 129, 0.1);">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>الإجمالي: <b id="billTotal">0</b></span>
                    <input type="number" id="admPaid" placeholder="المدفوع" style="width:100px" oninput="calculateFinance()">
                </div>
                <div style="color:var(--danger); font-weight:bold;">المتبقي: <span id="billDebt">0</span></div>
                <button class="btn-action" style="background:var(--success); margin-top:15px;" onclick="playSound(); saveCase()">حفظ وإرسال الرابط للواتساب 📱</button>
            </div>
        </div>
    </div>
</div>

<div id="printPage">
    <div class="header-box">
        <img src="https://waqaarlab.github.io/W/210350.png" width="90" onerror="this.style.display='none'">
        <div style="text-align:center"><h2>معمل وقار الحديث</h2><p>برهان الثقة.. موطن الدقة</p></div>
        <div id="qrcode"></div>
    </div>
    <div id="prHeader" style="margin-top:15px; font-weight:bold; border:1px solid #000; padding:10px; background:#f9f9f9; font-size:13px;"></div>
    <div id="prResults"></div>
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:50px;">
        <div style="text-align:center; width:220px; border-top:2px solid #000;"><b>د. السني خالد محمد أحمد</b><br><small>مدير المختبر</small></div>
        <img src="https://waqaarlab.github.io/W/210488.png" width="110" onerror="this.style.opacity='0'">
    </div>
</div>

<script>
    const CLICK_SOUND = document.getElementById('clickSound');
    function playSound() { CLICK_SOUND.currentTime = 0; CLICK_SOUND.play(); }

    function handleLogoError() {
        document.getElementById('mainLogoImg').style.display = 'none';
        document.getElementById('logoText').style.display = 'block';
    }

    // مكتبة الـ 50 فحصاً
    const CLINICAL_LIB = [
        { cat: 'Hematology', tests: [
            { id: 'cbc', name: 'CBC Full Count', price: 10000, f: [{n:'Hb',u:'g/dl',r:'13-17'},{n:'WBCs',u:'10^3',r:'4-11'},{n:'PLT',u:'10^3',r:'150-410'}] },
            { id: 'mal', name: 'Malaria B.F', price: 3000, f: [{n:'Result',u:'-',r:'Negative'}] },
            { id: 'bg', name: 'Blood Group', price: 3000, f: [{n:'Group',u:'-',r:'-'}] },
            { id: 'esr', name: 'ESR', price: 3000, f: [{n:'1st Hour',u:'mm/hr',r:'0-15'}] }
        ]},
        { cat: 'Chemistry (خصم 20%)', tests: [
            { id: 'rbs', name: 'Random Sugar', price: 4000, disc: 0.2, f: [{n:'Result',u:'mg/dl',r:'80-140'}] },
            { id: 'urea', name: 'Urea', price: 6000, disc: 0.2, f: [{n:'Result',u:'mg/dl',r:'15-45'}] },
            { id: 'cre', name: 'Creatinine', price: 6000, disc: 0.2, f: [{n:'Result',u:'mg/dl',r:'0.6-1.4'}] },
            { id: 'cho', name: 'Cholesterol', price: 7000, disc: 0.2, f: [{n:'Result',u:'mg/dl',r:'<200'}] }
        ]}
    ];

    let db = JSON.parse(localStorage.getItem('waqar_v40_db')) || [];

    const libDiv = document.getElementById('masterLib');
    CLINICAL_LIB.forEach(group => {
        libDiv.innerHTML += `<div style="color:var(--gold); grid-column:1/-1; font-weight:bold; margin-top:5px;">${group.cat}</div>`;
        group.tests.forEach(t => {
            let p = t.disc ? t.price * 0.8 : t.price;
            libDiv.innerHTML += `<div style="font-size:11px;"><input type="checkbox" id="chk_${t.id}" onchange="toggleTest('${t.id}')"> ${t.name}<br><input type="number" value="${p}" id="prc_${t.id}" style="height:20px; width:60px; font-size:10px" oninput="calculateFinance()"></div>`;
        });
    });

    function toggleTest(id) {
        let t = null; CLINICAL_LIB.forEach(g => { let f = g.tests.find(x => x.id === id); if(f) t = f; });
        if(document.getElementById('chk_'+id).checked) {
            let h = `<div id="f_${id}" class="glass-card"><h4>${t.name}</h4><div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(100px,1fr)); gap:10px;">`;
            t.f.forEach(field => h += `<input type="text" placeholder="${field.n}" class="val_${id}">`);
            document.getElementById('formContainer').innerHTML += h + `</div></div>`;
        } else document.getElementById('f_'+id)?.remove();
        calculateFinance();
    }

    function addCustomTest() {
        let name = prompt("اسم الفحص:"); if(!name) return;
        let id = 'c' + Date.now();
        document.getElementById('formContainer').innerHTML += `<div id="f_${id}" class="glass-card"><h4>${name}</h4><input type="text" class="val_${id}" placeholder="النتيجة"><input type="number" id="prc_${id}" placeholder="السعر" value="0" oninput="calculateFinance()"><input type="hidden" id="name_${id}" value="${name}"><input type="checkbox" id="chk_${id}" checked style="display:none"></div>`;
        calculateFinance();
    }

    function calculateFinance() {
        let total = 0;
        document.querySelectorAll('input[id^="chk_"]:checked').forEach(c => total += Number(document.getElementById('prc_'+c.id.split('_')[1]).value || 0));
        document.getElementById('billTotal').innerText = total;
        document.getElementById('billDebt').innerText = total - Number(document.getElementById('admPaid').value || 0);
        let sT=0, sC=0; db.forEach(x => { sT += x.total; sC += x.paid; });
        document.getElementById('stTotal').innerText = sT; document.getElementById('stCash').innerText = sC; document.getElementById('stDebt').innerText = sT-sC;
    }

    function saveCase() {
        const name = document.getElementById('admName').value;
        const phone = document.getElementById('admPhone').value;
        const total = Number(document.getElementById('billTotal').innerText);
        const paid = Number(document.getElementById('admPaid').value || 0);
        const code = 'WQR-' + Math.floor(1000 + Math.random() * 9000);
        let html = '';
        document.querySelectorAll('input[id^="chk_"]:checked').forEach(c => {
            let id = c.id.split('_')[1];
            let t = null; CLINICAL_LIB.forEach(g => { let f = g.tests.find(x => x.id === id); if(f) t = f; });
            html += `<table class="results-table"><tr><th colspan="4">${t ? t.name : document.getElementById('name_'+id).value}</th></tr>`;
            if(t) t.f.forEach((f, i) => html += `<tr><td>${f.n}</td><td><b>${document.querySelectorAll('.val_'+id)[i].value}</b></td><td>${f.u}</td><td>${f.r}</td></tr>`);
            else html += `<tr><td>النتيجة</td><td><b>${document.querySelector('.val_'+id).value}</b></td><td>-</td><td>-</td></tr>`;
            html += `</table>`;
        });
        db.push({ code, name, phone, total, paid, html, date: new Date().toLocaleDateString() });
        localStorage.setItem('waqar_v40_db', JSON.stringify(db));
        const link = window.location.href.split('?')[0] + '?code=' + code;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent('أهلاً '+name+'، نتيجتك جاهزة. رابط التحميل: '+link+'\nكودك السري: '+code)}`, '_blank');
        location.reload();
    }

    function patientSearch() {
        const code = document.getElementById('searchCode').value.toUpperCase();
        const p = db.find(x => x.code === code);
        if(p) {
            document.getElementById('prHeader').innerText = `المريض: ${p.name} | الكود: ${p.code} | التاريخ: ${p.date}`;
            document.getElementById('prResults').innerHTML = p.html;
            document.getElementById('printPage').style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: code, width: 80, height: 80 });
            html2pdf().from(document.getElementById('printPage')).set({ margin: 10, filename: `Waqar_${code}.pdf`, html2canvas: { scale: 3 }, jsPDF: { format: 'a4' } }).save();
        } else alert("الكود غير صحيح");
    }

    function filterPatients() {
        const q = document.getElementById('admSearch').value;
        const log = document.getElementById('patientLog'); log.innerHTML = "";
        db.filter(x => x.name.includes(q)).reverse().forEach(x => log.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid rgba(255,255,255,0.1);"><span>${x.name}</span><button onclick="document.getElementById('searchCode').value='${x.code}'; patientSearch()">تحميل</button></div>`);
    }

    function showTab(t) {
        if(t==='admin' && prompt("الرمز:")!=="Wagaar7@") return;
        document.getElementById('sectionAdmin').style.display = t==='admin'?'block':'none';
        document.getElementById('sectionPatient').style.display = t==='patient'?'block':'none';
    }

    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('code')) { document.getElementById('searchCode').value = urlParams.get('code'); patientSearch(); }
    calculateFinance();
</script>
</body>
</html>

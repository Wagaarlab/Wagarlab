<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waqar Modern Lab | معمل وقار الحديث</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg: #050a15; --card: #0f172a; --accent: #2563eb; --gold: #d4af37; 
            --success: #10b981; --text: #f8fafc; --border: rgba(255,255,255,0.1);
            --neon: rgba(37, 99, 235, 0.4);
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* شريط إعلان العيد */
        .eid-ads {
            background: linear-gradient(90deg, #d4af37, #b8860b);
            color: #000; padding: 10px; text-align: center; font-weight: 900;
            font-size: 14px; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .logo-box { 
            width: 120px; height: 120px; margin: 20px auto; border-radius: 50%; 
            border: 4px solid var(--gold); background: #fff url('شعار معمل وقار.png') center/cover;
            box-shadow: 0 0 30px var(--neon);
        }

        .glass { 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); 
            border-radius: 20px; padding: 25px; border: 1px solid var(--border); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); margin-bottom: 25px;
        }

        /* أزرار 3D */
        .btn-3d { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: 900; cursor: pointer; color: white; 
            transform: translateY(-4px); box-shadow: 0 6px 0 rgba(0,0,0,0.6); 
            transition: 0.1s; font-family: 'Cairo'; font-size: 16px;
        }
        .btn-3d:active { transform: translateY(0); box-shadow: 0 0 0 transparent; }

        input, select { 
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.4); 
            color: #fff; text-align: center; font-family: 'Cairo';
        }

        /* تنسيق فورمات الفحوصات بوضوح */
        .test-input-card {
            background: rgba(255,255,255,0.05); border-left: 5px solid var(--gold);
            padding: 15px; margin-top: 15px; border-radius: 10px;
        }
        .form-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .form-row label { font-size: 12px; color: var(--gold); text-align: right; margin-bottom: 2px; }

        .test-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 10px; max-height: 300px; overflow-y: auto; padding: 15px; 
            background: rgba(0,0,0,0.3); border-radius: 15px;
        }

        #printArea { display: none; width: 210mm; padding: 15mm; background: white; color: black; }
        .pdf-frame { border: 3px solid var(--gold); padding: 20px; border-radius: 10px; position: relative; }
    </style>
</head>
<body>

<div class="eid-ads">
    🌙 بمناسبة عيد الفطر المبارك: تخفيضات كبرى 30% على فحوصات الكيمياء السريرية والغدة الدرقية! 🌙
</div>

<div class="container">
    <div class="logo-box"></div>
    
    <div style="display:flex; gap:15px; margin-bottom:30px;">
        <button class="btn-3d" style="background:var(--accent);" onclick="tab('p')">استلام النتيجة 🌍</button>
        <button class="btn-3d" style="background:#475569;" onclick="tab('a')">لوحة المختبر 🔐</button>
    </div>

    <div id="pSec" class="glass">
        <h3 style="text-align:center;">مرحباً بك في معمل وقار</h3>
        <input type="text" id="pCode" placeholder="أدخل كود الاستلام">
        <button class="btn-3d" style="background:var(--accent);" onclick="fetchResult('patient')">تحميل النتيجة PDF 📥</button>
    </div>

    <div id="aSec" class="glass" style="display:none;">
        <h3 style="text-align:center; color:var(--gold);">تسجيل حالة وحفظ سحابي</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="text" id="aCode" readonly style="color:var(--gold); font-weight:bold;">
            <input type="text" id="aName" placeholder="اسم المريض">
            <input type="number" id="aAge" placeholder="العمر">
            <input type="text" id="aPhone" placeholder="رقم الواتساب (مثال: 249912345678)">
        </div>

        <div id="lib" class="test-grid"></div>
        <div id="inputsArea" style="margin-top:20px;"></div>
        
        <div style="background:var(--success); padding:15px; border-radius:12px; text-align:center; font-size:18px; font-weight:bold; margin-top:20px;">
            الإجمالي: <span id="total">0</span> ج.س
        </div>
        
        <button class="btn-3d" style="background:var(--success); margin-top:20px;" onclick="saveRecord()">حفظ ورفع سحابي + إرسال واتساب 🚀</button>
    </div>
</div>

<div id="printArea">
    <div class="pdf-frame">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid #000; padding-bottom:10px;">
            <img src="شعار معمل وقار.png" width="90">
            <div style="text-align:center;"><h2>معمل وقار الحديث</h2><p>Waqar Modern Medical Lab</p></div>
            <div id="qr"></div>
        </div>
        <div id="pdfContent"></div> </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAMtySu0ZulKoWlfByBBDS05...", 
        authDomain: "wagaarlab-a1e6c.firebaseapp.com", 
        projectId: "wagaarlab-a1e6c", 
        storageBucket: "wagaarlab-a1e6c.appspot.com", 
        messagingSenderId: "922691536177", 
        appId: "1:922691536177:web:d683fa16488853d3915c10" 
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    // القائمة الشاملة لأكثر من 70 فحصاً (مختصرة هنا لتسهيل النسخ - يمكنك تكرار النمط)
    const LAB_DATA = [
        { id: 'cbc', name: 'CBC (Complete Blood Count)', price: 3000, fields: [{n:'Hemoglobin', u:'g/dL', r:'12-18'}, {n:'WBCs', u:'10^3', r:'4-11'}] },
        { id: 'malaria', name: 'Malaria B.F', price: 1500, fields: [{n:'Result', u:'-', r:'Negative'}] },
        { id: 'rbs', name: 'Random Blood Sugar', price: 1500, fields: [{n:'Result', u:'mg/dL', r:'70-140'}] },
        { id: 'tsh', name: 'T.S.H (Thyroid)', price: 5000, fields: [{n:'Result', u:'uIU/mL', r:'0.27-4.2'}] },
        { id: 'urea', name: 'S. Urea', price: 2000, fields: [{n:'Result', u:'mg/dL', r:'15-45'}] }
        // أضف أي فحص آخر هنا بنفس الشكل
    ];

    // ملء الشبكة
    const lib = document.getElementById('lib');
    LAB_DATA.forEach(t => {
        lib.innerHTML += `<div><input type="checkbox" onchange="toggle('${t.id}')" id="chk_${t.id}" style="width:auto;"> ${t.name}</div>`;
    });

    window.toggle = (id) => {
        const area = document.getElementById('inputsArea');
        if(document.getElementById('chk_'+id).checked) {
            let t = LAB_DATA.find(x => x.id === id);
            let h = `<div id="card_${id}" class="test-input-card"><b>📌 ${t.name}</b>`;
            t.fields.forEach((f, i) => {
                h += `<div class="form-row">
                        <div><label>النتيجة (Result)</label><input type="text" id="v_${id}_${i}" value="Normal"></div>
                        <div><label>الوحدة</label><input type="text" value="${f.u}" readonly></div>
                        <div><label>المعدل الطبيعي</label><input type="text" value="${f.r}" readonly></div>
                      </div>`;
            });
            area.insertAdjacentHTML('beforeend', h + `</div>`);
        } else { document.getElementById('card_'+id)?.remove(); }
        updateTotal();
    };

    window.updateTotal = () => {
        let sum = 0;
        document.querySelectorAll('input[id^="chk_"]:checked').forEach(cb => {
            sum += LAB_DATA.find(x => x.id === cb.id.replace('chk_','')).price;
        });
        document.getElementById('total').innerText = sum;
    };

    window.tab = (t) => {
        if(t==='a' && prompt("كلمة السر:") !== "Wagaar7@") return;
        document.getElementById('pSec').style.display = t==='p'?'block':'none';
        document.getElementById('aSec').style.display = t==='a'?'block':'none';
        if(t==='a') document.getElementById('aCode').value = 'WQR-' + Math.floor(1000+Math.random()*9000);
        
        // فحص الرابط التلقائي (إذا جاء المريض من الواتساب)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('code')) document.getElementById('pCode').value = urlParams.get('code');
    };

    window.saveRecord = async () => {
        const code = document.getElementById('aCode').value;
        const name = document.getElementById('aName').value;
        const phone = document.getElementById('aPhone').value;
        if(!name || !phone) return alert("يرجى إكمال بيانات المريض!");

        let htmlRows = "";
        LAB_DATA.forEach(t => {
            if(document.getElementById('chk_'+t.id)?.checked) {
                t.fields.forEach((f, i) => {
                    const res = document.getElementById(`v_${t.id}_${i}`).value;
                    htmlRows += `<tr><td>${t.name} - ${f.n}</td><td><b>${res}</b></td><td>${f.u}</td><td>${f.r}</td></tr>`;
                });
            }
        });

        try {
            await setDoc(doc(db, "records", code), { name, htmlRows, date: new Date().toLocaleDateString(), age: document.getElementById('aAge').value });
            
            // إرسال واتساب
            const msg = `مرحباً ${name}، نتيجتك من معمل وقار الحديث جاهزة. يمكنك تحميلها مباشرة عبر الرابط التالي: https://wagaarlab.github.io/Wagarlab/?code=${code}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            
            alert("تم الرفع سحابياً! سيفتح الواتساب الآن.");
            window.location.reload(); // تصفير الحقول
        } catch(e) { alert("فشل الاتصال بالسحابة!"); }
    };

    window.fetchResult = async (type) => {
        const code = document.getElementById('pCode').value;
        const s = await getDoc(doc(db, "records", code));
        if(s.exists()){
            const d = s.data();
            document.getElementById('pdfContent').innerHTML = `
                <div style="margin:20px 0; border:1px solid #000; padding:10px; background:#eee;">
                    <b>المريض: ${d.name}</b> | <b>التاريخ: ${d.date}</b> | <b>كود: ${code}</b>
                </div>
                <table style="width:100%; border-collapse:collapse;" border="1">
                    <thead><tr style="background:#ddd;"><th>Test Name</th><th>Result</th><th>Unit</th><th>Reference</th></tr></thead>
                    <tbody>${d.htmlRows}</tbody>
                </table>`;
            document.getElementById('printArea').style.display = 'block';
            html2pdf().from(document.getElementById('printArea')).save().then(()=> { if(type==='patient') window.location.reload(); });
        } else alert("كود غير صحيح!");
    };
    
    // تشغيل التعبئة التلقائية عند التحميل
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('code')) {
            document.getElementById('pCode').value = urlParams.get('code');
            alert("تم التعرف على الكود تلقائياً! اضغط تحميل النتيجة.");
        }
    };
</script>
</body>
</html>

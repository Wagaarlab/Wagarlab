<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث - النظام السحابي العالمي</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #050a15; --card-bg: #0f172a; --accent: #1e40af; --gold: #d4af37; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--primary); color: var(--text); margin: 0; }
        .container { width: 95%; max-width: 1200px; margin: auto; padding: 15px; }
        .main-logo-container { width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 50%; border: 4px solid var(--gold); background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--gold); }
        .main-logo { width: 100%; height: 100%; object-fit: contain; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border-radius: 25px; padding: 25px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; background: #1e293b; color: white; border: 1px solid #334155; text-align: center; font-family: 'Cairo'; }
        .btn-action { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; font-size: 16px; }
        #printPage { display: none; background: white; width: 210mm; padding: 15mm; color: #000; margin: auto; }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 2px solid #000; }
        .results-table th, .results-table td { border: 1px solid #000; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="main-logo-container">
        <img src="https://lh3.google.com/saves/AA8Ys27nR5kw4l7LCnssHGLDa_ji2U_hatLe3m9BLTwBrQdaCIbCGGB89EULUMgyEae0rQ_T5MK2b46ayYqj0d5XSrwq9X8SWgJu36h5qhvMzYX8cRVjr8D2dqqpw-yhgAF6XqGPsgusYEJNJgRZDAG3Zn1S0hE=s2048-w2017-h2048-n-k?authuser=0&source=sh%2Fx%2Fsaves%2Fuv%2Fm1%2F4&kgs=c461f961ff0566c1" class="main-logo">
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn-action" style="background:var(--accent)" onclick="showTab('patient')">بوابة المرضى 🏥</button>
        <button class="btn-action" style="background:#334155" onclick="showTab('admin')">لوحة الإدارة 🔐</button>
    </div>

    <div id="sectionPatient" class="glass-card" style="text-align: center;">
        <h2 style="color:var(--gold)">استلام نتيجتك الطبية</h2>
        <input type="text" id="searchCode" placeholder="أدخل كود المريض (مثلاً: WQR-100)">
        <button id="searchBtn" class="btn-action" style="background:linear-gradient(45deg, #1e40af, #3b82f6)">عرض وتحميل النتيجة PDF 📥</button>
    </div>

    <div id="sectionAdmin" style="display:none">
        <div class="glass-card">
            <h3>تسجيل حالة سحابية جديدة</h3>
            <input type="text" id="admCode" placeholder="كود الحالة (مثل: WQR-100)">
            <input type="text" id="admName" placeholder="اسم المريض">
            <textarea id="admHtml" style="width:100%; height:100px; background:#1e293b; color:white; border-radius:10px; padding:10px;" placeholder="أدخل جدول النتائج هنا..."></textarea>
            <button id="saveBtn" class="btn-action" style="background:var(--success); margin-top:10px;">رفع النتيجة للسحابة ☁️</button>
        </div>
    </div>
</div>

<div id="printPage">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:5px solid #0a192f; padding-bottom:15px;">
        <img src="https://lh3.google.com/saves/AA8Ys27nR5kw4l7LCnssHGLDa_ji2U_hatLe3m9BLTwBrQdaCIbCGGB89EULUMgyEae0rQ_T5MK2b46ayYqj0d5XSrwq9X8SWgJu36h5qhvMzYX8cRVjr8D2dqqpw-yhgAF6XqGPsgusYEJNJgRZDAG3Zn1S0hE=s2048-w2017-h2048-n-k?authuser=0&source=sh%2Fx%2Fsaves%2Fuv%2Fm1%2F4&kgs=c461f961ff0566c1" width="100">
        <div style="text-align:center"><h2>معمل وقار الحديث</h2><p>برهان الثقة.. موطن الدقة</p></div>
        <div id="qrcode"></div>
    </div>
    <div id="prHeader" style="margin-top:20px; font-weight:bold; border:2px solid #000; padding:15px; background:#f9f9f9;"></div>
    <div id="prResults"></div>
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:70px;">
        <div style="text-align:center; width:250px; border-top:2px solid #000; padding-top:10px;"><b>د. السني خالد محمد أحمد</b><br><small>مدير المختبر</small></div>
        <img src="https://lh3.google.com/saves/AA8Ys25odkEoAO55qko3ZQzNRUCnC6xPn8Er8fzf1WSEuyyGNzrDqxXNjPX90-THGkRiFbL65N3czMdqKNWjl9pqFojwD-l9SDNeox5FoIIZVcGEgQjAAZEO_dWTglAohghhsIBDEOCNHpRKOaL2HruTXcX7O8pG=s1984-w1984-h1920-n-k?authuser=0" width="130">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    // بيانات مشروعك من الصورة
    const firebaseConfig = {
        apiKey: "AIzaSyAMtySu0ZulKoWlfByBBDS05...", 
        authDomain: "wagaarlab-a1e6c.firebaseapp.com",
        projectId: "wagaarlab-a1e6c",
        storageBucket: "wagaarlab-a1e6c.appspot.com",
        messagingSenderId: "922691536177",
        appId: "1:922691536177:web:d683fa16488853d3915c10"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة الحفظ في السحابة
    document.getElementById('saveBtn').onclick = async () => {
        const code = document.getElementById('admCode').value.toUpperCase();
        const data = {
            name: document.getElementById('admName').value,
            html: document.getElementById('admHtml').value,
            date: new Date().toLocaleDateString()
        };
        await setDoc(doc(db, "records", code), data);
        alert("تم الحفظ في السحابة بنجاح! يمكن للمريض الآن استلام نتيجته.");
    };

    // دالة البحث السحابي للمريض
    document.getElementById('searchBtn').onclick = async () => {
        const code = document.getElementById('searchCode').value.toUpperCase();
        const docRef = doc(db, "records", code);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const p = docSnap.data();
            document.getElementById('prHeader').innerText = `المريض: ${p.name} | الكود: ${code} | التاريخ: ${p.date}`;
            document.getElementById('prResults').innerHTML = p.html;
            document.getElementById('printPage').style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: code, width: 80, height: 80 });
            html2pdf().from(document.getElementById('printPage')).save(`Waqar_${code}.pdf`);
        } else {
            alert("عذراً، الكود غير موجود في النظام السحابي.");
        }
    };
</script>

<script>
    function showTab(t) {
        if(t==='admin' && prompt("الرمز:")!=="Wagaar7@") return;
        document.getElementById('sectionAdmin').style.display = t==='admin'?'block':'none';
        document.getElementById('sectionPatient').style.display = t==='patient'?'block':'none';
    }
</script>
</body>
</html>

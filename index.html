<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام معمل وقار الحديث</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCndh68IOzYk1bzf8VXvQ5b6aS4b5TXI-o",
            authDomain: "omalilhealth.firebaseapp.com",
            projectId: "omalilhealth",
            storageBucket: "omalilhealth.firebasestorage.app",
            messagingSenderId: "1023228434530",
            appId: "1:1023228434530:web:1ddf72660d0a68b588193b"
        };
        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        // حل مشكلة الحفظ: الإرسال المباشر
        window.dbSave = async (data) => {
            try {
                const ref = doc(db, "records", data.code.toUpperCase());
                const snap = await getDoc(ref);
                let visits = snap.exists() ? snap.data().visits : [];
                visits.push(data.visit);
                await setDoc(ref, { name: data.name, code: data.code.toUpperCase(), visits: visits }, { merge: true });
                return true;
            } catch (e) { console.error(e); return false; }
        };

        // حل مشكلة البحث بالاسم بدون Index
        window.dbAdminSearch = async (name) => {
            const snap = await getDocs(collection(db, "records"));
            let results = [];
            snap.forEach(doc => {
                if(doc.data().name.includes(name)) results.push(doc.data());
            });
            return results;
        };

        window.dbGetByCode = async (code) => {
            const snap = await getDoc(doc(db, "records", code.toUpperCase()));
            return snap.exists() ? snap.data() : null;
        };
    </script>

    <style>
        :root { --primary: #003366; --bg: #f4f7f6; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border-top: 6px solid var(--primary); margin-bottom: 20px; }
        .logo { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--primary); background: white; object-fit: contain; }
        .card { background: var(--card); padding: 20px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: #10b981; color: white; }
        .test-row { background: #f8fafc; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-right: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        #printArea { width: 800px; padding: 40px; background: white; position: absolute; left: -9999px; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/Wagaarlab/Wagarlab/main/209963.png" class="logo">
        <h2 style="margin:10px 0 0; color:var(--primary);">معمل وقار الحديث 🔬</h2>
        <p style="margin:0;">د. السني خالد محمد أحمد</p>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button class="btn btn-primary" onclick="showTab('p')">بحث المريض</button>
        <button class="btn" style="background:white; color:#333;" onclick="checkAdmin()">الإدارة ⚙️</button>
    </div>

    <div id="pPanel">
        <div class="card">
            <input type="text" id="pInp" placeholder="أدخل الكود WQR-xxxx" style="text-align:center">
            <button class="btn btn-primary" onclick="pSearch()">عرض النتيجة</button>
        </div>
        <div id="pOut"></div>
    </div>

    <div id="aPanel" style="display:none">
        <div class="card">
            <h3>البحث بالاسم</h3>
            <input type="text" id="admSearchInp" placeholder="اكتب اسم المريض">
            <button class="btn btn-primary" onclick="aSearch()">بحث 🔍</button>
            <div id="admResults" style="margin-top:10px"></div>
        </div>

        <div class="card">
            <h3>إضافة مريض جديد</h3>
            <input type="text" id="aName" placeholder="الاسم بالكامل" oninput="if(!aCode.value)aCode.value='WQR-'+Math.floor(1000+Math.random()*9000)">
            <input type="text" id="aCode" placeholder="كود الملف" readonly style="background:#eee">
            <hr>
            <select id="tSel" onchange="if(this.value==='CBC')tRes.value='Hb: ...\nWBC: ...\nPLT: ...'">
                <option value="">-- اختر فحصاً --</option>
                <option value="CBC">Hematology (CBC)</option>
                <option value="Urine">General Urine</option>
                <option value="Custom">فحص مخصص...</option>
            </select>
            <textarea id="tRes" placeholder="النتائج..." style="height:100px; direction:ltr"></textarea>
            <input type="number" id="tPrice" placeholder="السعر (SDG)">
            <button class="btn btn-primary" onclick="addT()">+ إضافة للمسودة</button>
        </div>

        <div id="dCard" class="card" style="display:none">
            <div id="dList"></div>
            <div style="padding:10px; background:#e0f2fe; border-radius:10px; margin:10px 0">إجمالي: <b id="total">0</b> SDG</div>
            <button class="btn btn-accent" id="sBtn" onclick="save()">حفظ نهائي للسحابة ✅</button>
        </div>
    </div>
</div>

<div id="printArea">
    <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #003366; padding-bottom: 10px;">
        <img src="https://raw.githubusercontent.com/Wagaarlab/Wagarlab/main/209963.png" style="height: 100px;">
        <div style="text-align: right;">
            <h1 style="color:#003366; margin:0;">Waqar Medical Lab</h1>
            <p style="margin:5px 0;"><b>Dr. Alsunni Khalid Mohammed Ahmed</b></p>
        </div>
    </div>
    <div style="margin: 20px 0; background:#f1f5f9; padding:15px; border-radius:10px;">
        اسم المريض: <b id="prN"></b> | الكود: <b id="prC"></b> | التاريخ: <b id="prD"></b>
    </div>
    <div id="prT"></div>
    <div style="margin-top:50px; text-align:right;">
        <p style="font-family:'Dancing Script', cursive; font-size:24px; margin:0;">Dr. Alsunni Khalid</p>
        <div style="border-top:1px solid #000; width:150px; display:inline-block">التوقيع والختم</div>
    </div>
</div>

<script>
    let q = [];
    function showTab(t){ pPanel.style.display=t==='p'?'block':'none'; aPanel.style.display=t==='a'?'block':'none'; }
    function checkAdmin(){ if(prompt("الرمز:")==="6519") showTab('a'); }
    function addT(){
        q.push({n:tSel.value, r:tRes.value, p:parseFloat(tPrice.value)||0});
        dCard.style.display='block';
        dList.innerHTML += `<div class="test-row"><span>${tSel.value}</span><b>${tPrice.value}</b></div>`;
        total.innerText = q.reduce((s,x)=>s+x.p,0);
        tRes.value=""; tPrice.value="";
    }
    async function save(){
        sBtn.disabled=true; sBtn.innerText="جاري الرفع... ⏳";
        const ok = await window.dbSave({name:aName.value, code:aCode.value, visit:{date:new Date().toLocaleString(), tests:q}});
        if(ok){ alert("تم الحفظ سحابياً ✅"); location.reload(); } else { alert("خطأ!"); sBtn.disabled=false; }
    }
    async function aSearch(){
        const res = await window.dbAdminSearch(admSearchInp.value);
        admResults.innerHTML = res.map(p=>`<div class="test-row" onclick="aName.value='${p.name}';aCode.value='${p.code}'">${p.name} (${p.code})</div>`).join('');
    }
    async function pSearch(){
        const d = await window.dbGetByCode(pInp.value);
        if(!d) return alert("غير موجود");
        pOut.innerHTML = `<div class="card"><b>${d.name}</b>` + d.visits.reverse().map(v=>`<div class="test-row"><span>${v.date}</span><button onclick='print("${d.name}","${d.code}",${JSON.stringify(v)})'>PDF</button></div>`).join('') + `</div>`;
    }
    function print(n,c,v){
        prN.innerText=n; prC.innerText=c; prD.innerText=v.date;
        prT.innerHTML = `<table style="width:100%; border-collapse:collapse">` + v.tests.map(t=>`<tr><td style="border:1px solid #000; padding:10px"><b>${t.n}</b></td><td style="border:1px solid #000; padding:10px; direction:ltr">${t.r}</td></tr>`).join('') + `</table>`;
        const el = document.getElementById('printArea'); el.style.left="0";
        html2canvas(el,{scale:2}).then(can=>{
            const pdf = new jspdf.jsPDF();
            pdf.addImage(can.toDataURL('image/png'),'PNG',0,0,210,(can.height*210)/can.width);
            pdf.save(n+".pdf"); el.style.left="-9999px";
            pOut.innerHTML=""; alert("تم التحميل وتأمين البيانات.");
        });
    }
</script>
</body>
</html>

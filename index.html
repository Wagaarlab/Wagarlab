<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام معمل وقار الحديث المطور - د. السني خالد</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #0a192f; --accent: #1e40af; --gold: #d4af37; --success: #10b981; --wa: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: var(--primary); margin: 0; color: white; }
        
        .no-print { padding: 15px; max-width: 1100px; margin: auto; text-align: center; }
        .main-logo { width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--gold); background: #000; margin-bottom: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; text-align: right; }
        
        .tab-nav { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid var(--accent); cursor: pointer; background: transparent; color: white; font-weight: 900; }
        .tab-btn.active { background: var(--accent); }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #334155; text-align: center; font-family: 'Cairo'; }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; color: white; }
        
        /* شبكة الفحوصات */
        .tests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin: 15px 0; max-height: 250px; overflow-y: auto; padding: 10px; border: 1px solid var(--gold); border-radius: 10px; }
        .test-item { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; }

        /* الأرشيف للإدارة */
        .archive-list { max-height: 400px; overflow-y: auto; margin-top: 15px; }
        .archive-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--gold); }

        /* التقرير الرسمي */
        .a4-page { display: none; background: white; width: 210mm; padding: 15mm; margin: auto; color: #000; position: relative; }
        .rep-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 13px; }
        .category-head { background: #f1f5f9; font-weight: bold; }

        @media print { .no-print { display: none !important; } .a4-page { display: block !important; } }
    </style>
</head>
<body>

<div class="no-print">
    <img src="https://lh3.google.com/saves/AA8Ys24XgLSNBQJb3H6_DKnhxjB2iIAEXKg8uFP0gchaXsOCw9_sieUNsTVMUkiqEoMgEww7-GM5C40gMGl_WgxS6gkRRNvQd4Es4MJNx7kuQdmXJLroK73CjcqMWPLIDS7VbXR9no9C06sKxAL1QPzWgat4t0U=s20484" class="main-logo" alt="لوجو وقار">

    <div class="tab-nav">
        <button class="tab-btn active" onclick="togglePortal('patient')">بوابة المرضى</button>
        <button class="tab-btn" onclick="adminAuth()">الإدارة والأرشيف 🔐</button>
    </div>

    <div id="patientPortal" class="glass-card" style="text-align: center;">
        <h3 style="color:var(--gold)">استعلام النتائج</h3>
        <input type="text" id="pRef" placeholder="أدخل الكود WQR-xxxx">
        <button class="btn-action" style="background:var(--accent)" onclick="searchResult()">عرض النتيجة</button>
        <div id="resultActions" style="display:none; margin-top:15px; gap:10px; display:flex;">
            <button class="btn-action" style="background:var(--success)" onclick="downloadPDF()">تنزيل PDF 📥</button>
            <button class="btn-action" style="background:var(--wa)" onclick="shareWA()">واتساب 🟢</button>
        </div>
    </div>

    <div id="adminPortal" style="display:none">
        <div class="glass-card">
            <h3 style="color:var(--gold)">🔍 أرشيف المرضى والبحث</h3>
            <input type="text" id="sName" placeholder="ابحث باسم المريض..." oninput="searchArchive()">
            <div id="archiveContainer" class="archive-list"></div>
        </div>

        <div class="glass-card">
            <h3 style="color:var(--success)">📝 إضافة فحص جديد</h3>
            <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:10px;">
                <input type="text" id="admN" placeholder="اسم المريض">
                <input type="number" id="admA" placeholder="العمر">
                <select id="admS"><option value="ذكر">ذكر</option><option value="أنثى">أنثى</option></select>
            </div>
            <div class="tests-grid" id="menu"></div>
            <div id="forms"></div>
            <button class="btn-action" style="background:var(--success)" onclick="saveToCloud()">حفظ سحابي وإصدار التقرير 💾</button>
        </div>
    </div>
</div>

<div id="printPage" class="a4-page">
    <div class="rep-header">
        <img src="https://lh3.google.com/saves/AA8Ys24XgLSNBQJb3H6_DKnhxjB2iIAEXKg8uFP0gchaXsOCw9_sieUNsTVMUkiqEoMgEww7-GM5C40gMGl_WgxS6gkRRNvQd4Es4MJNx7kuQdmXJLroK73CjcqMWPLIDS7VbXR9no9C06sKxAL1QPzWgat4t0U=s20484" width="120">
        <div style="text-align:center">
            <h1 style="margin:0; color:#0a192f; font-size:24px;">معمل وقار الحديث</h1>
            <p style="margin:0; font-size:12px; font-weight:bold;">WAQAR MEDICAL LABORATORY</p>
        </div>
        <div id="qrcode"></div>
    </div>
    
    <div style="border:2px solid #000; margin-top:15px; padding:10px; display:grid; grid-template-columns:1fr 1fr;">
        <div>المريض: <b id="rN"></b></div>
        <div>العمر/الجنس: <b id="rA"></b></div>
        <div>التاريخ: <b id="rD"></b></div>
        <div>المرجع: <b id="rR"></b></div>
    </div>

    <div id="resultsArea"></div>

    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:50px;">
        <img src="https://lh3.google.com/saves/AA8Ys24XgLSNBQJb3H6_DKnhxjB2iIAEXKg8uFP0gchaXsOCw9_sieUNsTVMUkiqEoMgEww7-GM5C40gMGl_WgxS6gkRRNvQd4Es4MJNx7kuQdmXJLroK73CjcqMWPLIDS7VbXR9no9C06sKxAL1QPzWgat4t0U=s20485" width="110">
        <div style="text-align:center; width:220px; border-top:2px solid #000;">
            <p>Lab Director</p>
            <b>د. السني خالد محمد</b>
        </div>
    </div>
    <p style="text-align:center; font-size:11px; margin-top:40px; border-top:1px solid #eee;">شندي - السودان | هاتف: +249111729111</p>
</div>

<script>
    const MASTER_TESTS = [
        { id: 'cbc', name: 'CBC Full Count', price: 10000, f: ['Hb','WBC','PLT'], u: ['g/dl','10^3','10^3'], r: ['13-17','4-11','150-410'] },
        { id: 'rft', name: 'Kidney (RFT)', price: 10000, f: ['Urea','Creatinine'], u: ['mg/dl','mg/dl'], r: ['15-45','0.6-1.4'] },
        { id: 'sugar', name: 'Blood Sugar', price: 4000, f: ['Fasting'], u: ['mg/dl'], r: ['70-110'] }
        // ... أضف الـ 35 فحصاً هنا بنفس النمط
    ];

    function adminAuth() { if(prompt("رمز الأمان:") === "Wagaar7@") togglePortal('admin'); }

    const menu = document.getElementById('menu');
    MASTER_TESTS.forEach(t => {
        menu.innerHTML += `<label class="test-item"><input type="checkbox" onchange="addF('${t.id}')" id="chk_${t.id}"> ${t.name}</label>`;
    });

    function addF(id) {
        const t = MASTER_TESTS.find(x => x.id === id);
        const cont = document.getElementById('forms');
        if(document.getElementById('chk_'+id).checked) {
            let h = `<div id="f_${id}" class="glass-card" style="margin-top:10px;"><h4>${t.name}</h4><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px;">`;
            t.f.forEach(field => h += `<input type="text" placeholder="${field}" class="val_${id}">`);
            cont.innerHTML += h + `</div></div>`;
        } else { document.getElementById('f_'+id)?.remove(); }
    }

    function saveToCloud() {
        const ref = 'WQR-' + Math.floor(1000 + Math.random() * 9999);
        let h = '';
        MASTER_TESTS.forEach(t => {
            if(document.getElementById('chk_'+t.id).checked) {
                h += `<div class="category-head" style="padding:5px; border:1px solid #000; margin-top:10px; text-align:center;">${t.name}</div><table><tr><th>Test</th><th>Result</th><th>Unit</th><th>Range</th></tr>`;
                const inps = document.querySelectorAll('.val_'+t.id);
                t.f.forEach((f, i) => h += `<tr><td>${f}</td><td><b>${inps[i].value}</b></td><td>${t.u[i]}</td><td>${t.r[i]}</td></tr>`);
                h += `</table>`;
            }
        });

        const data = { n: document.getElementById('admN').value, a: document.getElementById('admA').value + ' / ' + document.getElementById('admS').value, r: ref, h, d: new Date().toLocaleDateString() };
        
        // محاكاة الحفظ السحابي (يفضل ربط Firebase هنا)
        localStorage.setItem(ref, JSON.stringify(data));
        let arc = JSON.parse(localStorage.getItem('archive') || '[]');
        arc.push(data);
        localStorage.setItem('archive', JSON.stringify(arc));

        alert("تم الحفظ! كود المريض: " + ref);
        location.reload();
    }

    function searchArchive() {
        const q = document.getElementById('sName').value.toLowerCase();
        const arc = JSON.parse(localStorage.getItem('archive') || '[]');
        const filtered = arc.filter(i => i.n.toLowerCase().includes(q));
        const cont = document.getElementById('archiveContainer');
        cont.innerHTML = '';
        filtered.forEach(i => {
            cont.innerHTML += `<div class="archive-item"><span><b>${i.n}</b> (${i.r})</span><button onclick="loadResult('${i.r}')" style="background:var(--accent); border:none; color:white; padding:5px; border-radius:5px;">فتح</button></div>`;
        });
    }

    function loadResult(ref) { document.getElementById('pRef').value = ref; searchResult(); }

    let currentRes = null;
    function searchResult() {
        const data = JSON.parse(localStorage.getItem(document.getElementById('pRef').value.toUpperCase()));
        if(data) {
            currentRes = data;
            document.getElementById('rN').innerText = data.n; document.getElementById('rA').innerText = data.a;
            document.getElementById('rR').innerText = data.r; document.getElementById('rD').innerText = data.d;
            document.getElementById('resultsArea').innerHTML = data.h;
            document.getElementById('printPage').style.display = 'block';
            document.getElementById('resultActions').style.display = 'flex';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: data.r, width: 80, height: 80 });
        } else alert("غير موجود");
    }

    function downloadPDF() {
        const opt = { margin: 0, filename: `Waqar_${currentRes.r}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
        html2pdf().set(opt).from(document.getElementById('printPage')).save();
    }

    function shareWA() {
        const num = prompt("رقم المريض:");
        const msg = `مرحباً ${currentRes.n}%0Aنتيجتك في معمل وقار جاهزة.%0Aالكود: ${currentRes.r}%0Aيمكنك تحميلها من الموقع.`;
        window.open(`https://api.whatsapp.com/send?phone=${num}&text=${msg}`);
    }

    function togglePortal(v) {
        document.getElementById('patientPortal').style.display = v === 'patient' ? 'block' : 'none';
        document.getElementById('adminPortal').style.display = v === 'admin' ? 'block' : 'none';
    }
</script>
</body>
</html>

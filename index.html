<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث - النظام الذكي</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtySu0ZulKoWLfByBBDS05BIQ5qDNWE8",
            authDomain: "wagaarlab-a1e6c.firebaseapp.com",
            projectId: "wagaarlab-a1e6c",
            storageBucket: "wagaarlab-a1e6c.firebasestorage.app",
            messagingSenderId: "922691536177",
            appId: "1:922691536177:web:d683fa18488853d3915c10"
        };
        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        window.saveRecord = async (data) => {
            try {
                const ref = doc(db, "records", data.code.toUpperCase());
                await setDoc(ref, { ...data, timestamp: new Date().toLocaleString() }, { merge: true });
                return true;
            } catch (e) { return false; }
        };

        window.searchRecord = async (code) => {
            const ref = doc(db, "records", code.toUpperCase());
            const snap = await getDoc(ref);
            return snap.exists() ? snap.data() : null;
        };
    </script>
    <style>
        :root { --primary: #003366; --bg: #f4f7f6; --text: #333; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --text: #eee; } }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .admin-section { display: none; border-top: 2px dashed #ccc; margin-top: 20px; padding-top: 20px; }
        .result-card { display: none; margin-top: 20px; padding: 20px; border: 2px solid var(--primary); background: #fff; border-radius: 10px; text-align: right; }
        .logo-placeholder { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        @media print { .no-print { display: none; } .container { box-shadow: none; border: none; width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-placeholder">Wagaar Lab 🔬</div>
        <h3>معمل وقار الحديث</h3>
    </div>

    <div id="patientView" class="no-print">
        <input type="text" id="searchCode" placeholder="أدخل كود الفحص الخاص بك">
        <button class="btn" onclick="doSearch()">استلام النتيجة 🔍</button>
        <p style="font-size: 12px; color: #666; cursor: pointer;" onclick="showAdminLogin()">دخول الإدارة 🔐</p>
    </div>

    <div id="printArea" class="result-card">
        <div style="text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <h4>تقرير فحص طبي</h4>
        </div>
        <p><b>اسم المريض:</b> <span id="resName"></span></p>
        <p><b>كود المريض:</b> <span id="resCode"></span></p>
        <p><b>تاريخ الفحص:</b> <span id="resDate"></span></p>
        <hr>
        <div style="background: #f9f9f9; padding: 15px; border-radius: 5px;">
            <p><b>الفحوصات والنتائج:</b></p>
            <p id="resVal" style="font-size: 18px; color: var(--primary);"></p>
        </div>
        <div style="margin-top: 30px; display: flex; justify-content: space-between;">
            <div><p style="font-size: 12px;">ختم المعمل</p></div>
            <div style="text-align: center;"><p style="font-size: 12px;">توقيع المدير الطبي</p></div>
        </div>
        <button class="btn no-print" onclick="window.print()">تحميل PDF / طباعة 📥</button>
        <button class="btn no-print" style="background:#666;" onclick="location.reload()">خروج 🚪</button>
    </div>

    <div id="adminSection" class="admin-section no-print">
        <h4>لوحة تحكم الإدارة 🛡️</h4>
        <input type="text" id="pName" placeholder="اسم المريض">
        <input type="text" id="pCode" placeholder="كود المريض (مثلاً WQR-100)">
        <select id="testType" onchange="checkCustom()">
            <option value="CBC">صورة دم كاملة (CBC)</option>
            <option value="Glucose">فحص سكر (Glucose)</option>
            <option value="Malaria">فحص ملاريا</option>
            <option value="Custom">إضافة فحص آخر...</option>
        </select>
        <div id="customTestDiv"></div>
        <input type="text" id="pResult" placeholder="النتيجة">
        <button class="btn" style="background: #28a745;" onclick="doSave()">حفظ في السحابة ✅</button>
        <button class="btn" style="background: #dc3545;" onclick="location.reload()">إغلاق الإدارة</button>
    </div>
</div>

<script>
    function showAdminLogin() {
        const pass = prompt("الرجاء إدخال كلمة مرور الإدارة:");
        if (pass === "6519") {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('patientView').style.display = 'none';
        } else {
            alert("كلمة المرور خاطئة!");
        }
    }

    function checkCustom() {
        const type = document.getElementById('testType').value;
        const div = document.getElementById('customTestDiv');
        div.innerHTML = (type === 'Custom') ? '<input type="text" id="customName" placeholder="اسم الفحص الجديد">' : '';
    }

    async function doSave() {
        const testName = document.getElementById('testType').value === 'Custom' ? 
                         document.getElementById('customName').value : document.getElementById('testType').value;
        const data = {
            name: document.getElementById('pName').value,
            code: document.getElementById('pCode').value,
            result: testName + ": " + document.getElementById('pResult').value
        };
        if(!data.name || !data.code) return alert("أكمل البيانات");
        const ok = await window.saveRecord(data);
        if(ok) { alert("تم الحفظ بنجاح!"); location.reload(); }
    }

    async function doSearch() {
        const code = document.getElementById('searchCode').value;
        const data = await window.searchRecord(code);
        if(data) {
            document.getElementById('patientView').style.display = 'none';
            document.getElementById('printArea').style.display = 'block';
            document.getElementById('resName').innerText = data.name;
            document.getElementById('resCode').innerText = data.code;
            document.getElementById('resVal').innerText = data.result;
            document.getElementById('resDate').innerText = data.timestamp;
        } else { alert("الكود غير موجود، تأكد من الكود الصحيح."); }
    }
</script>
</body>
</html>

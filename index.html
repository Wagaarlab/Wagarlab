<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام معمل وقار الحديث - د. السني خالد</title>
    <style>
        :root {
            --primary-color: #004d40;
            --secondary-color: #c62828;
            --accent-color: #2e7d32;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            background: white;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* العلامة المائية */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 80px;
            color: rgba(0, 77, 64, 0.05);
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            font-weight: bold;
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo {
            width: 120px;
            height: auto;
        }

        h1 { color: var(--primary-color); margin: 10px 0; }
        
        .patient-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            background: #e0f2f1;
            padding: 20px;
            border-radius: 10px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--primary-color); }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            z-index: 1;
            position: relative;
        }

        th { background: var(--primary-color); color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }

        .result-row input { border: none; background: transparent; text-align: center; font-weight: bold; }

        .footer {
            margin-top: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stamp-area {
            text-align: center;
        }

        .stamp {
            width: 150px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }

        .btn-add {
            background: var(--accent-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-print {
            background: var(--primary-color);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            display: block;
            margin: 30px auto;
        }

        @media print {
            .btn-add, .btn-print, .controls { display: none; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="watermark">معمل وقار الحديث</div>
    
    <header>
        <img src="https://raw.githubusercontent.com/WaqarMedicalLab/Waqar/main/210350.png" alt="Waqar Logo" class="logo">
        <h1>معمل وقار الحديث للتحاليل الطبية</h1>
        <p>د. السني خالد محمد أحمد - أخصائي المختبرات الطبية</p>
    </header>

    <div class="patient-info">
        <div class="form-group">
            <label>اسم المريض:</label>
            <input type="text" placeholder="أدخل اسم المريض">
        </div>
        <div class="form-group">
            <label>التاريخ:</label>
            <input type="date" id="currentDate">
        </div>
        <div class="form-group">
            <label>العمر:</label>
            <input type="number">
        </div>
        <div class="form-group">
            <label>الجنس:</label>
            <select id="gender" onchange="updateReferences()">
                <option value="male">ذكر</option>
                <option value="female">أنثى</option>
            </select>
        </div>
    </div>

    <div class="controls">
        <label>اختر الفحص المراد إضافته:</label>
        <select id="testSelector">
            <optgroup label="صورة الدم (CBC)">
                <option value="RBC">Red Blood Cells (RBC)</option>
                <option value="HGB">Hemoglobin (HB)</option>
                <option value="WBC">White Blood Cells (WBC)</option>
                <option value="PLT">Platelets</option>
            </optgroup>
            <optgroup label="وظائف الكبد">
                <option value="ALT">ALT / SGPT</option>
                <option value="AST">AST / SGOT</option>
                <option value="BIL">Bilirubin Total</option>
            </optgroup>
            <optgroup label="وظائف الكلى والأملاح">
                <option value="CREA">Creatinine</option>
                <option value="UREA">BUN / Urea</option>
                <option value="SOD">Sodium (Na+)</option>
                <option value="POT">Potassium (K+)</option>
            </optgroup>
            <optgroup label="الهرمونات والقلب">
                <option value="TSH">TSH</option>
                <option value="TROP">Troponin T</option>
                <option value="CHOL">Total Cholesterol</option>
            </optgroup>
        </select>
        <button class="btn-add" onclick="addTestRow()">إضافة الفحص للتقرير +</button>
    </div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th>اسم الفحص (Test)</th>
                <th>النتيجة (Result)</th>
                <th>الوحدة (Unit)</th>
                <th>المدى المرجعي (Reference Range)</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="footer">
        <div class="signatures">
            <p><strong>توقيع الأخصائي:</strong></p>
            <p>د. السني خالد</p>
        </div>
        <div class="stamp-area">
            <p>ختم المعمل</p>
            <img src="https://raw.githubusercontent.com/WaqarMedicalLab/Waqar/main/210488.png" alt="Waqar Stamp" class="stamp">
            <p style="color: var(--secondary-color); font-weight: bold;">موطن الثقة</p>
        </div>
    </div>
</div>

<button class="btn-print" onclick="window.print()">طباعة التقرير (PDF)</button>

<script>
    document.getElementById('currentDate').valueAsDate = new Date();

    const testData = {
        'RBC': { unit: '10^6/μL', m: '4.5 - 5.7', f: '3.9 - 5.03' },
        'HGB': { unit: 'g/dL', m: '13.3 - 16.6', f: '11.6 - 15.0' },
        'WBC': { unit: '10^3/μL', m: '3.5 - 10.5', f: '3.5 - 10.5' },
        'PLT': { unit: '10^3/μL', m: '150 - 450', f: '150 - 450' },
        'ALT': { unit: 'U/L', m: '7 - 55', f: '7 - 55' },
        'AST': { unit: 'U/L', m: '8 - 48', f: '8 - 48' },
        'BIL': { unit: 'mg/dL', m: '0.1 - 1.2', f: '0.1 - 1.2' },
        'CREA': { unit: 'mg/dL', m: '0.7 - 1.3', f: '0.6 - 1.1' },
        'SOD': { unit: 'mg/L', m: '1.7 - 2.2', f: '1.7 - 2.2' },
        'POT': { unit: 'mmol/L', m: '3.7 - 5.1', f: '3.7 - 5.1' },
        'TSH': { unit: 'μIU/mL', m: '0.4 - 4.0', f: '0.4 - 4.0' },
        'TROP': { unit: 'ng/mL', m: '< 0.1', f: '< 0.1' },
        'CHOL': { unit: 'mg/dL', m: '< 200', f: '< 200' }
    };

    function addTestRow() {
        const selector = document.getElementById('testSelector');
        const testKey = selector.value;
        const testName = selector.options[selector.selectedIndex].text;
        const gender = document.getElementById('gender').value;
        const data = testData[testKey];
        const refRange = (gender === 'male') ? data.m : data.f;

        const tableBody = document.querySelector('#resultsTable tbody');
        const row = tableBody.insertRow();
        row.innerHTML = `
            <td>${testName}</td>
            <td class="result-row"><input type="text" placeholder="0.0"></td>
            <td>${data.unit}</td>
            <td>${refRange}</td>
        `;
    }

    function updateReferences() {
        // يمكن تطوير هذه الوظيفة لتحديث الصفوف الموجودة فعلياً عند تغيير الجنس
        alert('تم تغيير الجنس، يرجى إعادة إضافة الفحوصات لضمان دقة المدى المرجعي.');
    }
</script>

</body>
</html>

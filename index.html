<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام معمل وقار الطبي - الإصدار الشامل 32</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCndh68IOzYk1bzf8VXvQ5b6aS4b5TXI-o",
            authDomain: "wagarlab.firebaseapp.com",
            projectId: "wagarlab",
            storageBucket: "wagarlab.firebasestorage.app",
            messagingSenderId: "1023228434530",
            appId: "1:1023228434530:web:1ddf72660d0a68b588193b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.dbSave = async (data) => {
            const ref = doc(db, "records", data.code);
            const snap = await getDoc(ref);
            if (snap.exists()) { await updateDoc(ref, { visits: arrayUnion(data.visit) }); }
            else { await setDoc(ref, { name: data.name, code: data.code, visits: [data.visit] }); }
        };
        window.dbGet = async (code) => { 
            const snap = await getDoc(doc(db, "records", code.toUpperCase())); 
            return snap.exists() ? snap.data() : null; 
        };
    </script>

    <style>
        :root { --blue: #003366; --gold: #c5a059; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-container { max-width: 800px; background: white; margin: 15px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 8px solid var(--blue); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #e2e8f0; }
        .tabs button.active { background: var(--blue); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: #16a34a; }
        .test-item { background: #f1f5f9; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 14px; border-right: 4px solid var(--blue); }
        #printArea { width: 800px; padding: 40px; background: white; position: absolute; left: -9999px; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: var(--blue); margin: 0;">معمل وقار الطبي 🔬</h2>
        <p style="margin: 5px 0; color: #64748b;">إشراف د. السني خالد محمد أحمد</p>
    </div>

    <div class="tabs">
        <button id="pTab" class="active" onclick="switchTab('p')">استلام النتائج</button>
        <button id="aTab" onclick="adminCheck()">لوحة المختبر</button>
    </div>

    <div id="pPanel" class="panel active">
        <input type="text" id="pSearch" placeholder="أدخل كود المريض (مثال: WQR-1234)" style="text-align: center;">
        <button class="btn btn-blue" onclick="loadHistory()">بحث في السجل الطبي</button>
        <div id="historyOutput" style="margin-top: 20px;"></div>
    </div>

    <div id="aPanel" class="panel">
        <input type="text" id="admName" placeholder="اسم المريض بالكامل">
        <input type="text" id="admCode" placeholder="كود الملف (اتركه للتوليد التلقائي)">
        
        <div style="background: #f0f7ff; padding: 15px; border-radius: 12px; margin-top: 10px;">
            <input list="labList" id="tName" placeholder="اختر الفحص (32 فحص متاح)..." onchange="applyTpl()">
            <textarea id="tRes" placeholder="النتائج..." style="height: 100px; direction: ltr; font-family: monospace;"></textarea>
            <input type="number" id="tPrice" placeholder="السعر (ج.س)">
            <button class="btn btn-blue" onclick="addTest()">+ إضافة الفحص للزيارة</button>
        </div>

        <div id="visitQueue" style="display:none; margin-top: 15px; border: 2px solid var(--blue); padding: 15px; border-radius: 12px;">
            <h5 style="margin: 0 0 10px 0;">الفحوصات المضافة حالياً:</h5>
            <div id="queueList"></div>
            <p style="font-weight: bold; margin-top: 10px;">الإجمالي: <span id="vTotal">0</span> ج.س</p>
            <button class="btn btn-green" onclick="saveVisit()">حفظ الزيارة ورفعها للسحابة ✅</button>
        </div>
    </div>
</div>

<datalist id="labList">
    <option value="CBC (Complete Blood Count)"><option value="ESR"><option value="Blood Group & RH"><option value="Malaria (B.F)"><option value="RBS (سكر عشوائي)"><option value="FBS (سكر صائم)"><option value="HbA1c (تراكمي)"><option value="Urea"><option value="Creatinine"><option value="Uric Acid"><option value="S. Cholesterol"><option value="Triglycerides"><option value="HDL / LDL"><option value="SGPT (ALT)"><option value="SGOT (AST)"><option value="Total Bilirubin"><option value="Direct Bilirubin"><option value="Alkaline Phosphatase"><option value="TSH"><option value="Free T4"><option value="PSA"><option value="Calcium"><option value="Widal Test"><option value="H. Pylori (Ab)"><option value="H. Pylori (Ag)"><option value="Pregnancy Test"><option value="HBsAg"><option value="HCV"><option value="Urine Analysis"><option value="Stool Analysis"><option value="Semen Analysis"><option value="General Swab">
</datalist>

<div id="printArea">
    <div style="display: flex; justify-content: space-between; border-bottom: 4px solid var(--blue); padding-bottom: 10px;">
        <div><h1 style="color: var(--blue); margin:0;">معمل وقار الطبي</h1><p>بإشراف د. السني خالد محمد أحمد</p></div>
        <div style="text-align: left;"><p>التاريخ: <b id="prDate"></b></p><p>الكود: <b id="prCode"></b></p></div>
    </div>
    <div style="margin: 20px 0; font-size: 20px;">اسم المريض: <b id="prName"></b></div>
    <div id="prTableArea"></div>
    <div style="margin-top: 60px; text-align: left;"><p>توقيع المختبر: _______________</p></div>
</div>

<script>
    let currentVisitTests = [];
    function switchTab(t) {
        document.querySelectorAll('.panel, .tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById(t+'Panel').classList.add('active');
        document.getElementById(t+'Tab').classList.add('active');
    }
    function adminCheck() { if(prompt("رمز الدخول:") === "1001") switchTab('a'); }
    
    function applyTpl() {
        const t = document.getElementById('tName').value;
        const tpls = {
            "CBC": "Hb: ... g/dL\nWBCs: ...\nPLT: ...",
            "Urine Analysis": "Pus Cells: ... /HPF\nRBCs: ... /HPF\nSugar: ...\nAlbumin: ...",
            "RBS": "Result: ... mg/dL\nRange: 70 - 140",
            "Widal Test": "S. Typhi (O): ...\nS. Typhi (H): ...",
            "Stool Analysis": "Parasite: Not Found\nPus Cells: ... /HPF"
        };
        document.getElementById('tRes').value = tpls[t.split(' ')[0]] || "Result: ...";
    }

    function addTest() {
        const n = document.getElementById('tName').value;
        const r = document.getElementById('tRes').value;
        const p = parseFloat(document.getElementById('tPrice').value) || 0;
        if(!n || !r) return alert("أكمل بيانات الفحص");
        currentVisitTests.push({ n, r, p });
        document.getElementById('tName').value = ""; document.getElementById('tRes').value = ""; document.getElementById('tPrice').value = "";
        renderQueue();
    }

    function renderQueue() {
        const q = document.getElementById('visitQueue');
        q.style.display = currentVisitTests.length ? 'block' : 'none';
        document.getElementById('queueList').innerHTML = currentVisitTests.map(t => `<div class="test-item">${t.n}</div>`).join('');
        document.getElementById('vTotal').innerText = currentVisitTests.reduce((s, t) => s + t.p, 0);
    }

    async function saveVisit() {
        const name = document.getElementById('admName').value;
        const code = document.getElementById('admCode').value || "WQR-" + Math.floor(1000 + Math.random() * 9000);
        if(!name) return alert("اسم المريض مطلوب");
        const visit = { date: new Date().toLocaleDateString('ar-EG'), tests: currentVisitTests, total: document.getElementById('vTotal').innerText };
        await window.dbSave({ name, code, visit });
        alert("تم الحفظ بنجاح! كود المريض: " + code);
        currentVisitTests = []; renderQueue();
    }

    async function loadHistory() {
        const data = await window.dbGet(document.getElementById('pSearch').value);
        const out = document.getElementById('historyOutput');
        if(!data) return out.innerHTML = "الكود غير مسجل";
        out.innerHTML = `<h4>سجل المريض: ${data.name}</h4>`;
        data.visits.reverse().forEach(v => {
            out.innerHTML += `<div class="test-item" style="display:flex; justify-content:space-between; align-items:center;">
                <span>زيارة ${v.date}</span>
                <button class="btn btn-blue" style="width:80px; padding:5px; font-size:12px;" onclick='printV("${data.name}","${data.code}",${JSON.stringify(v)})'>PDF</button>
            </div>`;
        });
    }

    function printV(name, code, v) {
        document.getElementById('prName').innerText = name;
        document.getElementById('prCode').innerText = code;
        document.getElementById('prDate').innerText = v.date;
        let table = `<table><tr><th>الفحص</th><th>النتيجة</th></tr>`;
        v.tests.forEach(t => { table += `<tr><td><b>${t.n}</b></td><td style="direction:ltr;">${t.r.replace(/\n/g,'<br>')}</td></tr>`; });
        document.getElementById('prTableArea').innerHTML = table + `</table>`;
        const area = document.getElementById('printArea'); area.style.left = "0";
        html2canvas(area).then(can => {
            const pdf = new jspdf.jsPDF();
            pdf.addImage(can.toDataURL('image/png'), 'PNG', 0, 0, 210, (can.height * 210) / can.width);
            pdf.save(`Waqar_${name}_${v.date}.pdf`); area.style.left = "-9999px";
        });
    }
</script>
</body>
</html>

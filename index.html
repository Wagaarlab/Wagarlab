<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمل وقار الحديث</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // هذا هو "الرقم الجديد" لمشروعك Wagaarlab من صورتك الأخيرة
        const firebaseConfig = {
            apiKey: "AIzaSyAMtySu0ZulKoWLfByBBDS05BIQ5qDNWE8",
            authDomain: "wagaarlab-a1e6c.firebaseapp.com",
            projectId: "wagaarlab-a1e6c",
            storageBucket: "wagaarlab-a1e6c.firebasestorage.app",
            messagingSenderId: "922691536177",
            appId: "1:922691536177:web:d683fa18488853d3915c10"
        };
        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        window.dbSave = async (data) => {
            try {
                const ref = doc(db, "records", data.code.toUpperCase());
                await setDoc(ref, data, { merge: true });
                return true;
            } catch (e) { return false; }
        };
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #003366; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>إضافة مريض جديد 🔬</h2>
        <input type="text" id="name" placeholder="اسم المريض">
        <input type="text" id="code" placeholder="كود المريض (مثلاً WQR-101)">
        <input type="text" id="result" placeholder="النتيجة">
        <button id="btn" onclick="saveData()">حفظ في السحابة ✅</button>
    </div>

    <script>
        async function saveData() {
            const btn = document.getElementById('btn');
            btn.innerText = "جاري الحفظ... ⏳";
            const data = {
                name: document.getElementById('name').value,
                code: document.getElementById('code').value,
                result: document.getElementById('result').value,
                date: new Date().toLocaleString()
            };
            const ok = await window.dbSave(data);
            if(ok) {
                alert("تم الحفظ بنجاح في مشروع Wagaarlab الجديد!");
                location.reload();
            } else {
                alert("فشل الحفظ! تأكد من إعدادات Rules في Firebase");
                btn.innerText = "حفظ في السحابة ✅";
            }
        }
    </script>
</body>
</html>

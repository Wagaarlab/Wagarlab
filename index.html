<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام معمل وقار الحديث - الإصدار الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --primary: #0a192f; --accent: #1e40af; --gold: #d4af37; 
            --bg: #f8fafc; --text: #1e293b; --card: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; }
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        .no-print { padding: 15px; max-width: 1200px; margin: auto; }
        
        /* تأثيرات بصرية جذابة */
        .glass { background: var(--card); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.1); padding: 25px; margin-bottom: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* بوابات الدخول */
        .auth-card { max-width: 450px; margin: 60px auto; text-align: center; border-top: 5px solid var(--gold); }
        .tab-nav { display: flex; gap: 10px; margin: 20px 0; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--accent); cursor: pointer; font-weight: bold; background: transparent; color: var(--accent); transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; }

        /* المدخلات */
        .grid-input { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        input, select { background: var(--bg); color: var(--text); border: 1px solid #475569; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        
        /* قائمة الفحوصات */
        .tests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; max-height: 250px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 10px; }
        .test-item { display: flex; align-items: center; gap: 8px; font-size: 13px; background: var(--card); padding: 8px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
        .test-item:hover { border-color: var(--gold); }

        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(30, 64, 175, 0.3); }
        .btn-gold { background: var(--gold); color: white; }

        /* التقرير الطبي A4 */
        .a4-print { display: none; background: white; width: 210mm; min-height: 297mm; padding: 15mm; margin: auto; color: #000; box-sizing: border-box; position: relative; }
        .report-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .patient-strip { display: grid; grid-template-columns: 2fr 1fr 1fr; border: 2px solid #000; margin: 15px 0; padding: 10px; font-size: 14px; font-weight: 700; background: #f8fafc; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 13px; }
        .sec-head { background: #000; color: #fff; padding: 6px; font-weight: bold; margin-top: 15px; text-align: center; }
        .footer-sig { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 50px; }

        @media print { .no-print { display: none !important; } .a4-print { display: block !important; } }
    </style>
</head>
<body>

<div class="no-print">
    <div id="authGate" class="glass auth-card">
        <img src="https://i.ibb.co/hR0pXpP/210350.png" width="120" style="filter: drop-shadow(0 0 10px rgba(0,0,0,0.1));">
        <h2 style="margin:10px 0; font-weight:900;">بوابة معمل وقار الحديث</h2>
        <div class="tab-nav">
            <button id="pTab" class="tab-btn active" onclick="showTab('patient')">نتائج المرضى</button>
            <button id="aTab" class="tab-btn" onclick="showTab('admin')">لوحة الإدارة</button>
        </div>

        <div id="pView">
            <input type="text" id="patientRef" placeholder="أدخل كود النتيجة (WQR-xxxx)">
            <button class="btn btn-primary" onclick="patientSearch()">استعلام وتحميل النتيجة</button>
        </div>

        <div id="aView" style="display:none">
            <input type="password" id="adminPass" placeholder="كلمة المرور">
            <button class="btn btn-primary" onclick="adminLogin()">دخول النظام</button>
        </div>
    </div>

    <div id="adminPanel" style="display:none">
        <div class="glass">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; color:var(--gold);">إدخال نتيجة جديدة</h2>
                <button onclick="showHistory()" class="tab-btn" style="width:auto; padding:5px 15px;">سجل الزيارات 📜</button>
            </div>
            
            <div class="grid-input">
                <input type="text" id="pName" placeholder="اسم المريض الرباعي">
                <input type="text" id="pAge" placeholder="العمر">
                <input type="text" id="pPhone" placeholder="واتساب (249...)">
            </div>

            <h4>الفحوصات (اختر المتعدد):</h4>
            <div class="tests-grid" id="menuTests">
                </div>
            <button class="btn btn-gold" style="width:auto; padding:5px 20px; font-size:12px; margin-top:10px;" onclick="addCustomTest()">+ إضافة فحص غير موجود</button>

            <div id="entryFields" style="margin-top:20px;"></div>
            
            <button class="btn btn-primary" style="margin-top:30px;" onclick="finalizeResult()">حفظ، توليد الكود، وإرسال واتساب ✨</button>
        </div>
    </div>
</div>

<div id="reportPage" class="a4-print">
    <div class="report-header">
        <img src="https://i.ibb.co/hR0pXpP/210350.png" width="150">
        <div style="text-align:center">
            <h1 style="margin:0; color:var(--primary); font-size: 26px;">معمل وقار الحديث للتحاليل الطبية</h1>
            <p style="margin:0; font-weight:900; font-size:14px;">WAQAR AL-HADEETH MEDICAL LAB</p>
        </div>
        <div id="qrcode"></div>
    </div>

    <div class="patient-strip">
        <span>NAME: <span id="outName"></span></span>
        <span>AGE: <span id="outAge"></span></span>
        <span>REF: <span id="outRef"></span></span>
    </div>

    <div id="outContent"></div>

    <div class="footer-sig">
        <div style="text-align:center">
            <img src="https://i.ibb.co/C0601tH/210352.png" width="120">
            <p style="color:red; font-weight:bold; font-size:11px; margin:0">التوقيع والختم الرسمي</p>
        </div>
        <div style="text-align:center; width:280px; border-top:2px solid #000; padding-top:8px;">
            <p style="margin:0; font-size:14px;">Lab Director Signature</p>
            <b style="font-size:20px;">د. السني خالد محمد</b>
        </div>
    </div>

    <div class="no-print" style="margin-top:50px; text-align:center;">
        <button class="btn btn-primary" style="width:200px" onclick="handlePrint()">طباعة / حفظ PDF</button>
        <button class="btn" style="width:100px; background:#666; color:white" onclick="exitPatient()">خروج آمن</button>
    </div>
</div>

<script>
    const MASTER_TESTS = [
        {n: "Glucose (Random)", u: "mg/dl", r: "70-140"}, {n: "Urea", u: "mg/dl", r: "15-45"},
        {n: "Creatinine", u: "mg/dl", r: "0.6-1.4"}, {n: "Cholesterol", u: "mg/dl", r: "Up to 200"},
        {n: "TSH", u: "µIU/mL", r: "0.4-4.2"}, {n: "Vitamin D", u: "ng/mL", r: "30-100"},
        {n: "HBV (ICT)", u: "-", r: "Negative"}, {n: "Malaria (BF)", u: "-", r: "Negative"}
    ];

    // تهيئة القائمة
    const menu = document.getElementById('menuTests');
    MASTER_TESTS.forEach(t => {
        menu.innerHTML += `<label class="test-item"><input type="checkbox" class="t-chk" value="${t.n}" data-u="${t.u}" data-r="${t.r}"> ${t.n}</label>`;
    });
    menu.innerHTML += `<label class="test-item" style="color:blue"><b><input type="checkbox" id="cCBC"> CBC (Full Form)</b></label>`;

    function showTab(t) {
        document.getElementById('pView').style.display = t === 'patient' ? 'block' : 'none';
        document.getElementById('aView').style.display = t === 'admin' ? 'block' : 'none';
        document.getElementById('pTab').className = 'tab-btn ' + (t === 'patient' ? 'active' : '');
        document.getElementById('aTab').className = 'tab-btn ' + (t === 'admin' ? 'active' : '');
    }

    function adminLogin() {
        if(document.getElementById('adminPass').value === "Wagaar7@") {
            document.getElementById('authGate').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else { alert("خطأ في الصلاحية"); }
    }

    function addCustomTest() {
        const name = prompt("اسم الفحص الجديد:");
        if(name) {
            const div = document.createElement('div');
            div.innerHTML = `${name}: <input type="text" class="custom-val" data-n="${name}"> Unit: <input type="text" class="custom-unit" placeholder="Unit">`;
            document.getElementById('entryFields').appendChild(div);
        }
    }

    document.addEventListener('change', () => {
        let h = '<h4 style="color:var(--accent)">تعبئة البيانات:</h4>';
        document.querySelectorAll('.t-chk:checked').forEach(c => {
            h += `<div style="margin-bottom:10px;"><b>${c.value}:</b> <input type="text" class="res-in" data-n="${c.value}" data-u="${c.dataset.u}" data-r="${c.dataset.r}"></div>`;
        });
        if(document.getElementById('cCBC').checked) {
            h += `<div class="glass" style="background:#f0f9ff"><b>آلة CBC الحاسبة:</b><br>
                  Hb: <input type="number" id="iHb"> WBCs: <input type="number" id="iWbc"> PLT: <input type="number" id="iPlt"></div>`;
        }
        document.getElementById('entryFields').innerHTML = h;
    });

    function finalizeResult() {
        const name = document.getElementById('pName').value;
        if(!name) return alert("أدخل اسم المريض");
        
        const ref = 'WQR-' + Math.floor(1000 + Math.random() * 9000);
        const date = new Date().toLocaleString('ar-EG');
        
        let rows = '';
        document.querySelectorAll('.res-in').forEach(i => {
            rows += `<tr><td>${i.dataset.n}</td><td><b>${i.value}</b></td><td>${i.dataset.u}</td><td>${i.dataset.r}</td></tr>`;
        });

        let content = `<table><thead><tr><th>Investigation</th><th>Result</th><th>Unit</th><th>Range</th></tr></thead><tbody>${rows}</tbody></table>`;
        
        if(document.getElementById('cCBC').checked) {
            content += `<div class="sec-head">COMPLETE BLOOD COUNT</div><table>
                <tr><th>Hb</th><td>${document.getElementById('iHb').value}</td><th>WBCs</th><td>${document.getElementById('iWbc').value}</td></tr>
                <tr><th>Platelets</th><td>${document.getElementById('iPlt').value}</td><th>Date</th><td>${date}</td></tr></table>`;
        }

        const reportData = { name, age: document.getElementById('pAge').value, content, date, ref };
        localStorage.setItem(ref, JSON.stringify(reportData));
        
        // سجل الزيارات
        let history = JSON.parse(localStorage.getItem('lab_history') || '[]');
        history.push(reportData);
        localStorage.setItem('lab_history', JSON.stringify(history));

        // إفراغ تلقائي
        alert("تم الحفظ بنجاح! كود المريض هو: " + ref);
        window.open(`https://api.whatsapp.com/send?phone=${document.getElementById('pPhone').value}&text=نتيجتك الطبية من معمل وقار جاهزة. الكود الخاص بك: ${ref}`, '_blank');
        location.reload();
    }

    function patientSearch() {
        const ref = document.getElementById('patientRef').value.toUpperCase();
        const data = localStorage.getItem(ref);
        if(data) {
            const d = JSON.parse(data);
            document.getElementById('outName').innerText = d.name;
            document.getElementById('outAge').innerText = d.age;
            document.getElementById('outRef').innerText = d.ref;
            document.getElementById('outContent').innerHTML = d.content;
            
            document.getElementById('authGate').style.display = 'none';
            document.getElementById('reportPage').style.display = 'block';
            
            new QRCode(document.getElementById("qrcode"), { text: d.ref, width: 80, height: 80 });
        } else { alert("الكود غير موجود"); }
    }

    function handlePrint() {
        window.print();
        setTimeout(() => { exitPatient(); }, 5000); // خروج تلقائي بعد الطباعة
    }

    function exitPatient() {
        alert("شكراً لزيارتكم معمل وقار. سيتم الخروج الآن.");
        location.reload();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام معمل وقار الحديث - النسخة الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #0a192f; --accent: #1e40af; --gold: #d4af37; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; }
        .no-print { padding: 15px; max-width: 1200px; margin: auto; }
        .glass { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; border-top: 5px solid var(--accent); }
        .logo-box { text-align: center; margin-bottom: 20px; }
        .main-logo { width: 180px; }
        
        /* شبكة اختيار الفحوصات الـ 35 */
        .tests-selection { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; background: #f1f5f9; padding: 15px; border-radius: 10px; max-height: 300px; overflow-y: auto; }
        .test-card { display: flex; align-items: center; gap: 8px; font-size: 13px; background: white; padding: 8px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }

        /* منطقة إدخال البيانات */
        .forms-container { margin-top: 20px; }
        .test-form-group { display: none; background: white; padding: 20px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; }
        .visible-form { display: block !important; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .input-box { margin-bottom: 10px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: var(--primary); }
        input { padding: 10px; border-radius: 6px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }

        .sec-title { background: #000; color: #fff; text-align: center; font-weight: bold; padding: 6px; margin: 15px 0; }

        /* تنسيق الطباعة الرسمي */
        .a4-page { display: none; background: white; width: 210mm; min-height: 297mm; padding: 12mm; margin: auto; color: #000; }
        .rep-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); padding-bottom: 10px; }
        .p-bar { display: grid; grid-template-columns: 2fr 1fr 1fr; border: 2.5px solid #000; margin: 15px 0; padding: 10px; font-weight: bold; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 12px; }
        .official-stamp { width: 130px; }

        @media print { .no-print { display: none !important; } .a4-page { display: block !important; } }
    </style>
</head>
<body>

<div class="no-print">
    <div id="loginGate" class="glass" style="max-width:450px; margin: 50px auto;">
        <div class="logo-box"><img src="https://i.ibb.co/6ndf02R/210350.png" class="main-logo" alt="Waqar Logo"></div>
        <div style="text-align:center; margin-bottom:20px;">
            <input type="password" id="adminKey" placeholder="كلمة المرور للدخول للإدارة">
            <button class="btn-primary" style="padding:10px 30px; border-radius:8px; border:none; cursor:pointer;" onclick="checkAccess()">دخول</button>
        </div>
    </div>

    <div id="adminPanel" style="display:none">
        <div class="glass">
            <h2 style="text-align:center; color:var(--accent);">لوحة إدخال النتائج الشاملة (35 فحصاً)</h2>
            
            <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:10px; margin-bottom:20px;">
                <input type="text" id="pName" placeholder="اسم المريض">
                <input type="text" id="pAge" placeholder="العمر">
                <input type="text" id="pSex" placeholder="الجنس">
            </div>

            <div class="tests-selection" id="testsMenu">
                </div>

            <div class="forms-container" id="allForms">
                </div>

            <button onclick="generateReport()" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold; font-size:18px; cursor:pointer; margin-top:20px;">حفظ وتوليد التقرير النهائي 💾</button>
        </div>
    </div>
</div>

<div id="printView" class="a4-page">
    <div class="rep-header">
        <img src="https://i.ibb.co/6ndf02R/210350.png" width="160">
        <div style="text-align:center">
            <h1 style="margin:0; font-size:24px; color:var(--primary)">معمل وقار الحديث للتحاليل الطبية</h1>
            <p style="margin:0; font-weight:bold; font-size:12px;">WAQAR AL-HADEETH MEDICAL LAB</p>
        </div>
        <div id="qr"></div>
    </div>
    <div class="p-bar">
        <span>Patient: <span id="outName"></span></span>
        <span>Age/Sex: <span id="outAge"></span></span>
        <span>Ref No: <span id="outRef"></span></span>
    </div>
    <div id="reportContent"></div>
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:50px;">
        <div style="text-align:center">
            <img src="https://i.ibb.co/hZ2v60Q/210488.png" class="official-stamp">
            <p style="color:red; font-size:11px; font-weight:bold; margin:0;">الختم الرسمي</p>
        </div>
        <div style="text-align:center; width:250px; border-top:2px solid #000; padding-top:5px;">
            <p style="margin:0; font-size:14px;">Laboratory Director</p><b style="font-size:18px;">د. السني خالد محمد</b>
        </div>
    </div>
    <div class="no-print" style="margin-top:40px; text-align:center;">
        <button onclick="window.print()" style="padding:15px 40px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer;">طباعة التقرير 🖨️</button>
    </div>
</div>

<script>
    const CONFIG = [
        { id: 'cbc', name: 'CBC (Full Blood Count)', fields: ['Hb', 'RBC', 'WBC', 'PLT', 'HCT', 'MCV', 'MCH', 'MCHC', 'RDW', 'Neutrophils', 'Lymphocytes', 'Monocytes'], units: ['g/dl', '10^6', '10^3', '10^3', '%', 'fL', 'pg', 'g/dL', '%', '%', '%', '%'], ranges: ['13-17', '4.5-5.5', '4-11', '150-410', '40-50', '80-100', '27-32', '32-36', '11-14', '40-75', '20-45', '2-10'] },
        { id: 'kidney', name: 'Kidney Functions', fields: ['Urea', 'Creatinine', 'Uric Acid'], units: ['mg/dL', 'mg/dL', 'mg/dL'], ranges: ['15-45', '0.7-1.4', '3.5-7.2'] },
        { id: 'liver', name: 'Liver Functions', fields: ['SGOT (AST)', 'SGPT (ALT)', 'Albumin', 'Total Bilirubin'], units: ['U/L', 'U/L', 'g/dL', 'mg/dL'], ranges: ['Up to 40', 'Up to 41', '3.5-5.2', '0.2-1.2'] },
        { id: 'lipid', name: 'Lipid Profile', fields: ['Cholesterol', 'Triglycerides', 'HDL', 'LDL'], units: ['mg/dL', 'mg/dL', 'mg/dL', 'mg/dL'], ranges: ['Up to 200', 'Up to 150', 'Over 40', 'Up to 130'] },
        { id: 'diabetes', name: 'Diabetes', fields: ['Glucose (Random)', 'Glucose (Fasting)', 'HbA1c'], units: ['mg/dL', 'mg/dL', '%'], ranges: ['70-140', '70-110', '4.8-5.9'] },
        { id: 'hormones', name: 'Hormones', fields: ['TSH', 'Free T3', 'Free T4', 'PSA'], units: ['uIU/mL', 'pg/mL', 'ng/dL', 'ng/mL'], ranges: ['0.4-4.2', '2.3-4.2', '0.8-1.8', 'Up to 4'] },
        { id: 'sero', name: 'Serology', fields: ['H.Pylori Ag', 'HBsAg', 'HCV Ab', 'HIV', 'VDRL'], units: ['-', '-', '-', '-', '-'], ranges: ['Negative', 'Negative', 'Negative', 'Negative', 'Non-Reactive'] },
        { id: 'semen', name: 'Semen Analysis', fields: ['Volume', 'Liquefaction Time', 'Sperm Conc.', 'Total Motility', 'Normal Forms'], units: ['ml', 'min', 'm/ml', '%', '%'], ranges: ['1.5-5', 'Up to 30', 'Over 15', 'Over 40', 'Over 4'] }
    ];

    const menu = document.getElementById('testsMenu');
    const forms = document.getElementById('allForms');

    CONFIG.forEach((test, idx) => {
        // إنشاء قائمة الاختيار
        menu.innerHTML += `<label class="test-card"><input type="checkbox" onchange="toggleForm('${test.id}')" id="chk_${test.id}"> ${test.name}</label>`;
        
        // إنشاء فورم الإدخال
        let formHtml = `<div class="test-form-group" id="form_${test.id}"><div class="sec-title">${test.name}</div><div class="form-grid">`;
        test.fields.forEach((field, fIdx) => {
            formHtml += `<div class="input-box"><label>${field}</label><input type="text" class="in-val" data-group="${test.id}" data-name="${field}" data-unit="${test.units[fIdx]}" data-range="${test.ranges[fIdx]}"></div>`;
        });
        formHtml += `</div></div>`;
        forms.innerHTML += formHtml;
    });

    function toggleForm(id) { document.getElementById('form_'+id).classList.toggle('visible-form'); }

    function checkAccess() {
        if(document.getElementById('adminKey').value === "Wagaar7@") {
            document.getElementById('loginGate').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else { alert("كلمة المرور غير صحيحة"); }
    }

    function generateReport() {
        const name = document.getElementById('pName').value;
        const ref = 'WQR-' + Math.floor(Math.random() * 90000 + 10000);
        let html = '';

        CONFIG.forEach(test => {
            if(document.getElementById('chk_'+test.id).checked) {
                html += `<div class="sec-title">${test.name}</div><table><tr><th>Investigation</th><th>Result</th><th>Unit</th><th>Reference Range</th></tr>`;
                document.querySelectorAll(`.in-val[data-group="${test.id}"]`).forEach(input => {
                    html += `<tr><td>${input.dataset.name}</td><td><b>${input.value}</b></td><td>${input.dataset.unit}</td><td>${input.dataset.range}</td></tr>`;
                });
                html += `</table>`;
            }
        });

        document.getElementById('outName').innerText = name;
        document.getElementById('outAge').innerText = document.getElementById('pAge').value;
        document.getElementById('outRef').innerText = ref;
        document.getElementById('reportContent').innerHTML = html;
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('printView').style.display = 'block';
        new QRCode(document.getElementById("qr"), { text: ref, width: 80, height: 80 });
    }
</script>
</body>
</html>
